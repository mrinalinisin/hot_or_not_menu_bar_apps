 via the OpenVPN VPN protocol using standard OpenVPN configuration files.","img":"https://macmenubar.com/wp-content/uploads/2023/01/tunnelblick.jpg","u":"https://tunnelblick.net/"},{"t":"Front and Center","d":"This menu bar app lets you control the window-layering policy on your Mac. In “Classic” mode, clicking on a window brings all the windows in that app to the front, just like it did in classic Mac OS. In “Modern” mode, only the clicked window comes to the front.","img":"https://macmenubar.com/wp-content/uploads/2023/01/front-and-center.jpg","u":"https://hypercritical.co/front-and-center/"},{"t":"DriveDx","d":"DriveDx is a menu bar app that monitors the drive’s built-in S.M.A.R.T. status. It also analyzes the changes of all drive health indicators that are closely related to SSD or HDD failures and alerts you if the quality of a drive degrades.","img":"https://macmenubar.com/wp-content/uploads/2023/01/drivedx.jpg","u":"https://binaryfruit.com/drivedx"},{"t":"iClip","d":"iClip is a clipboard recorder, saving everything you copy: plain-text, rich-text, images, files, anything. The menu bar app organizes stored clips into multiple sets and have them ready to paste in an instant.","img":"https://macmenubar.com/wp-content/uploads/2023/01/iclip.jpg","u":"https://iclipapp.com"},{"t":"MenuPing","d":"MenuPing is a menu bar app that checks how well the network is working. It pings a server on the Internet every seconds (configurable) and prints the result in a short way at the top of the screen.","img":"https://macmenubar.com/wp-content/uploads/2023/01/menuping.jpg","u":"https://github.com/julienbordet/MenuPing/releases"},{"t":"BridgeBlock","d":"This menu bar app prevents wireless bridging attacks by detecting bridging conditions and taking action. It also has a command line version for system administrators.","img":"https://macmenubar.com/wp-content/uploads/2023/01/bridgeblock.jpg","u":"https://gitlab.com/andrew_vanderbilt/bridgeblock"},{"t":"Energiza Pro","d":"Energiza Pro allows you to control battery charging by setting individual charging limits. At any time you can start charging and even discharging (requires Apple M1 chip or later) with a click of a button.","img":"https://macmenubar.com/wp-content/uploads/2023/01/energiza-pro.jpg","u":"https://appgineers.de/energiza/"},{"t":"TotalXDR","d":"This menu bar app unlocks the brightness limit of your MacBook Pro display/Pro Display XDR and keeps XDR/HDR extra brightness always on.","img":"https://macmenubar.com/wp-content/uploads/2023/01/TotalXDR.jpg","u":"https://junebytes.com/totalxdr"},{"t":"Cliptools","d":"Access your clipboard history, save clips, use programmable Smart Clips, paste the date or time, insert example text, perform calculations and paste the result or replace the selection, convert numbers to words, sorts lines and much more.","img":"https://macmenubar.com/wp-content/uploads/2023/01/cliptools.jpg","u":"https://macmost.com/cliptools"},{"t":"Spaced","d":"The menu bar app Spaced lets you organize your menu bar items into groups for a more streamlined appearance. Comes in handy on larger screens where menu bar space is ample.","img":"https://macmenubar.com/wp-content/uploads/2023/01/spaced.jpg","u":"https://apps.apple.com/app/id1666327168"},{"t":"Button","d":"This menu bar app puts 10,000+ keyboard shortcuts, tips, and best practices in your menu bar for over 100 apps.","img":"https://macmenubar.com/wp-content/uploads/2023/01/button.png","u":"https://www.buttonshortcuts.com/"},{"t":"Radiola","d":"Radiola is a lightweight Internet radio player. It lets you play different radio stations and switch between them easily, without running a resource hungry media player.","img":"https://macmenubar.com/wp-content/uploads/2023/01/radiola.jpg","u":"https://github.com/SokoloffA/radiola"},{"t":"DemoPro","d":"DemoPro lets you draw on any app or web page while you do a live presentation or record a tutorial. No matter what’s on your screen.","img":"https://macmenubar.com/wp-content/uploads/2022/12/demopro.jpg","u":"http://www.demoproapp.com/"},{"t":"Pasty","d":"Pasty is a menu bar app that provides you with an interface for retrieving and organizing your clipboard history. You can search by content, source application, and type of content.","img":"https://macmenubar.com/wp-content/uploads/2023/01/pasty.jpg","u":"https://apps.apple.com/de/app/clipboard-manager-pasty/id1544620654?l=en&mt=12"},{"t":"Time Sink","d":"Time Sink helps you track how you spend your time on your Mac. It automatically logs opened windows and applications, and keeps track of how long you’ve spent using things in total.","img":"https://macmenubar.com/wp-content/uploads/2022/12/time-sink.jpg","u":"https://manytricks.com/timesink/"},{"t":"Breakin’","d":"Breakin’ is a menu bar app that periodically reminds you to take a break (and take care of yourself) rather than be in front of your computer. You can trigger a break manually or have Breakin’ do it for you on a recurring time interval.","img":"https://macmenubar.com/wp-content/uploads/2023/01/breakin.jpg","u":"https://www.widgetworx.com/apps/breakin.html"},{"t":"Time Zone Pro","d":"This menu bar app keeps track of lots of different time zones. Add your friends, family, clients or team and never schedule a call over dinner or bath time again.","img":"https://macmenubar.com/wp-content/uploads/2022/12/time-zone-pro.jpg","u":"https://apps.apple.com/app/time-zone-pro/id1557558517"},{"t":"Spotica","d":"This menu bar app shows the cover art and customizable album/artist/song/year display for Spotify or Apple Music. It also gives you access to all the common music control functions. A number of custom configuration options are available as well.","img":"https://macmenubar.com/wp-content/uploads/2022/12/spotica-menu.jpg","u":"https://spoti.ca/"},{"t":"myTuner Radio Pro","d":"More than 200 countries/territories and 40,000 radio stations sitting in your menu bar, ready to use whenever you like.","img":"https://macmenubar.com/wp-content/uploads/2022/12/my-tuner.jpg","u":"https://apps.apple.com/us/app/mytuner-radio-pro/id808285143?mt=12"},{"t":"Finder Window","d":"Finder Windows is (also) a menu bar app that gives you instant access to the list of open Finder windows at any time.","img":"https://macmenubar.com/wp-content/uploads/2022/12/finder-window.jpg","u":"https://zevrix.com/finderwindows/"},{"t":"Weather for Status Bar","d":"This menu bar app displays the current weather situation on your status bar without any fluff or annoyances. The app updates itself automatically every fifteen minutes.","img":"https://macmenubar.com/wp-content/uploads/2022/12/Weather-for-Status.jpg","u":"https://apps.apple.com/ca/app/weather-for-status-bar/id1448031908?mt=12"},{"t":"ChatGPT","d":"This app keeps ChatGPT live on the menu bar.","img":"https://macmenubar.com/wp-content/uploads/2022/12/chatgpt.jpeg","u":"https://github.com/vincelwt/chatgpt-mac"},{"t":"Clapet","d":"Clamshell mode on your MacBook allows you to keep your Mac awake when you close the lid but it only works when a power adapter is connected.","img":"https://macmenubar.com/wp-content/uploads/2022/11/clapet.jpg","u":"https://github.com/mbenoukaiss/clapet"},{"t":"Tiiny Host","d":"Whether you’re a designer, marketer, developer or a student, with this menu bar app you can easily share your work (HTML, PDF or anything in a Zip file) online.","img":"https://macmenubar.com/wp-content/uploads/2022/11/tiiny-host.jpg","u":"https://tiiny.host/"},{"t":"Copy History Mark Ⅱ","d":"You can access your copy history, including images, with this menu bar app. Additionally, there is a delete option and a search option.","img":"https://macmenubar.com/wp-content/uploads/2022/11/Copy-History-Mark-Ⅱ.jpg","u":"https://apps.apple.com/app/copy-history-mark-ii/id1633920503"},{"t":"Ghostnote","d":"With this menu bar app you can add notes and to-dos to folders, applications, open documents, and even to websites.","img":"https://macmenubar.com/wp-content/uploads/2022/11/ghostnote-new.jpg","u":"https://www.ghostnoteapp.com/"},{"t":"World Cup Bar","d":"Follow the World Cup directly from you Mac’s Menu Bar. You can see today’s live matches (with live score!), yesterday’s results if you missed it, and tomorrow’s scheduled matches.","img":"https://public-files.gumroad.com/lqwbwiqhvstvh0ovshs6d3qou466","u":"https://cyrilniobe.gumroad.com/l/world-cup-mac-bar"},{"t":"Antnotes","d":"Antnotes is a replacement of standard stickies application. For each note you can change size, placement on screen, background color, text font and color, make it translucent (transparent) or pinned (so it floats atop of all other windows).","img":"https://macmenubar.com/wp-content/uploads/2022/11/antnotes.jpg","u":"https://www.antnotes.com/"},{"t":"Morpho Converter","d":"Open, type a number, and instantly see all your favorite conversions in the menu bar. You can choose from 264 units and 170 currencies (macOS Ventura).","img":"https://macmenubar.com/wp-content/uploads/2022/12/morpho-converter.jpg","u":"https://apps.apple.com/app/id1494942612"},{"t":"Menudon","d":"Access Mastodon directly from your menu bar with a lightweight, native interface for social media networking efficiently without extra steps.","img":"https://macmenubar.com/wp-content/uploads/2022/12/menudon.jpg","u":"https://github.com/mre/menudon"},{"t":"Coffee","d":"The menu bar app Coffee is a tiny time tracker. You can track multiple projects, start and stop tracking your time with a single tap, and export data to CSV for invoice creation.","img":"https://macmenubar.com/wp-content/uploads/2022/11/coffee.jpg","u":"https://trycoffee.co/"},{"t":"Vitals","d":"Vitals is a tiny process monitor that keeps track of resource usage. The app shows a per-process CPU graph covering the last 60 seconds. This makes it easier to track down apps that misbehave sporadically.","img":"https://macmenubar.com/wp-content/uploads/2022/11/vitals.png","u":"https://github.com/hmarr/vitals"},{"t":"The Clock 4","d":"With this clock and timezone menu bar app you can easily keep track of your contacts in different time zones. You can also set up meetings with the Meeting Planner.","img":"https://macmenubar.com/wp-content/uploads/2022/11/the-clock-4.jpg","u":"https://www.seense.com/the_clock/"},{"t":"Buildwatch","d":"Buildwatch is a menu bar app for developers using Xcode that tracks, graphs, and analyzes how much of their time is spent compiling so they can build apps more efficiently.","img":"https://macmenubar.com/wp-content/uploads/2022/11/buildwatch.jpg","u":"https://www.buildwatch.app/"},{"t":"Oka To Do","d":"Capture tasks as they come to mind directly in the menu bar without breaking your focus or workflow making your workflow more efficient with ease.","img":"https://macmenubar.com/wp-content/uploads/2022/11/oka-to-do.jpg","u":"https://okaapps.com/product/1521634562mac"},{"t":"Sleep Control Center","d":"This menu bar app prevents your Mac from entering Sleep mode. You can control your system in terms of display, sleep, and power saving","img":"https://macmenubar.com/wp-content/uploads/2022/11/sleep-control-center.jpg","u":"https://apps.apple.com/us/app/antisleep/id946798523"},{"t":"Slapp","d":"With this app you can customize and update your Slack status from your Mac’s menu bar.","img":"https://macmenubar.com/wp-content/uploads/2022/10/slapp.jpg","u":"https://github.com/shersch/slapp"},{"t":"ReiKey","d":"Scan for and monitor keyloggers to ensure your Mac stays protected from malicious tracking software and unauthorized surveillance.","img":"https://macmenubar.com/wp-content/uploads/2022/10/reikey.jpg","u":"https://objective-see.org/products/reikey.html"},{"t":"BlockBlock","d":"BlockBlock is a menu bar app that warns of persistently installed software. In other words, it looks for software that’s installing itself in such a way that it will always be running and will fire up again after a system reboot.","img":"https://macmenubar.com/wp-content/uploads/2022/10/blockblock.jpg","u":"https://objective-see.org/products/blockblock.html"},{"t":"Glide","d":"Glide is a focus pointer that lets you dim parts of your screen for better focus and reading experience. You can still interact with everything on your screen while the app is active.","img":"https://macmenubar.com/wp-content/uploads/2022/11/focus-pointer.jpg","u":"https://apps.apple.com/mv/app/glide-focus-pointer/id1593045116"},{"t":"Sticklets","d":"Sticklet (Inspired by real world Sticky Notes) is a menu app that’s always available for quick notes. It also has tools to structure and organise notes, and even for brainstorming ideas.","img":"https://macmenubar.com/wp-content/uploads/2022/10/sticklets.jpg","u":"https://www.sticklets.co/"},{"t":"Soduto","d":"This menu bar app is probably the only open-source alternative to Apple’s “Continuity“. Want to copy-paste content across your devices or simply share a link? Browse remote files? All of this and more is possible with Soduto. Also supports Android and Linux. Soduto seems to work fine on a M1 MacBook Pro (Big Sur 11.2.2).","img":"https://macmenubar.com/wp-content/uploads/2022/10/soduto.jpg","u":"https://soduto.com/"},{"t":"M1 Battery Management","d":"With this menu bar app it is possible to keep a chronically plugged in M1 Macbook at 80% battery, since that will prolong the longevity of the battery. This app will not work on non-M1 macs. In that case try the free version of AlDente.","img":"https://macmenubar.com/wp-content/uploads/2022/10/M1-battery.jpg","u":"https://github.com/actuallymentor/battery"},{"t":"Today","d":"View today’s schedule right from the menu bar. Just the events for today. Click an event to show it in the Calendar app.","img":"https://macmenubar.com/wp-content/uploads/2022/10/today.jpg","u":"https://sindresorhus.com/today"},{"t":"TextSoap","d":"This menu bar app is a text transformation utility that offers hundreds of cleaners to address your text issues. For example, to remove extra spaces, rub out web HTML, fix quote marks, get rid of unexpected tabs, forwarding characters, extra returns, smart quotes, and more.","img":"https://macmenubar.com/wp-content/uploads/2022/10/textsoap.jpg","u":"https://textsoap.com/mac/"},{"t":"FinazaMenuBar","d":"This menu bar app gives you easy access to real time stock prices. You can also lookup the pricing for stocks an ETFs.","img":"https://macmenubar.com/wp-content/uploads/2022/10/finazamenubar.jpg","u":"https://apps.apple.com/ng/app/finazamenubar/id1605645453"},{"t":"Quick Look Fix","d":"When your Mac’s Quick Look spacebar preview is not working and shows a thumbnail instead of the full photo/video, this menu bar app fixes it with a click.","img":"https://macmenubar.com/wp-content/uploads/2022/10/how-quicklookfix-works.gif","u":"https://quicklookfix.com/"},{"t":"Notez","d":"Notez is a simple menu bar note taking app. Just hit the ‘Z’ icon in your menu bar and an elegant small window appears where you can jot your quick notes and store them for later.","img":"https://macmenubar.com/wp-content/uploads/2022/10/notez.jpg","u":"https://apps.apple.com/us/app/notez-menu-bar-note-taking/id1592875913"},{"t":"Vivid","d":"This menu bar app lets you double the brightness on your MacBook Pro and Pro Display XDR.","img":"https://macmenubar.com/wp-content/uploads/2022/10/vivid.jpg","u":"https://www.getvivid.app/"},{"t":"MenuBar RSS","d":"Just click on the menu bar icon and you can read all your news and feeds, mark them as read, open then in your browser, share them and much more!","img":"https://macmenubar.com/wp-content/uploads/2022/10/menubar-rss.jpg","u":"https://apps.apple.com/us/app/menubar-rss/id1596631524"},{"t":"Radar","d":"With Radar you can check different metrics from your menu bar. All the things that matter to you in one place.","img":"https://macmenubar.com/wp-content/uploads/2022/10/radar-desktop-app-sneak-peek.gif","u":"https://getradar.co/"},{"t":"Hovrly","d":"This small app allows you to keep specific time zones in your menu bar. You can enter as many time zones as you want.","img":"https://macmenubar.com/wp-content/uploads/2022/10/hovrly.jpg","u":"https://hovrly.com/"},{"t":"BetterDisplay","d":"BetterDisplay let’s you convert your displays to fully scalable screens, and gives you a host of other features to manage your display’s settings easily from your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2022/09/betterdisplay.jpg","u":"https://github.com/waydabber/BetterDisplay"},{"t":"Shuttle","d":"When you want to access another computer remotely, you’ll need the SSH protocol. Shuttle brings the SSH client to your menu bar.","img":"https://raw.githubusercontent.com/fitztrev/shuttle/gh-pages/images/how-shuttle-works.gif","u":"https://fitztrev.github.io/shuttle/"},{"t":"QuickShade","d":"QuickShade allows you to quickly decrease or increase the level of brightness on your Mac. You can dim the screen below the standard minimum brightness.","img":"https://macmenubar.com/wp-content/uploads/2022/09/quickshade.jpg","u":"https://apps.apple.com/app/quickshade/id931571202"},{"t":"MuteKey","d":"Mute ans unmute your microphone, in any app. You can also choose between Toggle and Push-to-talk modes.","img":"https://macmenubar.com/wp-content/uploads/2022/09/MuteKey.jpg","u":"https://apps.apple.com/us/app/mutekey/id1509590766"},{"t":"ColorNoise","d":"ColorNoise is created for playback of white, pink and brown noise. These noises are good for focus, relax or sleep.","img":"https://macmenubar.com/wp-content/uploads/2022/08/ColorNoise.jpeg","u":"https://apps.apple.com/sk/app/colornoise/id1640045375?"},{"t":"Barbee","d":"This menu bar app lets you hide and display icons when necessary. The enhanced mode offers you a separate menu bar under the original one.","img":"https://macmenubar.com/wp-content/uploads/2022/08/barbee.jpg","u":"https://apps.apple.com/us/app/barbee-hide-menu-bar-items/id1548711022"},{"t":"Spaces","d":"With this menu bar app you can declutter your workspace. You can use ‘Spaces’ as workplaces and/or as a launcher. It supports apps, websites & system apps.","img":"https://macmenubar.com/wp-content/uploads/2022/07/spaces.jpeg","u":"https://spacesformac.xyz/"},{"t":"GP Calendar","d":"Never miss a race start with this Formula 1 Calendar (with Practices & Qualifying) right on your mac menu bar.","img":"https://macmenubar.com/wp-content/uploads/2022/07/GP_Calendar.jpeg","u":"https://apps.apple.com/us/app/gp-calendar-f1-notification/id1632951751"},{"t":"SpeedCut","d":"Select and remove an object from any photo without using complex selection tools. SpeedCut is the background removal tool, straight from your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2022/07/SpeedCut.jpeg","u":"https://apps.apple.com/au/app/speedcut/id1591106612"},{"t":"Warp","d":"With Warp you can build custom window configurations and restore them from the menu bar. Arrange windows to their perfect positions and save their positions with a click.","img":"https://macmenubar.com/wp-content/uploads/2022/06/warp.jpg","u":"https://www.warpmac.com/"},{"t":"dotBeat Internet Time","d":"dotBeat shows the current Swatch Internet Time in your menu bar. It also includes gives you a view into how Internet Time corresponds to local times across the globe.","img":"https://macmenubar.com/wp-content/uploads/2022/06/dotbeat.jpg","u":"https://github.com/amiantos/dotbeat/"},{"t":"Bluesnooze","d":"With this menu bar app the Bluetooth connection is switched off when your Mac sleeps, and switched on when your Mac wakes.","img":"https://macmenubar.com/wp-content/uploads/2022/06/bluesnooze.jpg","u":"https://github.com/odlp/bluesnooze/"},{"t":"rcmd","d":"Are you always havin a lot of apps open? This menu bar app lets you switch apps instantly just by their first letter.","img":"https://macmenubar.com/wp-content/uploads/2022/06/rcmd.jpg","u":"https://lowtechguys.com/rcmd/"},{"t":"YellowDot","d":"The yellow dot is useful in letting you know if an app is using the microphone. But when you’re familiar with all the apps that use the microphone, it can be an annoyance. When this menu bar app is running, the corner dot will always be hidden.","img":"https://macmenubar.com/wp-content/uploads/2022/07/yellowdot.jpg","u":"https://lowtechguys.com/yellowdot/"},{"t":"Display Maid","d":"With this menu bar app you can save and restore window locations. So, when you reconnect your laptop to the external display arrangement, everything will be just as it was before. You can also create your display configuration or user created profiles.","img":"https://macmenubar.com/wp-content/uploads/2022/06/display_maid.jpg","u":"https://funk-isoft.com/display-maid.html"},{"t":"Colorful Input Menu Flags","d":"Since a lot of input sources and languages are used in multiple countries, why not let the user choose which flag they want to have displayed? Inspired by this blog post.","img":"https://macmenubar.com/wp-content/uploads/2022/06/colorful-input-menu-flag.jpg","u":"https://apps.apple.com/us/app/id1630533969"},{"t":"Lapse","d":"This menu bar app lets you capture your screen in time-lapse without re-rendering. Just as you would record a normal screen recording.","img":"https://macmenubar.com/wp-content/uploads/2022/05/lapse.jpg","u":"https://lapse.achuth.dev/"},{"t":"Dropbox Capture","d":"With Dropbox Capture, you can create a video message that includes your computer screen, face, and voice all with a single Mac menu bar app.","img":"https://macmenubar.com/wp-content/uploads/2022/06/dropbox_capture.jpg","u":"https://www.dropbox.com/features/content-collaboration/screen-recorder"},{"t":"Reminders","d":"A simple menu bar app to view and interact with reminders. You can keep everything in sync with Apple Reminders.","img":"https://macmenubar.com/wp-content/uploads/2022/06/reminder.png","u":"https://github.com/DamascenoRafael/reminders-menubar"},{"t":"AutoRaise","d":"Automatically bring windows to the foreground when your cursor hovers over them for streamlined and efficient workflows without clicking for seamless integration with ease saving you time and effort every day.","img":"https://macmenubar.com/wp-content/uploads/2022/06/menu-autoraise.jpg","u":"https://github.com/lhaeger/AutoRaise/"},{"t":"baRSS","d":"Read and stay current with your favorite RSS feeds directly from your menu bar using a clean, streamlined, distraction-free interface without any visual clutter making your workflow more efficient.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/barss.jpg","u":"https://github.com/relikd/barss"},{"t":"KeyBell","d":"KeyBell plays a nostalgic mechanical sound every time you type something on your keyboard. It works on your entire Mac, on all apps. It is designed as a productivity boost if you dislike the boring and silent keyboards.","img":"https://macmenubar.com/wp-content/uploads/2022/06/keybell.jpg","u":"https://apps.apple.com/us/app/keybell-mechanical-keyboard/id1530838633"},{"t":"Kaomoji","d":"This menu bar app lets you directly enter random, populair and the latest kaomojis straight from your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2022/05/Kaomoji.jpg","u":"https://return.github.io/Kaomoji/"},{"t":"QuickPresent","d":"Automatically clean up your screen before presentations by hiding notifications, desktop icons, and distracting windows with just one click from the menu.","img":"https://macmenubar.com/wp-content/uploads/2022/05/quickpresent.jpeg","u":"https://www.quickpresent.app/"},{"t":"BlurScreen","d":"With this menu bar app you can blur out any area of your screen, while recording or screen sharing.","img":"https://macmenubar.com/wp-content/uploads/2022/05/blurscreen.jpeg","u":"https://www.blurscreen.app/"},{"t":"Zen Mode","d":"With this menu bar app you can quickly hide desktop icons (or windows) during a meeting and mute your mic.","img":"https://macmenubar.com/wp-content/uploads/2022/05/zen-mode.jpg","u":"https://zenmode.carrd.co/"},{"t":"Velja","d":"Open links in a specific browser (for example, you could create a rule to make all URLs with the domain “google.com” open in Chrome) or a matching native app.","img":"https://www.macmenubar.com/wp-content/uploads/2022/05/velja.jpg","u":"https://sindresorhus.com/velja"},{"t":"Rectangle","d":"Move and resize windows in macOS using keyboard shortcuts or snap areas. The free version of Rectangle already feels like a pro-user application.","img":"https://www.macmenubar.com/wp-content/uploads/2022/05/rectangle2.jpg","u":"https://rectangleapp.com/"},{"t":"PlayStatus","d":"PlayStatus is a menu bar app that allows the control of Spotify, Apple Music (macOS 10.15+) and iTunes including iTunes Radio/Beats1 playback from your menu bar.","img":"https://user-images.githubusercontent.com/45484873/75731499-d3310180-5cbd-11ea-8546-7c34bacd1b6f.gif","u":"https://github.com/nbolar/PlayStatus"},{"t":"Screegle","d":"This menu bar app is your virtual background for screen sharing during meetings or video recordings. It lets you share one or multiple windows in meetings without showing your entire desktop.","img":"https://www.macmenubar.com/wp-content/uploads/2022/05/screegle.jpg","u":"https://www.appblit.com/screegle"},{"t":"ChordDetector","d":"This menu bar app listens iTunes and Spotify to detect chords of songs. It saves up to 20 chords.","img":"https://www.macmenubar.com/wp-content/uploads/2022/05/chorddetector.jpg","u":"https://github.com/cemolcay/ChordDetector"},{"t":"Ears","d":"Quickly change your Mac’s sound output/input via the menu bar. Ears is Intel and Apple Silicon compatible and requires macOS Big Sur or Monterey.","img":"https://www.macmenubar.com/wp-content/uploads/2022/05/ears.jpg","u":"https://retina.studio/ears/"},{"t":"In Your Face","d":"This menu bar app interrupts your workflow when it’s time to go to your meeting by displaying a full screen reminder. The app only works with the macOS Calendar app.","img":"https://www.macmenubar.com/wp-content/uploads/2022/05/in-your-face.jpg","u":"https://apps.apple.com/us/app/in-your-face/id1476964367"},{"t":"Market Bar","d":"Market Bar is a tiny stocks watcher for your menu bar. Add your favorite (up to 10) tickers to always see the current price. Price updates every 30 seconds.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/market_bar.jpg","u":"https://github.com/manindaniil/market-bar"},{"t":"BarLinks","d":"Too many bookmarks saved in your browser? This bookmark manager lets you store, find and open bookmarks in your menu bar. It opens any link you save in a new tab, using your default browser.","img":"https://www.macmenubar.com/wp-content/uploads/2022/05/barlinks.jpg","u":"https://apps.apple.com/app/barlinks-menu-bar-bookmarks/id1619559236?mt=12"},{"t":"LinkLiar","d":"This menu bar app keeps the MAC addresses of your Wi-Fi and Ethernet interfaces random for privacy.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/linkliar.jpg","u":"https://github.com/halo/LinkLiar"},{"t":"Now and Next","d":"Now and Next displays the time remaining for the current event. It also includes a dropdown showing you the time remaining until the next event. The app supports the monitoring of one calendar.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/now-and-next.jpg","u":"https://apps.apple.com/us/app/now-and-next/id1435738245"},{"t":"Public IP","d":"This menu bar app displays you public IP Address and is updated frequently. The frequency can be adjusted to meet your needs.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/public-ip.jpg","u":"https://apps.apple.com/us/app/public-ip/id1329545859"},{"t":"Arch Info","d":"This menu bar app tells you if the currently selected application is an Apple Silicon or an Intel (translated via Rosetta 2) application.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/arch-info.jpg","u":"https://apps.apple.com/us/app/arch-info/id1593751566"},{"t":"Insomniacs","d":"This menu bar app disables sleep forever or just for a selected time period. It also prevents sleeping/hibernation when your MacBook lid/screen is closed. Comes in handy when you’ve got time consuming operations to complete.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/insomniacs.jpg","u":"https://apps.apple.com/us/app/insomniacs/id1445351220"},{"t":"TweetShot","d":"Tweetshot sits quietly in your menu bar, only to appear when you hit the keyboard shortcut to launch. No advanced features or customizable options, but it does what it’s made for: tweeting.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/tweetshot.jpg","u":"https://kyome.io/tweetshot/index.html?lang=en"},{"t":"Airplane for Mac","d":"Disable all of your Mac’s wireless connectivity with just one click, instantly mirroring the familiar airplane mode feature that you already use on your iPhone every day.","img":"https://macmenubar.com/wp-content/uploads/2022/04/airplane.jpg","u":"https://airplanemac.carrd.co/"},{"t":"Qwik Weather","d":"Qwik Weather displays the current weather conditions (e.g. clouds, snow, thunder, etc.), temperature, humidity, and wind speed for any of 200,000 geographical locations in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/qwik-weather.jpg","u":"https://widgetworx.com/apps/qwik_weather.html"},{"t":"SF Menu Bar","d":"SF Menu Bar lets you browse and search SF Symbols, iconography designed to integrate seamlessly with San Francisco, the system font for Apple platforms.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/sf-menu-bar.jpg","u":"https://apps.apple.com/app/id1615595104"},{"t":"Folder Peek","d":"With Folder Peek you can access documents, files, folders, and apps from your menu bar. It’s an alternative to Dock folders, just more powerful and customizable. Each folder you add gets its own menu bar icon that you can customize and move around.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/FolderPeek.jpg","u":"https://sindresorhus.com/folder-peek"},{"t":"TinyTranslate","d":"The idea behind TinyTranslate is to have several different languages and edit any of them. Others will listen and mirror your sentence in their language.","img":"https://www.macmenubar.com/wp-content/uploads/2022/04/TinyTranslate.jpg","u":"https://tinytranslate.app/"},{"t":"HIG Typography","d":"This menu bar app enables iOS and macOS developers to reference Apple’s text styles from their menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2022/03/typography.jpg","u":"https://apps.apple.com/us/app/hig-typography/id1616690215"},{"t":"QuietMeet","d":"QuietMeet is a menu bar app that pauses your music during video calls. Music will automatically resume when your call ends.","img":"https://www.macmenubar.com/wp-content/uploads/2022/03/quiet_meet.jpeg","u":"https://apps.apple.com/app/quietmeet-auto-pause-music/id1616212598"},{"t":"DataCever","d":"This menu bar app allows you to monitor and control internet traffic, allowing you to know what consumes your data plan. You can also specify quota for each application.","img":"https://www.macmenubar.com/wp-content/uploads/2022/03/datacever.jpg","u":"https://datacever.com/"},{"t":"TomatoBar","d":"TomatoBar has all the essential features, like: configurable work and rest intervals, optional sounds, Touch Bar support and discreet notifications.","img":"https://www.macmenubar.com/wp-content/uploads/2022/03/tomato-bar.jpg","u":"https://github.com/ivoronin/TomatoBar"},{"t":"Scaler Bandwith Monitor","d":"This menu bar app lets you track the current, combined incoming and outgoing network traffic of your device.","img":"https://www.macmenubar.com/wp-content/uploads/2022/03/scaler-bandwidth-monitor.jpg","u":"https://apps.apple.com/app/scaler-bandwidth-monitor/id1612708557"},{"t":"Spamify","d":"Keep your real mailbox clean and safe. Spamify gives you a temporary email address in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2022/03/spamify.jpg","u":"https://github.com/MuhammedKpln/spamify"},{"t":"Big Weather","d":"See a summary of the weather in your menu bar, instead of only the temperature. Weather for your location or another location. Temperature, rainfall for 48 hours, UV, wind and humidity, weekly summary and more.","img":"https://www.macmenubar.com/wp-content/uploads/2022/03/big-weather.jpg","u":"https://urtti.com/weather"},{"t":"Pure Paste","d":"How many times have you pasted some text into an email, and ending up with a mess of different font sizes? Pure Paste clears all the formatting (fonts, colors, bold, links, tables, etc.) from text you copy.","img":"https://www.macmenubar.com/wp-content/uploads/2022/03/pure-paste.jpg","u":"https://sindresorhus.com/pure-paste"},{"t":"ICE Buddy","d":"ICE Buddy offers you all important information about your trip (German railways) at a glance. Directly in your menu bar, fast and always up-to-date.","img":"https://www.macmenubar.com/wp-content/uploads/2022/02/ice-buddy.jpg","u":"https://ice-buddy.riedel.wtf/"},{"t":"AeroWeather","d":"Quickly access your favorite airport weather. This menu bar app uses weather data from freely available sources like US NOAA.","img":"https://www.macmenubar.com/wp-content/uploads/2022/02/aeroweather.jpg","u":"https://www.lakehorn.com/products/aeroweather-for-mac/"},{"t":"Later","d":"Later is a Mac menu bar app that clears and restores your workspace with ease. Switch off from work, tidy up your desktop before screen sharing, schedule apps for later, and more.","img":"https://www.macmenubar.com/wp-content/uploads/2022/02/later.jpg","u":"https://getlater.app/"},{"t":"PullBar","d":"Access all your GitHub pull requests just in one click. You can also follow the review progress of pull requests created by you and check the build status of GitHub checks.","img":"https://www.macmenubar.com/wp-content/uploads/2022/02/pullbar.jpeg","u":"https://github.com/menubar-apps/PullBar"},{"t":"AudioSwitcher","d":"Do you have multiple sound devices attached to your Mac and want to be able to switch between them without having to use System Preferences? AudioSwitcher allows you to switch quickly between all available input and output devices.","img":"https://www.macmenubar.com/wp-content/uploads/2022/02/audio-switcher.jpg","u":"https://apps.apple.com/us/app/audioswitcher/id561712678"},{"t":"TrackerZapper","d":"Strip tracking parameters from copied links to protect your privacy. This tool integrates seamlessly into your workflow without opening other applications or additional windows.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/TrackerZapper.jpg","u":"https://rknight.me/apps/tracker-zapper/"},{"t":"xbar","d":"With xbar you can put anything in your menu bar. The app comes with hundreds of pre-built plugins to choose from. You can also write your own plugins.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/xbar.jpg","u":"https://xbarapp.com/"},{"t":"TickerPad","d":"Monitor your favorite cryptocurrency prices with real-time updates from the menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/TickerPad.jpg","u":"https://tickerpad.app/"},{"t":"Tubist","d":"Ever used YouTube to listen to background music, only to accidently close your browser tab? With Tubist there is no more closing YouTube by accident, especially while you AirPlay.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/tubist.jpg","u":"https://apps.apple.com/us/app/tubist-menu-bar-for-youtube/id1603180719"},{"t":"Jukebox","d":"View the currently playing song from Spotify in your menu bar. Clicking the menu bar item will present a window displaying details of the current track.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/jukebox.jpg","u":"https://www.jaysce.dev/projects/jukebox"},{"t":"Spotish","d":"A Spotify mini player in your menu bar. A fast and frictionless way to bookmark or remember songs if you’re using Spotify to discover new songs.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/spotish.jpg","u":"https://retina.studio/spotish/"},{"t":"TRex","d":"TRex lives in your menu bar and captures any text right into your Clipboard with magic of OCR. A free alternative for TextSniper.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/Trex.jpg","u":"https://github.com/amebalabs/TRex"},{"t":"Orion","d":"Anti Theft Software for your Mac. With Charger Disconnect Alarm, Lid Close Detection, and Motion Sensor.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/orion.jpg","u":"https://apps.apple.com/us/app/orion-sentry/id1594469593"},{"t":"Yippy","d":"Yippy is an open source clipboard manager. The history window shows all text ever copied from when it is first run.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/yippy.jpg","u":"https://github.com/mattDavo/Yippy"},{"t":"One Thing","d":"Always focus on one thing at a time. With One Thing you can put a single task or goal in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/one-thing.jpg","u":"https://sindresorhus.com/one-thing"},{"t":"OnlySwitch","d":"OnlySwitch is an all-in-one status bar button. The Hide Notch Switch only shows on the build-in display of M1 Pro/Max Macbook Pro.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/onlyswitch.jpg","u":"https://github.com/jacklandrin/OnlySwitch"},{"t":"Shottr","d":"Shottr is a menu bar app with scrolling screenshots, text recognition (OCR), annotation (draw lines, arrows, and simple shapes) and measurement instruments. Optimized for M1.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/shottr.jpeg","u":"https://shottr.cc/"},{"t":"Neat Air","d":"This menu bar app shows air quality at a peak. View AQI and air pollutants from anywhere in the world.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/neat-air.jpg","u":"https://neatair.app/"},{"t":"ColorWell","d":"With this menu bar app you can generate color palettes with quick access to all color information, and on the fly code generation for app development.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/colorwell.jpg","u":"https://colorwell.sweetpproductions.com/"},{"t":"MenubarX","d":"Pin any webpage on your menu bar just like a native app. Whether it’s a frequently visited website page or a website lacking native app, MenubarX can help you use it more efficiently.","img":"https://www.macmenubar.com/wp-content/uploads/2022/01/menubarx.jpg","u":"https://menubarx.app/"},{"t":"Hides","d":"Enable focus mode, to quickly hide all apps except the app you’re currently working in. This menu bar app can be configured globally or for specific apps.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/hides.jpg","u":"https://hides.sweetpproductions.com/"},{"t":"Maestral","d":"Maestral is an open-source Dropbox client that serves as a lightweight alternative to the official app. It comes with an optional command-line tool for power users.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/maestral.jpg","u":"https://maestral.app/"},{"t":"Macs Fan Control","d":"By default, Apple runs your Mac’s fans automatically. This menu bar app lets you manually control your fan speed and temperatures.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/macs-fan-control.png","u":"https://crystalidea.com/macs-fan-control"},{"t":"Privatus","d":"Privatus will take care of clearing your personal and private browsing tracks automatically after each browsing session. Set it up once, and forget about it.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/privatus.jpg","u":"https://privatusapp.com/"},{"t":"LensOCR","d":"This menu bar app enhances the screenshot feature from macOS, it allows you to capture, text, objects, QR and Barcodes.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/lensOCR.jpg","u":"https://www.lensocr.app/"},{"t":"Dear Sun","d":"This menu bar app shows the accurate weather (temperature, wind direction & speed, air pressure, UV, humidity and more) at a peek.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/dear-sun.jpg","u":"https://dearsun.app/"},{"t":"WiFiSpoof","d":"WiFiSpoof is a menu bar app that gives you a quick overview of the current state of your Mac’s network devices. It also protects your privacy while surfing public Wi-Fi networks.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/wifispoof.jpg","u":"https://wifispoof.com/"},{"t":"USBclean","d":"USBclean removes all those pesky junk and ghost files from your external Windows formatted USB drives, like DS_Store and Thumbs.db.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/USB-clean.jpg","u":"https://usbclean.sweetpproductions.com/"},{"t":"Goldie","d":"This menu bar app helps you to produce immaculate, balanced design. Measure and visualize from any ratio point – on or off screen – with design projects of all types.","img":"https://www.macmenubar.com/wp-content/uploads/2021/12/goldie.jpg","u":"https://amicoapps.com/app/goldie/"},{"t":"Quit All","d":"Quit one, some, or all apps from one tidy spot in your menu bar. Apps will prompt you to save any unsaved work before they close.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/quit-all.jpg","u":"https://amicoapps.com/app/quit-all/"},{"t":"Sensei Monitor","d":"Sensei Monitor is a realtime statistics engine that monitors every aspect of your Mac performance, right from your menu bar. The app is built completely in SwiftUI. Sensei Monitor is included as part of the Sensei app.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/sensei-monitor.jpg","u":"https://sensei.app/"},{"t":"CopyPaste Pro","d":"CopyPaste Pro automatically records a certain number of clips (50 by default) and allows you to quickly access them at a latter time. This menu bar app also allows you to add your own entries in an Archive: this comes in handy when you are using the same text strings frequently.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/copypaste-pro.jpg","u":"https://plumamazing.com/product/copypaste-pro-for-mac/"},{"t":"Neat","d":"All your GitHub notifications in your menu bar, so you can streamline your code review and ship with ease.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/neat-desert.jpg","u":"https://neat.run/"},{"t":"BetterDummy","d":"The new Apple Silicon Macs notoriously don’t allow sub-4K resolution displays to have HiDPI (“Retina”) resolutions. This menu bar app tricks macOS into thinking you’ve plugged in a 5K monitor.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/betterdummy.png","u":"https://github.com/waydabber/BetterDummy"},{"t":"Parallels Toolbox","d":"This menu bar app tells you the temperature of each of the CPU cores on your Mac, and also lists the fan speeds cooling off these cores.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/parallels-toolbox.png","u":"https://www.parallels.com/products/toolbox/"},{"t":"Speedy","d":"Speedy lets you perform a full speedtest in under ten seconds, directly from your menu bar through Apple’s servers.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/speedy.jpg","u":"https://goodsnooze.gumroad.com/l/speedyapp"},{"t":"Pareto Security","d":"This menu bar app checks regularly your Mac’s security configuration. No more facepalms when you realize you accidentally left your firewall or disk encryption disabled. The app code is fully open-sourced.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/paretoapp.png","u":"https://paretosecurity.com/"},{"t":"Chrono","d":"Chrono allows you to create a timer in seconds and shows the remaining time in your menu bar. Great for time boxing or general purpose timers to boost productivity. There’s also a log where you can analyse how you’ve spend your time.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/chrono.jpg","u":"https://apps.apple.com/de/app/chrono-menu-bar-timer/id1568892826"},{"t":"GlanceCal","d":"GlanceCal makes your appointments accessible via the menu bar to quickly check if you’re on schedule and see what’s up next.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/GlanceCal.png","u":"//apps.apple.com/de/app/glancecal-menu-bar-calendar/id1475680776"},{"t":"Pingr","d":"Pingr shows your current internet speed right in the menu bar with a clean, minimal widget — a quick at-a-glance check that tells you whether your connection is holding up without opening a speed test.","img":"https://getpingr.app/demo.gif","u":"https://getpingr.app/"},{"t":"Cooldown","d":"In macOS Monterey Apple introduced a new Low Power Mode for Mac. Cooldown is a simple menu bar app that allows you to quickly toggle Low Power Mode on and off.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/cooldown.jpeg","u":"https://goodsnooze.gumroad.com/l/cooldown"},{"t":"Bunch","d":"Bunch is a menu bar app that uses plain text scripts (‘Bunches’) to automate context switching. Bunches can open apps, specific files, web pages, and more.","img":"https://www.macmenubar.com/wp-content/uploads/2021/11/bunch.jpg","u":"https://bunchapp.co/"},{"t":"Color Peeker","d":"This menu bar app shows the hex code of the color under your mouse pointer. You can also turn on Copy on Right Click, so that when you right click, the color code is copied immediately.","img":"https://www.macmenubar.com/wp-content/uploads/2021/10/color-peeker.jpg","u":"https://apps.apple.com/us/app/color-peeker/id1592573138"},{"t":"Boring Old Menu Bar","d":"The transparent menu bar of MacOS 11 Big Sur is a nightmare for some people. This menu bar app brings back the “perfectly fine” macOS Catalina menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2021/10/boring-old-menu-bar.jpg","u":"https://www.publicspace.net/BoringOldMenuBar/index.html"},{"t":"TopNotch","d":"TopNotch hides the notch by making your menu bar black. It’s only cosmetic and doesn’t take away any screen real estate. The app can also be used on any non-notch Mac to make the menu bar black.","img":"https://www.macmenubar.com/wp-content/uploads/2021/10/TopNotch.jpg","u":"https://topnotch.app/"},{"t":"TrashMe","d":"TrashMe 3 helps you clean your Mac to recover space. But it also has a standalone menu bar app to monitor your system activity, like CPU load & temperature, memory usage, battery status, graphic card in use, and network configuration.","img":"https://www.macmenubar.com/wp-content/uploads/2021/10/trashme-3.jpg","u":"https://www.jibapps.com/apps/trashme3/"},{"t":"TunesArt","d":"Display a gorgeous album cover on your desktop. You can also control playback status and display the track name, artist and album name. Everything is customizable.","img":"https://www.macmenubar.com/wp-content/uploads/2021/10/tunesart.jpg","u":"https://www.jibapps.com/apps/tunesart/"},{"t":"AirBuddy","d":"With AirBuddy, you can open your AirPods case next to your Mac and see the current status right away, just like how it works on your iPhone. The menu bar gives you an overview of all of your nearby devices.","img":"https://www.macmenubar.com/wp-content/uploads/2021/10/AirBuddy.png","u":"https://v2.airbuddy.app/"},{"t":"System Color Picker","d":"The macOS color picker, but now as an app with more features. For instance: Quickly copy, paste, and convert colors in Hex, HSL, RGB, LCH format.","img":"https://www.macmenubar.com/wp-content/uploads/2021/09/system-color-picker.jpg","u":"https://sindresorhus.com/system-color-picker"},{"t":"MiniKey","d":"MiniKey is a one time password generator for two-factor authentication. It lets you copy generated codes with a click, and drag codes from MiniKey into authenticating apps.","img":"https://www.macmenubar.com/wp-content/uploads/2021/08/minikey.jpg","u":"https://minikey.app/"},{"t":"Battery Thing","d":"Show/hide your Mac’s battery icon when you want. This menu bar app also shows the statuses of your Bluetooth Apple products.","img":"https://www.macmenubar.com/wp-content/uploads/2021/08/battery-thing.jpg","u":"https://getbatterything.com/"},{"t":"NotePad","d":"Edit and write text in the menu bar. Easily and on the go, while doing other things on your Mac at the same time. The menu bar window is resizable.","img":"https://www.macmenubar.com/wp-content/uploads/2021/08/NotePad.jpg","u":"https://apps.apple.com/ro/app/notepad-simple-editor-text/id1571211844"},{"t":"Symbar","d":"Quickly access SF Symbols straight from your menu bar (list or grid view). Search or click on a symbol to copy its name to your clipboard. Toggle multicolor or monochrome rendering.","img":"https://www.macmenubar.com/wp-content/uploads/2021/07/Symbar.jpg","u":"https://apps.apple.com/us/app/symbar/id1577268085?mt=12&"},{"t":"Beaconly","d":"Beaconly turns your menu bar into a hub of productivity. Access your critical tools, services, and updates—all without interrupting your workflow. Track tasks from platforms like Jira, Asana, and Trello, monitor service statuses, or check crypto prices—all at a glance. New extensions added frequently.","img":"https://macmenubar.com/wp-content/uploads/2021/07/beaconly-3.png","u":"https://beaconly.app/"},{"t":"ZuriWeb","d":"A mini-browser that you can access quickly from your menu bar for multitasking. No more minimizing windows and losing track of where you left off.","img":"https://www.macmenubar.com/wp-content/uploads/2021/07/zuriweb.jpg","u":"https://apps.apple.com/app/zuriweb-menu-bar-web-browser/id1570407056"},{"t":"Web Wallpaper","d":"Web Wallpaper runs in your menu bar and lets you use websites as dynamic desktop wallpaper. You can specify virtually any URL to use as a dynamic desktop.","img":"https://www.macmenubar.com/wp-content/uploads/2021/07/web_wallpaper.jpg","u":"https://www.widgetworx.com/apps/webwall.html"},{"t":"BrowserSwitch","d":"This menu bar app provides an easy way to pick a different default browser. It only shows the browsers installed on your system.","img":"https://www.macmenubar.com/wp-content/uploads/2021/07/BrowserSwitch.jpg","u":"https://babubabustudios.wordpress.com/switchbrowser/"},{"t":"ClockDesk","d":"ClockDesk is a menu bar app that places a beautiful and practical date and time display right on your own desktop wallpaper. You have the ability to customize the clock’s appearance in terms of font, colors, and size.","img":"https://www.macmenubar.com/wp-content/uploads/2021/06/ClockDesk.jpg","u":"https://www.henninghagmann.de/clockdesk-en.html"},{"t":"Mauno","d":"Mauno is a menu bar app that allows you to quickly switch audio from Stereo to Mono (really useful for those one-sided YouTube videos).","img":"https://www.macmenubar.com/wp-content/uploads/2021/06/mauno.jpg","u":"https://github.com/inket/Mauno"},{"t":"Tuck","d":"Tuck allows you to quickly and simply clear multi-window clutter by hiding windows under your screen edges.","img":"https://www.macmenubar.com/wp-content/uploads/2021/06/tuck.jpg","u":"https://www.irradiatedsoftware.com/tuck/"},{"t":"Disk-O","d":"Disk-O lets you check the utilization of your Mac’s built-in storage device so you always know how much space is being used and how much is available.","img":"https://www.macmenubar.com/wp-content/uploads/2021/06/disko_poster.jpg","u":"https://www.widgetworx.com/apps/disko.html"},{"t":"Menu Snappr","d":"Menu Snappr II makes screen capturing feel effortless, whether you’re grabbing a full display, a single window, or a custom area across multiple monitors. With flexible formats, smart file naming, configurable shortcuts, and instant Preview access, it keeps screenshots fast, organized, and quietly out of your way.","img":"https://www.macmenubar.com/wp-content/uploads/2021/06/MenuSnappr.jpg","u":"https://www.widgetworx.com/apps/menu_snappr.html"},{"t":"Pandan","d":"This menu bar app shows you how long you have been actively using your computer, to make you aware and let you decide when it’s time to take a break.","img":"https://www.macmenubar.com/wp-content/uploads/2021/06/pandan.jpg","u":"https://apps.apple.com/app/id1569600264"},{"t":"TabbyNote","d":"A simple one-line micro note-taking app for all your daily plan, todos, list, notes, motivational phrases, etc.","img":"https://www.macmenubar.com/wp-content/uploads/2021/05/Tabby-Note.jpg","u":"https://apps.apple.com/us/app/tabbynote-menubar-note-taking/id1555858947"},{"t":"Balance Lock","d":"Balance Lock keeps the audio balanced in the middle so you don’t have to worry about checking the System Preferences every time you plug or unplug your headphones.","img":"https://www.macmenubar.com/wp-content/uploads/2021/05/Balance_Lock.jpg","u":"https://www.tunabellysoftware.com/balance_lock/"},{"t":"GoldenHour","d":"This menu bar app replicates the golden hour effect by reclaiming unused screen space when using your computer for video communication. It allows you to illuminate yourself with a consistent and pleasing rosy glow.","img":"https://www.macmenubar.com/wp-content/uploads/2021/05/goldenhour.jpg","u":"https://goldenhourapp.com/"},{"t":"Boze","d":"This menu bar app communicates with the headphones in the same way that the Bose mobile app does. Get complete visibilty and control on your Bose headphones from within your Mac’s menu bar.","img":"https://ph-files.imgix.net/b9fe6dde-4c17-4dd9-a71a-6bfdac292a47.gif","u":"https://www.boze.app/"},{"t":"AlDente","d":"AlDente is an all-in-one charging manager for MacBooks that extends the life of your MacBooks battery.","img":"https://macmenubar.com/wp-content/uploads/2021/05/aldente.webp","u":"https://apphousekitchen.com/"},{"t":"OnAir","d":"On Air is a menu bar app that subtly turns from 🟢 green to 🔴 red when another nearby On Air user’s microphone is in use.","img":"https://macmenubar.com/wp-content/uploads/2021/04/onair-1.jpg","u":"https://github.com/maxchuquimia/onair"},{"t":"Dropover","d":"Dropover sits in your menu bar. Once you drag files onto the icon, a square window pops open where you can drop them in. When you have everything together, you can drag the files as one stack from the Dropover window to a new location.","img":"https://macmenubar.com/wp-content/uploads/2021/04/dropover_1.webp","u":"https://dropoverapp.com/"},{"t":"JustStream","d":"With this menu bar app you can cast local media from your MacBook or Mac to other devices that are connected to the same Wi-Fi network. Broadcast your media in any format, any resolution (including Ultra HD), without the need for any cables.","img":"https://www.macmenubar.com/wp-content/uploads/2021/04/juststream.jpg","u":"https://www.electronic.us/products/just-stream/"},{"t":"UTC Time","d":"This menu bar app shows the UTC time, just as a quick reference. You can also copy the date & time in ISO8601 format.","img":"https://www.macmenubar.com/wp-content/uploads/2021/03/UTC-time.jpg","u":"https://apps.apple.com/app/id1538245904"},{"t":"One Goal","d":"Always distracted as soon as you open your MacBook? This simple menu bar app makes your current goal visible, so you stay focussed.","img":"https://www.macmenubar.com/wp-content/uploads/2021/03/one-goal.jpg","u":"https://timqian.com/one-goal/"},{"t":"ADB tools","d":"A menu bar app for common adb (Android Debug Bridge) tools like Connect device over tcp,Take screenshots and record screen, Open deeplinks, and Capture logcat.","img":"https://www.macmenubar.com/wp-content/uploads/2021/03/adb-tools-copy.jpg","u":"https://github.com/naman14/adb-tools-mac"},{"t":"Screen Box","d":"Need to pause your work? Screen Box remembers the apps on your screen. So after a fresh start, instead of having to open and position them all over again, you can return to your previous layout with just one click.","img":"https://www.macmenubar.com/wp-content/uploads/2021/03/screen-box.jpg","u":"https://screenbox.app/"},{"t":"Unclack","d":"Unclack automatically mutes your microphone while you type and un-mutes when you stop. No interaction required.","img":"https://www.macmenubar.com/wp-content/uploads/2021/03/unclack.jpg","u":"https://unclack.app/"},{"t":"Superpowered","d":"Join Zoom and Google Meet meetings in one-click from the menu bar. With Superpowered you can see your daily schedule and join meetings without having to go to your calendar.","img":"https://www.macmenubar.com/wp-content/uploads/2021/02/superpowered.jpg","u":"https://superpowered.me/"},{"t":"Instatus Out","d":"Monitor all your services you depend on (like Github, Zoom, Dropbox, Cloudflare, etc) in your menu bar and get notified when they change their status.","img":"https://www.macmenubar.com/wp-content/uploads/2021/02/instatus-out.jpg","u":"https://instatus.com/out"},{"t":"WordCounter","d":"Track how many words you write daily across all your applications. This tool integrates seamlessly into your workflow without opening other applications or additional windows.","img":"https://www.macmenubar.com/wp-content/uploads/2021/02/wordcounterapp.jpg","u":"https://wordcounterapp.com/"},{"t":"Battery Buddy","d":"Just like the default battery indicator in your menu bar, but cute. When your battery goes to red or yellow, and you get a bit stressed, this emoji battery indicator takes the edge off.","img":"https://www.macmenubar.com/wp-content/uploads/2021/02/battery-buddy.jpeg","u":"https://batterybuddy.app/"},{"t":"Jandi","d":"Jandi gives you a quick and satisfying way to check your GitHub contribution count directly without opening the website, making it easy to stay motivated and maintain your streak on even the busiest days.","img":"https://www.macmenubar.com/wp-content/uploads/2021/02/jandi.jpg","u":"https://github.com/techinpark/Jandi"},{"t":"DisplayBuddy","d":"DisplayBuddy lets you control your external displays: Setting brightness, contrast, and volume from your Mac’s menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2021/02/displaybuddy.jpg","u":"https://displaybuddy.app/"},{"t":"Gemini","d":"Keep your Mac duplicate-free at all times. Gemini lives in your menu bar. There it spots new copies and notifies you about them. You can view duplicates in detail or quickly destroy them.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/gemini.jpg","u":"https://macpaw.com/gemini"},{"t":"WebBuddy","d":"WebBuddy is a web browser that lives in your menu bar, intended for previewing links in non-browser apps and for quick searches so your main browser can be kept tidy.","img":"https://www.macmenubar.com/wp-content/uploads/2021/02/webbuddy.jpg","u":"https://apps.apple.com/app/apple-store/id525308400"},{"t":"Pika","d":"Tucked in your menu bar, Pika makes it simple to quickly find colours onscreen, in the format you need.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/pika.jpg","u":"https://superhighfives.com/pika"},{"t":"Utterly","d":"This menu bar app allows you to cancel background noises during your calls in Zoom, Hangouts, Slack, Teams and Discord. All the data processing is done locally without leaving your device.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/utterly-2.jpg","u":"https://www.utterly.app/"},{"t":"Weatherly","d":"Weatherly is a simple solution for seeing the current weather right from your menu bar. You can add different places with one click. If you want, and quickly see any updates in the weather conditions, temperature, and humidity.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/weatherly.jpg","u":"https://apps.apple.com/us/app/weatherly/id1499228739"},{"t":"Quick View Calendar","d":"This menu bar app shows the calendar of the month or the upcoming months, all with just one click, which is way easier than opening the Calendar app.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/quick-view-calendar.jpg","u":"https://apps.apple.com/us/app/quick-view-calendar/id1087080039"},{"t":"FlipTable","d":"An quick and easy way to have more than 200+ “flip table” emojis right in your Mac menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/fliptable.jpg","u":"https://sites.google.com/view/saigonmd-flippy/home"},{"t":"Casita","d":"With this menu bar app you can control media playing on Google Home, Chromecast, and other Cast-enabled devices. No configuration needed, just start the app and control your media.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/casita.jpg","u":"https://github.com/david-kuehn/casita"},{"t":"Tape","d":"Tape is a simple screen recording utility that lives in your menu bar. Choose the window you want to record. Once you’re done you get a link copied to your clipboard that you can share.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/tape.jpg","u":"https://www.tape.sh/"},{"t":"Spaceman","d":"This menu bar app allows you to easily visualise your Spaces. You can see which space you are currenly on (relative to your other spaces).","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/Spaceman.jpg","u":"https://github.com/Jaysce/Spaceman"},{"t":"IntelliDock","d":"IntelliDock hides the Dock when it’s overlapped by a window. So the Dock is only visible when nothing overlaps it.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/intellidock.jpg","u":"https://mightymac.app/intellidock/"},{"t":"Homie","d":"Control your HomeKit devices straight from your menu bar. There is also support for global keyboard shortcuts to enable scenes and automation support to trigger certain scenes automatically, e.g. when the computer is locked or wakes up from sleep.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/homie.jpg","u":"https://homie.frogg.io/"},{"t":"Surf","d":"Open websites and web apps directly from the menu bar for instant access.","img":"https://www.macmenubar.com/wp-content/uploads/2021/01/Surf.jpg","u":"https://apps.apple.com/app/surf-multitasking-browser/id1546568292"},{"t":"Scenecuts","d":"A menu bar app for controlling your HomeKit smart devices. You can edit the drop-down menu, add individual scenes to your menu bar, and assign them to global keyboard shortcuts.","img":"https://www.macmenubar.com/wp-content/uploads/2020/12/scenecuts.jpg","u":"https://apps.apple.com/us/app/scenecuts/id1540491573?mt=12"},{"t":"Clipbar","d":"Minimal menu bar app for stashing clipboard content. You can view the current and previous values, swap between current and previous values and clear clipboard content.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/clipbar.png","u":"https://github.com/this-fifo/clipbar"},{"t":"Noted","d":"A note taking app with a minimalistic design specifically developed for macOS Big Sur. Always open and ready for you to jot down whatever is on your mind. All of your notes are stored locally.","img":"https://www.macmenubar.com/wp-content/uploads/2020/12/noted.jpg","u":"https://apps.apple.com/us/app/noted/id1541403993"},{"t":"Roy","d":"Roy is a simple color picker for designers that lives in your menu bar with hex values only. Not too feature-heavy like other color pickers.","img":"https://www.macmenubar.com/wp-content/uploads/2020/12/roy.png","u":"https://www.useroy.com/"},{"t":"Instabar","d":"This Instagram app runs in your menu bar. It allows youto explore your feed, send messages, and watch your friends’ stories.","img":"https://www.macmenubar.com/wp-content/uploads/2020/12/instabar.jpg","u":"https://gumroad.com/l/InstaBar"},{"t":"Ejectify","d":"Ejectify automatically unmounts external volumes when your Mac starts sleeping, and mounts them again after it wakes up.","img":"https://www.macmenubar.com/wp-content/uploads/2020/12/ejectify.png","u":"https://ejectify.app/"},{"t":"Hot","d":"Hot is a menu bar app that displays in real time CPU throttling due to thermal issues.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/hot.jpg","u":"https://github.com/macmade/Hot"},{"t":"Clicker for YouTube","d":"Instant access to the latest videos from your subscriptions no matter where you are on your Mac. The menu bar app comes with a built-in ad blocker and picture-in-picture support.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/clicker-for-youtube.jpg","u":"https://www.dbklabs.com/clicker-for-youtube/"},{"t":"Quick Note","d":"Quick Note is a clutter-free note-taking in your menu bar. optimized for a fast and quick note-taking experience. The Note floats on top of all other apps, so your notes are always visible.","img":"https://www.macmenubar.com/wp-content/uploads/2020/12/quick-note.jpg","u":"https://apps.apple.com/in/app/quicknote-one-click-notes/id1472935217"},{"t":"PastePal","d":"PastePal allows you to easily manage your pasteboard history with a variety of file types support like text and images. This menu bar app also comes with a note and shortcut manager.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/pastepal.jpg","u":"https://onmyway133.com/pastepal/"},{"t":"Sound Control","d":"Sound Control is a menu bar app that adds advanced audio controls to your MacOS. Control the audio of each of your apps independently with per-app volume, EQ, balance, and audio routing.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/sound-control.jpg","u":"https://staticz.com/soundcontrol/"},{"t":"WordTime","d":"WordTime swaps your clock’s digits for plain English phrases like ‘ten past three’ or ‘quarter to five,’ displaying the time in a way that feels more conversational and a little more human than plain numbers.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/wordtime.jpg","u":"https://github.com/Demonstrandum/WordTime"},{"t":"AnyIpsum","d":"This menu bar app lets you select a lorem ipsum variation and copy it to the pasteboard.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/anylpsum.jpg","u":"https://github.com/jlowgren/AnyIpsum"},{"t":"MicSwift","d":"Mute and unmute your microphone with a single click on the menu bar icon. There is also a walkie-talkie mode: the mic will be active only while the shortcut is pressed.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/micSwitch.jpg","u":"https://github.com/dstd/micSwitch"},{"t":"Nightscout Menu Bar","d":"An app for displaying Nightscout blood glucose data in your menu bar. It automatically pulls units (mg/dL or mmol/L) from Nightscout. It also has an ption to configure glucose display (optionally include delta and time).","img":"https://www.macmenubar.com/wp-content/uploads/2020/12/nightscout.jpg","u":"https://github.com/mpangburn/NightscoutMenuBar"},{"t":"Gitify","d":"All your GitHub notifications, displayed in your menu bar. Gitify informs you for any GitHub notifications without being annoying. Works with GitHub and GitHub Enterprise. You can even connect multiple accounts.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/gitify.jpg","u":"https://www.gitify.io/"},{"t":"EjectBar","d":"Eject multiple mounted volumes in one click with this easy to use menu bar app. You can also favorite a mounted volume to save it for quick unmounting later.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/ejectbar.jpg","u":"https://github.com/bradleybernard/EjectBar"},{"t":"Silicon Info","d":"Silicon Info is a tiny menu bar app that allows you to quickly view the architecture of the currently running application.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/silicon-info.jpg","u":"https://github.com/billycastelli/Silicon-Info"},{"t":"Nightfall","d":"A menu bar app for quickly toggling macOS’s dark mode. Left clicking the icon toggles dark mode; right clicking reveals more options.","img":"https://macmenubar.com/wp-content/uploads/2020/12/nightfall.jpg","u":"https://github.com/r-thomson/Nightfall"},{"t":"CoffeeBar","d":"When the CoffeeBar is off the app will allow your Mac to go to sleep. When it’s on the app will keep your Mac awake indefintly.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/coffeeBar.png","u":"https://github.com/timothypholmes/CoffeeBar"},{"t":"MySonoff","d":"This menu bar app lets you control the Sonoff switches in your home. You do need to have Bitbar installed.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/mysonoff.jpg","u":"https://github.com/pvdabeel/mysonoff"},{"t":"Xclean","d":"Xclean is menu bar app that provides a convenient way to clear Xcode’s derived data or module cache. It also supports automatic removal of derived data that is no longer associated with an existing project.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/Xclean.png","u":"https://github.com/macmade/Xclean"},{"t":"MyTesla","d":"MyTesla is a menu bar app that displays information about (and allows you to remotely control) your Tesla.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/mytesla.jpg","u":"https://github.com/pvdabeel/mytesla"},{"t":"Clicker for Netflix","d":"Instant access to your recently watched shows no matter where you are on your Mac. Picture-in-Picture support is built right in.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/clicker-for-netflix.jpg","u":"https://dbklabs.gumroad.com/l/clicker-for-netflix"},{"t":"Baritone","d":"Baritone brings Spotify playback to your Mac’s menu bar, letting you skip, pause, and browse tracks without switching to the full app — a tidy way to stay in control of your music mid-work.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/baritone.jpg","u":"https://github.com/tma02/baritone"},{"t":"Menu Bar Docker","d":"This menu bar app shows the Docker containers running on your machine so you can start/stop them with a simple click.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/docker-menu.jpg","u":"https://github.com/rdsubhas/menubar-docker"},{"t":"Menu Bar Ticker","d":"Menu Bar Ticker displays the current artist and song playing in iTunes or Spotify. No other fancy features!","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/menu-bar-ticker-active.png","u":"https://github.com/serban/menubar-ticker"},{"t":"Remote Wake Up","d":"Remote Wake Up allows you to remotely switch on, reboot or shut down every device over your LAN. You can even wake up devices over the internet.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/remote-wake-up.jpg","u":"https://www.witt-software.com/remotewakeup/"},{"t":"Switch Manager","d":"With this menu bar app you can manage all your frequently used Switches from one place.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/switch-manager.jpg","u":"https://www.doyourdata.com/mac-manager/switch-manager.html"},{"t":"Display Maestro","d":"This menu bar app gives you full control over attached displays, allowing the use of all available resolutions and bit depths.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/display-mestro.jpg","u":"https://www.koingosw.com/products/displaymaestro/"},{"t":"1Password mini","d":"1Password mini gives you instant access to everything you have saved in 1Password. It also automatically detects the app or website you have open and suggests relevant logins and passwords to fill.","img":"https://macmenubar.com/wp-content/uploads/2020/11/1password-mini-2.png","u":"https://support.1password.com/1password-mini-mac/"},{"t":"Alarm Clock Pro","d":"You can use Alarm Clock Pro fot almost everything. For instance to ping web pages, launch URLs, open files, erase folders, execute shell commands.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/alarm-clock-pro.jpg","u":"https://www.koingosw.com/products/alarmclockpro/"},{"t":"HighTop","d":"This menu bar app is a convenient way (drag and drop) to work with your favorite local folders, Google Drive, or Dropbox. Log into multiple accounts and drag and drop to upload, download, or move files.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/hightop.jpg","u":"https://apps.apple.com/us/app/id1529666842"},{"t":"Thor","d":"Thor sits in the menu bar and allows you to create custom keyboard shortcuts for your apps.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/thor.jpg","u":"https://github.com/gbammc/Thor"},{"t":"Watts","d":"Watts reminds you to do all the right things for your battery, like doing an initial battery calibration when you get a new battery, then re-calibrating it on occasion.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/watts.jpg","u":"http://www.binarytricks.com/"},{"t":"OwlOCR","d":"With this text recognition application you can capture almost any text on your screen. You can use PDF files, image files and even your iOS device camera.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/OwlOCR.jpg","u":"https://owlocr.com/"},{"t":"Hide My Bar","d":"This menu bar app turns off the touch bar at will, so you can avoid accidental taps.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/hide-my-bar.jpg","u":"https://hidemybar.clemstation.com/"},{"t":"Juice!","d":"The menu bar app Juice! keeps an eye on your MacBook’s battery charge level and can play a sound when it’s time to plug in or when it’s OK to disconnect from the mains.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/juice.jpg","u":"https://www.ettoresoftware.com/mac-apps/juice/"},{"t":"TypeIt4me","d":"This menu bar app speeds up your typing by instantly replacing short abbreviations with longer snippets of text and / or pictures as you go along.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/typeit4me.jpg","u":"https://www.ettoresoftware.com/mac-apps/typeit4me/"},{"t":"CurrentKey","d":"CurrentKey that lets you manage your time (spent across apps) and spaces (virtual desktops). This menu bar app even lets you jump directly to a specific space, without needing to swipe between them or open Mission Control.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/CurrentKey.jpg","u":"https://currentkey.com/"},{"t":"ForkLift Mini","d":"ForkLift Mini is a menu bar app that lets you mount a saved remote connection as disk, upload files to a remote server from Finder by drag and drop, or run a saved Synclet.","img":"https://www.macmenubar.com/wp-content/uploads/2020/10/forklift-mini.jpg","u":"https://binarynights.com/"},{"t":"Niftyman","d":"Niftyman brings Notion to your Mac’s Menu Bar. Now you have multiple pages of Notion just one click away!","img":"https://www.macmenubar.com/wp-content/uploads/2020/10/niftyman.jpg","u":"https://shadowfax.app/niftyman"},{"t":"Jumpshare","d":"Jumpshare combines file sharing, screenshot capture, and video recording – all in one platform. Drag files to the Jumpshare menu bar icon and a shareable link will be copied to your clipboard.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/jumpshare.jpg","u":"https://jumpshare.com/"},{"t":"DefaultBrowser","d":"DefaultBrowser allows you to automatically open links using the last browser you’ve used or any browser you specify. It also lets you switch browser immediately by choosing one active browser in the menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/default-browser.jpg","u":"https://defaultbrowser.app/"},{"t":"How long left","d":"Stop checking your calendar. This menu bar app helps you manage your time by displaying a countdown for your current and upcoming calendar events.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/how-long-left.jpg","u":"https://apps.apple.com/au/app/how-long-left/id1388832966"},{"t":"CricMenu","d":"With CricMenu you can track the realtime cricket match score on your Mac’s Menu Bar. Including: IPL Matches, Worldcup Matches, International Matches and Country cricket.","img":"https://www.macmenubar.com/wp-content/uploads/2020/10/CricMenu.jpg","u":"https://gumroad.com/l/TnPmfO"},{"t":"Plume","d":"Plume is a simple note-taking app that lets you write down your thoughts. It also has an inbuilt to-do list button that lets you quickly generate to-do lists.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/plume.jpg","u":"https://apps.apple.com/app/id1513115773"},{"t":"Tick Tick","d":"Tick Tick lets you capture ideas and organize your life and tasks right from your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/tick-tick.jpg","u":"https://ticktick.com/about/mac"},{"t":"Menu Bar Dock","d":"Menu Bar Dock places the apps you currently have open onto your menu bar. Now you have freed up all that space at the bottom of your screen!","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/menu-bar-dock.jpg","u":"https://www.etggames.com/menu-bar-dock"},{"t":"Better Menu Bar","d":"Better Menu Bar shows your computer stats in your menu bar. It gives you information about your CPU, RAM, Battery, and Network in a consolidated window. It also has an automatic RAM cleanup feature that comes in handy when your computer falls below a certain level of free RAM.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/better-menu-bar.jpg","u":"https://apps.apple.com/us/app/better-menubar/id1472818562"},{"t":"Culrs","d":"Culrs lets you explore the color palettes. It has different categories such as monochromatic, triad, analogous, and tetradic to simplify your search for different themes. Once you have a palette chosen, simply click the color to copy its hex code.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/culrs.jpg","u":"https://culrs.app/"},{"t":"iPic","d":"iPic is an image & file upload app in your menu bar. The images will be automatically uploaded when dropped. iPic can automatically upload and save the links in Markdown format, as well as directly paste and insert them.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/ipic.jpg","u":"https://apps.apple.com/us/app/ipic-image-file-upload-tool/id1101244278"},{"t":"Hourly News","d":"As a podcast app, Hourly News plays the most recent news updates from multiple news sources like NPR, BBC, CBC, ABC, CBS, WSJ, Bloomberg, ESPN, VOA, SRN, FOX News updates, your own custom podcast sources and more.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/Hourly-News.jpg","u":"https://hourlynewsapp.com/"},{"t":"MeetingBar","d":"With a large number of meetings, it is very convenient to keep them in front of your eyes: in your menu bar! MeetingBar integrated with Google Meet and Zoom.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/meetingbar.jpg","u":"https://meetingbar.onrender.com/"},{"t":"Downlink","d":"Real-time satellite imagery on your desktop. Every 20 minutes (or every hour, you pick), Downlink updates your desktop background with a fresh image of Earth. You can even create your own views.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/downlink.jpg","u":"https://downlinkapp.com/"},{"t":"AdGuard","d":"This standalone ad blocker for Mac lives in your menu bar. All settings and statistics can be found there. AdGuard blocks all kinds of ads in all browsers and even in other apps.","img":"https://www.macmenubar.com/wp-content/uploads/2020/08/adguard.jpg","u":"https://adguard.com"},{"t":"Git Streaks","d":"Git Streaks is a menu bar app that shows your GitHub green squares and contribution stats.","img":"https://www.macmenubar.com/wp-content/uploads/2020/08/Git-Streaks.jpg","u":"https://apps.apple.com/app/git-streaks/id1525795950"},{"t":"yFi","d":"yFi is a menu bar app that continuously monitors your WiFi TX Rate and reconnects if it’s getting bad. This ensures you’ll never have lags and dropouts in online meetings.","img":"https://www.macmenubar.com/wp-content/uploads/2020/08/yFi.jpg","u":"https://yfi.coderose.io/"},{"t":"iStatistica","d":"iStatistica is a system monitor for macOS that keeps an eye on your CPU, memory, disk usage and network activity.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/iStatistica.jpg","u":"https://apps.apple.com/us/app/istatistica/id1025822138"},{"t":"Plash","d":"Plash lets you set any website as your Mac wallpaper. Just click the menu bar icon and paste in the URL you want to use.","img":"https://www.macmenubar.com/wp-content/uploads/2020/02/Plash.jpg","u":"https://sindresorhus.com/plash"},{"t":"Recordia","d":"Record input audio directly from your menu bar. You can also trim the recording when done and
