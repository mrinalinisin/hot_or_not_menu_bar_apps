sync them to iCloud.","img":"https://www.macmenubar.com/wp-content/uploads/2020/09/recordia.jpg","u":"https://sindresorhus.com/recordia"},{"t":"Batteries","d":"Batteries allows you to track all of your devices’ batteries (your Mac, iPhone/iPad/iPod, AirPods and bluetooth devices) from one place. When any of your devices are running low on battery, you’ll receive a low battery notification.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/batteries.jpg","u":"https://www.fadel.io/batteries"},{"t":"MonkeyMind","d":"Whenever you’re in deep work and something pops into your mind, simply add it to MonkeyMind. Just like in Spotlight. The entry will get added to the menu bar list and you can deal with it later.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/monkeymind.jpg","u":"https://apps.apple.com/us/app/monkeymind/id1503893432"},{"t":"Pi Stats","d":"Follow up and manage the status of your Pi-hole(s). Comes in handy when you’re annoyed by having to open up the web interface every time you want to disable pihole.","img":"https://macmenubar.com/wp-content/uploads/2020/08/pi-stats-3.webp","u":"https://github.com/Bunn/PiStats"},{"t":"GitPigeon","d":"GitPigeon displays notifications from GitHub in your menu bar. See all your GitHub issues and pull requests in one app.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/gitpigeon.jpg","u":"https://gitpigeon.com/"},{"t":"DarkNight","d":"Automatically switch between light and dark wallpapers based on sunrise and sunset, or on your own schedule. Or toggle dark and light wallpaper wint one click in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/darknight.jpg","u":"https://hobbyistsoftware.com/darknight"},{"t":"FastScripts","d":"With FastScripts you can quickly execute AppleScript and shell scripts from within your menu bar. Free to use with up to 10 shortcuts.","img":"https://www.macmenubar.com/wp-content/uploads/2020/08/FastScripts.jpg","u":"https://red-sweater.com/fastscripts/"},{"t":"Lunar","d":"With Lunar you can control the brightness of you external monitors, directly from your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2020/08/lunar.jpg","u":"https://lunar.fyi/"},{"t":"Stats","d":"A simple macOS system monitor in your menu bar: CPU, netwerk and memory usage, disk utilization, sensors information (temperature, voltage and power) and battery level.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/stats.jpg","u":"https://github.com/exelban/stats"},{"t":"MenuWeather+","d":"Fast and easy way to see the current weather in your menu bar. Use your current location, or use a custom location of your choosing.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/MenuWeatherPlus.jpg","u":"https://apps.apple.com/tt/app/menuweather/id1518142110"},{"t":"Shazam","d":"Identify any song playing around you with a single click from your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/shazam.jpg","u":"https://apps.apple.com/nl/app/shazam/id897118787"},{"t":"Litur","d":"Litur is a color picker built for designers and developers. This menu bar app helps you find, collect and organize all the colors around you.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/litur.jpg","u":"https://litur.app/"},{"t":"Mutify","d":"Mute and unmute your microphone directly from menu bar. You can also enable push-to-talk mode. Mutify works with Zoom, Hangout, Slack, Skype, GoToMeeting, Webex, Telegram, Viber, FB Messanger, etc.","img":"https://www.macmenubar.com/wp-content/uploads/2020/07/mutify.jpg","u":"https://apps.apple.com/ca/app/mutify/id1510206330"},{"t":"Moment","d":"Moment is a menu bar based countdown app to help you remember the most memorable days of your life. Every single event can be added to the menu bar as an individual menu item.","img":"https://www.macmenubar.com/wp-content/uploads/2020/06/moment.jpg","u":"https://fireball.studio/moment"},{"t":"Mountain Duck","d":"This menu bar app lets you access remote servers, WebDAV servers, Dropbox, Google, OneDrive, S3 servers and more via a drop-down interface. It’s also a cross-platform solution that provides the same tools for Windows users.","img":"https://www.macmenubar.com/wp-content/uploads/2020/06/mountain-duck.jpg","u":"https://mountainduck.io/"},{"t":"MonitorControl","d":"Adjust external monitor settings including brightness, contrast, and volume from your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2020/06/monitorcontrol.jpg","u":"https://github.com/the0neyouseek/MonitorControl"},{"t":"Heads Down","d":"Heads Down detects your application of choice and automatically enables macOS’s “Do Not Disturb” feature. This menu bar app is for coders and designers and supports VS Code, Sublime Text, XCode, IntelliJ IDEA, Figma and Sketch.","img":"https://macmenubar.com/wp-content/uploads/2020/07/heads_down.webp","u":"https://thearea42.com/headsdown/"},{"t":"CCMenu","d":"With CCMenu you can keep track of your repositories’ latest build status. It also sends notifications when a build status changes.","img":"https://www.macmenubar.com/wp-content/uploads/2020/05/CCmenu.jpg","u":"http://ccmenu.org/"},{"t":"TinyStopwatch","d":"With TinyStopwatch you can easily keep track of the time you spent on work or other activities. During use, the time and current status (running, paused, stopped) are displayed in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2020/05/TinyStopwatch.jpg","u":"https://apps.apple.com/app/tinystopwatch/id1447754003"},{"t":"MicCheck","d":"Be aware when your microphone is active in the background. MicCheck saves you from an embarrassing situation.","img":"https://ph-files.imgix.net/8934dee9-3c92-47f1-b4d3-753f1e393ce8.gif","u":"https://gumroad.com/l/mic-check"},{"t":"PiBar","d":"PiBar gives you all the tools you need to manage your Pi-hole right from your menu bar. It even supports multiple Pi-holes.","img":"https://www.macmenubar.com/wp-content/uploads/2020/05/PiBar.jpg","u":"https://github.com/amiantos/pibar"},{"t":"Crypto Tools","d":"Live conversion between hundreds of crypto and fiat currencies in your menu bar. The free version is limited to 6 currencies.","img":"https://www.macmenubar.com/wp-content/uploads/2020/05/crypto-tools.jpg","u":"https://apps.apple.com/app/crypto-tools/id1345035239"},{"t":"Pommie","d":"Increase your focus and boost your productivity by managing your time into strict work and break periods. This pomodoro app even has Apple Watch support.","img":"https://www.macmenubar.com/wp-content/uploads/2020/05/pommie.jpg","u":"https://apps.apple.com/app/id963504129"},{"t":"Minco","d":"Minco is a minuscule time-tracker that lives in your menu bar. You can also create daily, weekly, monthly reports or review your work-time in the Calendar app.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/minco.jpg","u":"https://www.celmaro.com/minco/"},{"t":"Timey","d":"Timey is a simple timer and stopwatch that shows up in the menu bar. Time presets are the core part of the app.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/timey.jpg","u":"https://apps.apple.com/us/app/timey-3-a-menu-bar-timer/id1421143542"},{"t":"Focusey","d":"This lightweight Pomodoro and checklist app lets you customize your technique by changing the time of respective parts of the cycle and intervals between long breaks.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/focusey.jpg","u":"https://getniceapps.com/focusey"},{"t":"Menu Bar UTC","d":"This app displays the UTC (Coordinated Universal Time) in your menu bar. Noting more, noting less.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/utc.jpg","u":"https://apps.apple.com/app/menu-bar-utc/id1505489419"},{"t":"Flow","d":"Whith this minimalistic pomodoro based focus timer you can divide your workflow into sections. Sleek, simple design! Flow also allows you to blacklist apps so you won’t get distracted.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/flow.jpg","u":"https://flowapp.info/"},{"t":"Presentify","d":"Presentify is a menu bar app that lets you annotate anything and not just screenshots or images. It can also annotate videos, pdf, images, code, etc. Nice for online classes, video calls, tutorials and presentations.","img":"https://www.macmenubar.com/wp-content/uploads/2020/05/presentify.jpg","u":"https://presentify.compzets.com/"},{"t":"Mic Drop","d":"Mic Drop allows you to quickly mute and unmute yourself. This menu bar app mutes your audio at the system level and works with Zoom, Slack, Google Meet, Skype, Microsoft Teams, Discord, Vidyo, Houseparty, and many more.","img":"https://www.macmenubar.com/wp-content/uploads/2020/05/Mic-Drop.png","u":"https://getmicdrop.com/"},{"t":"Swish","d":"This menu bar app lets you control windows and applications right from your trackpad with two-finger swipe, pinch, tap and hold gestures.","img":"https://www.macmenubar.com/wp-content/uploads/2020/05/swish.jpg","u":"https://highlyopinionated.co/swish/"},{"t":"Clockey","d":"Clockey lets you add the time from as many timezones as you want to your menu bar. Quickly access any time zone with one click.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/clockey.jpg","u":"https://apps.apple.com/us/app/clockey-world-clocks-in-your-menu-bar/id1218199366?"},{"t":"InstaShare","d":"This menu bar app gives you a better AirDrop experience. It also works with computers that don’t support AirDrop, like Android and Windows PC.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/instashare.jpg","u":"http://instashareapp.com/mac.html"},{"t":"Plug Spy","d":"Plug Spy triggers actions in case of unexpected occurrences. Instant notification on you phone will give you additional security if you leave your Mac alone.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/PlugSpy.jpg","u":"https://www.celmaro.com/plugspy/"},{"t":"Spotless","d":"Spotless is a menu bar app that sorts your files so you can clear your desktop. It allows you to create completely customizable rules but you can also drag & drop.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/spotless.jpg","u":"https://www.lightpillar.com/spotless.html"},{"t":"Timing","d":"Instead of making you start and stop timers, the menu bar app Timing automatically records which Mac apps, websites and documents you use.","img":"https://www.macmenubar.com/wp-content/uploads/2020/04/timing.jpg","u":"https://timingapp.com/"},{"t":"Jot","d":"Jot is that random piece of notes paper that lives in your menu bar. It’s a place for short lived storage for notes, ideas and things-to-tweet. There’s nothing to configure, it saves as you type.","img":"https://www.macmenubar.com/wp-content/uploads/2020/03/jot.jpg","u":"https://getjot.app/"},{"t":"Unsplash Wallpapers","d":"Unsplash Wallpapers for Mac makes it easy to find and preview new wallpapers, right in your menu bar. Two clicks, that’s it.","img":"https://www.macmenubar.com/wp-content/uploads/2020/03/unsplash.jpeg","u":"https://apps.apple.com/us/app/unsplash-wallpapers/id1284863847"},{"t":"Catapult","d":"Catapult helps you open your projects more easily. Drag and drop any folder or file and select which app you want to open it with. A new project is created and you can access it quickly through your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2020/03/catapult.jpg","u":"https://github.com/cerpow/catapult"},{"t":"SoundBar","d":"SoundBar is a distraction-free SoundCloud music player right in your menu bar. Just copy/paste a playlist url and play it. No need to create an account.","img":"https://www.macmenubar.com/wp-content/uploads/2020/03/soundbar.jpg","u":"https://soundbar.app/"},{"t":"Home Assistent Menu","d":"With this menu bar app you can perform common Home Assistant functions. Currently HA Menu supports turning available switches, lights, automations and input_boolean’s on and off.","img":"https://www.macmenubar.com/wp-content/uploads/2020/03/app-home-assistent.jpeg","u":"https://github.com/codechimp-org/ha-menu/"},{"t":"Hand Mirror","d":"A one-click camera check, right from the menu bar. Ideal if you’re constantly opening Photo Booth to pre-check your face before jumping onto calls.","img":"https://www.macmenubar.com/wp-content/uploads/2020/03/handmirror.jpeg","u":"https://handmirror.app/"},{"t":"Enpass","d":"A secure vault to store everything at one place using a single master password. All your data is saved locally on your device. Your information never leaves your device until you explicitly choose to do so by syncing through any of your cloud accounts, and even then it’s encrypted.","img":"https://www.macmenubar.com/wp-content/uploads/2020/03/enpass.jpg","u":"https://www.enpass.io/"},{"t":"HiddenMe","d":"Clear desktop clutter instantly and reclaim valuable screen space with one click whenever you need to focus on your current work and all ongoing projects.","img":"https://www.macmenubar.com/wp-content/uploads/2020/02/hiddenme.jpg","u":"https://apps.apple.com/us/app/hiddenme/id467040476"},{"t":"Hidden Bar","d":"Hidden Bar lets you hide your menu bar items. You can even configure the auto-hide time.","img":"https://i0.wp.com/www.appletips.nl/wp-content/uploads/2019/12/tutorial.gif?resize=600%2C174&ssl=1","u":"https://apps.apple.com/us/app/hidden-bar/id1452453066"},{"t":"Caffeinated","d":"Caffeinated prevents your Mac from going to sleep, dimming your screen or starting the screensaver. The app is optimized for Retina Displays and Dark Mode.","img":"https://www.macmenubar.com/wp-content/uploads/2020/03/Caffeinated.jpg","u":"https://caffeinated.app/"},{"t":"Tot","d":"With Tot you can collect and edit text across your Mac, iPhone, and iPad, all via the menu bar. Seven color-coded dots let you organize your notes.","img":"https://www.macmenubar.com/wp-content/uploads/2020/02/tot.jpg","u":"https://tot.rocks/"},{"t":"Memory Diag","d":"Memory Diag helps you to keep an eye on your systems memory. Quickly access detailed memory information and diagnosis with one click on your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2020/02/memory-diag.jpg","u":"https://apps.apple.com/nl/app/memory-diag/id748212890"},{"t":"MenubarClock","d":"Track time across multiple time zones with up to five world clocks visible simultaneously in your menu bar for coordinating seamlessly across global teams and offices.","img":"https://www.macmenubar.com/wp-content/uploads/2020/02/Menubarclock.jpg","u":"https://apps.apple.com/us/app/menubarclock/id492167985"},{"t":"TweetFast","d":"Compose and send out tweets from your desktop. Regardless of whatever you are doing on your Mac, you can tweet your heart out in literally seconds. Don’t let those thoughts get away!","img":"https://image.ibb.co/hfR3Vy/1_compressed.gif","u":"https://mactweeter.web.app/"},{"t":"Appstat","d":"Are you an app developer with an active subscription with Apple? This menu bar app displays all the apps you have for sale and how much you are making with each one.","img":"https://www.macmenubar.com/wp-content/uploads/2020/02/appstat.jpg","u":"https://gumroad.com/l/appstat"},{"t":"StatusBuddy","d":"With StatusBuddy you can quickly check the status of Apple’s various online services, like iCloud, Apple Music, Apple TV+, and App Store Connect.","img":"https://www.macmenubar.com/wp-content/uploads/2020/02/Statusbuddy.jpg","u":"https://gumroad.com/l/statusbuddy"},{"t":"Moosti","d":"Moosti is a Pomodoro app but with more flexibility and extra features to boost your productivity. You can set the timer on ‘focus’ (10 to 60 minutes), Short Break (3 to 5 minutes) and Long Break (5 to 30 minutes).","img":"https://www.macmenubar.com/wp-content/uploads/2020/02/Moosti.jpg","u":"https://www.moosti.com/"},{"t":"Tiny Ipsum","d":"This menu bar app gives you quick access to a large array of placeholder text, also known as Lorem Ipsum – or simply Lipsum. Quickly copy a set of words, sentences, or paragraphs in a ready-to-paste format. You can choose from a variety of built-in Lipsum presets, or create your own.","img":"https://www.macmenubar.com/wp-content/uploads/2020/02/Tiny-Ipsum.jpg","u":"https://tinyipsum.com/"},{"t":"Hard G","d":"Hard G brings Giphy search to your Mac menu bar. It lets you quickly find and use GIFs.","img":"https://www.macmenubar.com/wp-content/uploads/2020/01/Hard-g.jpg","u":"https://apps.apple.com/ca/app/hard-g/id1493198738"},{"t":"Spelling Alphabet","d":"Eliminate mistakes reading letters and numbers by using clear, phonetic words from the NATO spelling alphabet. Spelling Alphabet runs in the background un-intrusively and is always available with just a click.","img":"https://www.macmenubar.com/wp-content/uploads/2020/01/Spelling-alphabet.png","u":"https://www.tunabellysoftware.com/spelling_alphabet/"},{"t":"Unplug Alarm","d":"Protect your MacBook from theft when you’re working in remote spaces. Get notified when someone unplugs your MacBook from power or closes its screen.","img":"https://www.macmenubar.com/wp-content/uploads/2020/01/Unplug-alarm.jpg","u":"https://unplugalarm.app/"},{"t":"CoronaVirus Outbreak Tracker","d":"Monitor global COVID-19 statistics and outbreak trends in real time with live data updates that are accessible directly from your menu bar without any browser distractions whatsoever.","img":"https://www.macmenubar.com/wp-content/uploads/2020/01/CoronaVirus-Outbreak-Tracker.jpg","u":"https://gumroad.com/l/coronavirusapp"},{"t":"TG Pro","d":"Quickly view CPU, GPU, logic board or hard drive temperatures, check battery health and the other hardware diagnostics. TG Pro supports all Macs from 2008 and newer.","img":"https://www.macmenubar.com/wp-content/uploads/2020/01/TG-Pro-344x1024.png","u":"https://www.tunabellysoftware.com/tgpro/"},{"t":"Menubar Colors","d":"Menubar Colors is a Mac menu bar app that allows for quick access to the system-wide color panel.","img":"https://www.macmenubar.com/wp-content/uploads/2020/01/Menubar-colors.jpg","u":"https://github.com/nvzqz/Menubar-Colors"},{"t":"Up Next","d":"See your day at a glance. Up Next puts your next appointment in your menu bar, with the time remaining until that next meeting. Works with Google and iCloud calendars.","img":"https://www.macmenubar.com/wp-content/uploads/2020/01/Up-next.jpg","u":"https://ellen.li/up-next/"},{"t":"Better Battery 2","d":"This menu bar app provides information and stats about your MacBook’s battery and records all these data as well as the total battery- and usage time of your notebook.","img":"https://www.macmenubar.com/wp-content/uploads/2020/01/Better-Battery-2.jpg","u":"https://www.agross.at/battery2"},{"t":"Battery Charging Alert","d":"With the menu bar app, you receive an alert when your MacBook is plugged in or unplugged, and when your battery percentage reaches a preset level, so you know when to plug in your computer to keep it from dying or to unplug it and save your battery life.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Battery-charching-alert.jpg","u":"https://apps.apple.com/us/app/battery-charging-alert/id1161872911"},{"t":"WiFi Wireless Signal Strength Explorer","d":"WiFi Wireless Signal Strength Explorer allows you to see wireless signal strength right in your menu bar. You can check the strength, IP address, and speed of the connected WiFi network.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Wifi-wireless-signal-strength-explorer.jpeg","u":"https://apps.apple.com/tn/app/wifi-wireless-signal-strength-explorer-and-scanner/id1177934624"},{"t":"MenuMinder","d":"MenuMinder is a menu bar app for keeping your plans in order and making sure you are reminded of the tasks and plans you have set for yourself.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/MenuMinder.jpg","u":"http://www.limitpointstore.com/products/menuminder/"},{"t":"Wimoweh","d":"With Wimoweh you have better control over how your Mac sleeps. The app comes in handy when you’re waiting for a lengthy job to finish and want your Mac to sleep afterwards.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/wimoweh.jpg","u":"https://apps.apple.com/nl/app/wimoweh/id610341008"},{"t":"Xnip","d":"Xnip is a powerful screen capturing menu bar app. You can even resize your captured region when you are annotating. Capturing while scrolling is also possible.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Xnip.jpg","u":"http://xnipapp.com/"},{"t":"Check Off","d":"Check Off is a task management app that runs in your menu bar. Tasks can be placed within folders, and have labels attached to each task.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/CheckOff.jpg","u":"https://apps.apple.com/us/app/check-off-a-task-manager/id458418895"},{"t":"PIA","d":"Private Internet Access is a popular VPN solution for protecting your privacy while browsing the web. Their app lives in your menu bar from where you can connect to your account and select the preferred server location.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/pia.jpg","u":"https://privateinternetaccess.com"},{"t":"Ethernet Status","d":"See the status of your LAN/Ethernet connection right from the menu bar. You can also check the status, IP address and speed of the ethernet adaptors.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Ethernet-status.jpg","u":"https://apps.apple.com/at/app/ethernet-status-lite/id1227616292"},{"t":"Gitbar","d":"This menu bar app shows your open source GitHub contribution stats and helps you setting your contribution goals.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Gitbar.jpg","u":"https://github.com/Shikkic/gitbar"},{"t":"News Headlines","d":"Get the latest breaking news from all over the world, easy with just one click in your Mac menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/News-headlines.jpeg","u":"https://apps.apple.com/us/app/news-headlines-app-for-google/id998256682"},{"t":"Port Manager","d":"Use your menu bar to find, open and kill ports in a couple of clicks. View all of your ports in one place, so you can go back to writing code.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Port-manager.jpg","u":"https://portmanager.app/"},{"t":"Barcoder","d":"Quickly and easily generate barcodes. This menu bar app generates QR code, Aztec, PDF417, and Code 128 barcodes.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Barcoder.jpg","u":"https://apps.apple.com/us/app/barcoder-barcode-generator/id994610360"},{"t":"Metronomia","d":"Metronomia is an easy-to-use metronome for your menu bar, perfect for musicians, teachers, and anyone who needs steady timing for practice.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/metronomia.png","u":"https://apps.apple.com/us/app/metronomia-quick-metronome/id1492177661"},{"t":"Bitcoin Bar","d":"This menu bar app keeps you up to date on bitcoin prices in 22 different currencies.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Bitcoin-bar.jpg","u":"https://apps.apple.com/app/bitcoin-bar/id1307938864"},{"t":"Eyeballs","d":"This app gives you a set of eyeballs in your menu bar. The eyes watch the cursor move around as you work.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Eyeballs.gif","u":"http://www.sticksoftware.com/software/Eyeballs.html"},{"t":"Cashbar","d":"See your Stripe rolling revenue in your menu bar. The simplest way to keep track of your daily Stripe activity. All sensitive data is stored locally in your encrypted macOS keychain.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Cashbar.jpg","u":"https://cashbar.app/"},{"t":"Jiggler","d":"When you have some lengthy task for your computer to do, it’s annoying to have to turn off your screensaver and turn off the sleep timer, only to have to turn it all back on again when you’re done. Jiggler is a freeware menu bar app that keeps your Mac awake. It’s a little helper that bumps your mouse every once in a while to keep your machine alert.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Jiggler.jpg","u":"http://www.sticksoftware.com/software/Jiggler.html"},{"t":"Howler Timer","d":"Howler Timer is a nice option if you want the timer to pop out into a new window. It also allows you to play whatever sound file you want for the alarm.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/howler-timer.jpg","u":"http://howler.foxnsox.com/"},{"t":"Menu Bar Splitter","d":"Menu Bar Splitter helps keeping your menu bar organized by using dividers, the same way you can with the dock. It also includes a Bartender compatibility version.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Menu-bar-splitter.jpg","u":"https://github.com/jwhamilton99/menu-bar-splitter"},{"t":"Daily Time Tracking","d":"Daily is a time tracking app in your menu bar that works by asking what you are doing. No need to manually start and stop timers or constantly switch activities.","img":"https://www.macmenubar.com/wp-content/uploads/2020/11/daily-time-tracking.png","u":"https://dailytimeapp.com/"},{"t":"Deepl","d":"The free online translation service Deepl (way better than Google Tranlate) has its own menu bar app. It’s the fastest and easiest way to use DeepL.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Deepl.jpg","u":"https://www.deepl.com/app"},{"t":"Copy’em Paste","d":"Copy’em Paste is a menu bar app that stores as many clipping as you want, without limitation. To recall the stored clippings later, just click the app’s menu bar icon.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Copy-em-paste-copy.jpg","u":"https://apprywhere.com/copy-em-paste.html"},{"t":"Qi FM – Ambient Sounds","d":"Qi FM is a free white noise application that helps you isolate noise, focus on your work, boost your productivity and relieve stress and anxiety.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/QiFM-Ambient-Sounds.jpg","u":"https://apps.apple.com/us/app/qi-fm-ambient-sounds/id1479696191"},{"t":"Storebar","d":"See what’s happening with your Shopify store right on your menu bar. Get instant updates on the three key metrics – Sales, Orders and Average order value.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Storebar.jpg","u":"https://www.storebar.app/"},{"t":"Be Focused","d":"A Pomodoro-style timer with awesome tracking of the number of times you’ve completed a timer. Create tasks, configure breaks and track your progress.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/Be-Focussed-1.png","u":"https://apps.apple.com/au/app/be-focused-focus-timer/id973134470"},{"t":"SpeedDial","d":"Call your favorite contacts and send iMessages and SMS messages to them, straight from your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/speeddial.jpg","u":"https://www.zaferarican.com/speeddial-3"},{"t":"Simple Battery Monitor","d":"This menu bar app displays the remaining time, charge percentage and battery status at the same time.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/Simple-Battery-Monitor.jpg","u":"https://www.zaferarican.com/simple-battery-monitor"},{"t":"NoiseBuddy","d":"Control the listening mode on your AirPods Pro. To switch modes, simply click the icon in the menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/NoiseBuddy.jpeg","u":"https://github.com/insidegui/NoiseBuddy"},{"t":"@home","d":"This menu bar app keeps your Mac unlocked while you are at home. It knows when you are at home (based on your wireless network name) and prevents your computer from locking the screen.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/At-home.jpeg","u":"https://beatrupp.github.io/athome/"},{"t":"WiFi Signal","d":"This menu bar app provides easy access to your Wi-Fi connection details, monitors the signal quality of your network, and can find and recommend alternative channels.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/WIFI-signal.jpg","u":"https://www.adriangranados.com/apps/wifisignal"},{"t":"eqMac2","d":"eqMac2 is a system-wide Audio Equalizer for your Mac that lives on your menu bar, letting you customize sound output across all applications.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/eqMac2.jpg","u":"https://bitgapp.com/eqmac/"},{"t":"Eye Timer","d":"Eye Timer helps you to follow the 20-20-20 rule for preventing eye strain: “Every 20 minutes take 20 seconds to look at something 20 feet (6 meters) away.”","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/Eye-timer.jpg","u":"https://adelmaer.com/eyetimer/"},{"t":"Timelancer","d":"Timelancer records how much time you spend on each app. It automatically stops recording on idle time.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/Timelancer.jpg","u":"https://yuix.org/en/timelancer"},{"t":"App Pier","d":"App Pier is a menu bar app launcher and switcher with Touch Bar support, making it quick to switch between your most-used applications.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/App-pier.jpg","u":"https://www.zaferarican.com/app-pier"},{"t":"MonoFocus","d":"Monofocus reminds you what to focus on and what’s important. The menu bar app shows you one task you want to focus on.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/Monofocus.jpg","u":"https://monofocus.app"},{"t":"SnipNotes","d":"Quickly save notes right from the menu bar and access them from any Mac, iPhone, iPad and Apple Watch with iCloud synchronization.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/SnipNotes.jpg","u":"https://www.snipnotes.de/en/"},{"t":"Airflo","d":"Airflo is a menu bar app that provides real-time air quality information for any location in the world, helping you monitor environmental conditions.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/Airflo.jpg","u":"https://gumroad.com/l/airflo"},{"t":"ARD Monitor","d":"ARD Monitor shows the state of your Apple Remote Desktop (disabled, enabled, connected) – even if the Administrator asked for permission to monitor/control. You can also disconnect connected administrators. It displays your IP- and MAC-addresses, computer name and serial number.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/Ardmonitor.png","u":"http://www.wurst-wasser.net/wiki/index.php/ARDMonitor"},{"t":"1440 Minutes Left Today","d":"This simple menu bar app tells you how many minutes you have left until the day is over.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/1440-minutes-left-today.jpg","u":"https://1440app.com/"},{"t":"mprove","d":"This menu bar app shows in real-time your daily productivity and procrastination progress based on the free time you have every day.","img":"https://guivr.github.io/mprove/assets/img/Monkey.gif","u":"https://guivr.github.io/mprove/"},{"t":"Vu","d":"Vu sits in the status bar and gives you a basic Instagram experience with its minimal mobile-like design.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Vu.jpg","u":"https://datastills.com/vu/"},{"t":"LyricsX","d":"This open source lyric grabber lives in your menu bar. For iTunes, Spotify, Vox and Audirvana Plus.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/LyricsX.jpg","u":"https://github.com/MxIris-LyricsX-Project/LyricsX"},{"t":"SimplePing","d":"Check your internet connection quality directly in the menu bar with SimplePing, which updates your ping in real-time for instant connectivity feedback.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Simpleping.jpg","u":"https://apps.apple.com/us/app/simpleping-menu-bar-ping/id1438310985"},{"t":"Unite for MacOS","d":"Unite 2 allows you to turn any website into a menu bar app, permitting easy access to any service whenever you need it.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Unite.jpg","u":"https://www.bzgapps.com/unite"},{"t":"Short Menu","d":"Short Menu is an URL shortener for your Mac’s menu bar. It integrates with bit.ly, Rebrandly, Google, Hive, tiny.cc, Droplr and CloudApp.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Short-menu.jpg","u":"https://shortmenu.com/mac/"},{"t":"Valet for Tesla","d":"The mobile Tesla app right in your Mac’s menu bar. Quickly view charge status and remaining range and all other aspects of your car.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Valet-for-tesla.jpg","u":"https://teslamacapp.com/"},{"t":"Near Lock","d":"Near Lock lives in your Mac’s menu bar and lets you use your iPhone to lock and unlock your Mac automatically.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Near-lock.jpg","u":"https://nearlock.me/"},{"t":"Gifable","d":"Gifable is a menu bar app that lets you record your screen as a GIF, making it easy to capture and share short screen recordings.","img":"https://ph-files.imgix.net/b8fad9cd-d666-4703-92ee-fda9609e0407","u":"https://apps.apple.com/us/app/gifable-gif-screen-recorder/id1077840209?mt=12"},{"t":"Typeeto","d":"Typeeto enables you to use your Mac keyboard as a bluetooth keyboard for other devices such as iPad, iPhone, Apple TV, Android device, etc.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Typeeto.jpg","u":"https://www.eltima.com/bluetooth-keyboard.html"},{"t":"iBoysoft NTFS for Mac","d":"This menu bar app helps you to read and write to NTFS formatted drives on Macs and transfer files between Macs and PCs.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Ntfs-for-mac.jpg","u":"https://iboysoft.com/ntfs-for-mac/"},{"t":"Next Meeting","d":"Next Meeting quickly shows your next meeting right in your menu bar, keeping you on track and aware of upcoming commitments throughout the day.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Next-meeting.jpg","u":"https://apps.apple.com/us/app/next-meeting-quickly-see-your/id1017470484"},{"t":"Pomobaro","d":"Pomobaro is a simple pomodoro timer that lives in your menu bar, helping you stay focused with timed work and rest intervals.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/Pomobaro-1024x583.jpg","u":"https://pomobaro.curtisrodgers.com/"},{"t":"SmartCapsLock","d":"Getting annoyed when you accidentally type everything with caps lock on? This menu bar app lets you change the case of text simply by selecting the text and pressing Caps Lock.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/smartcapslock.jpg","u":"https://kishanbagaria.com/smartcapslock/"},{"t":"MiniUsage","d":"MiniUsage is a menu bar app that displays various data like CPU usage, amount of network flow, battery status and process names which uses much CPU time.","img":"https://www.macmenubar.com/wp-content/uploads/2019/10/MiniUsage.jpg","u":"http://nsek.net/SYW/software/english/miniusage/"},{"t":"Netler","d":"Tiny network monitor for your menu bar (and notification center) to monitor what’s going on with your network connections.","img":"https://www.macmenubar.com/wp-content/uploads/2019/09/netler-menu-bar.jpg","u":"https://www.imagetasks.com/netler-network-monitor/"},{"t":"WeTransfer for Mac","d":"Simple menu bar tool for sharing files from your Mac. Click the icon to choose which files to send, or drag and drop multiple items right onto the icon.","img":"https://www.macmenubar.com/wp-content/uploads/2019/09/wetransfer-mac.jpg","u":"https://wetransfer.com/products"},{"t":"Speedtest for Mac","d":"Launching a Speedtest straight from your Mac menu bar is the quickest way to check your connectivity.","img":"https://www.macmenubar.com/wp-content/uploads/2019/09/Speedtest.jpg","u":"https://www.speedtest.net/apps/mac"},{"t":"Denied","d":"Denied is a menu bar app that sees what you’re playing and automatically skips songs that you dislike.","img":"https://www.macmenubar.com/wp-content/uploads/2019/09/Denied.jpg","u":"https://www.dangercove.com/denied/"},{"t":"Timeless","d":"The menu bar app Timeless gives you a generic idea of what part of the day you’re in: morning, lunch time, noon etc. By making the clock less specific, it reduces the sense of dread some hours of the day might give you.","img":"https://www.macmenubar.com/wp-content/uploads/2019/09/timeless.jpg","u":"https://www.dangercove.com/timeless/"},{"t":"AnyDrop","d":"AnyDrop simplifies your workflow by assembling as many features as possible within one customizable menu bar app, which can be used entirely with hotkeys and drag & drop. It is especially suitable for processing text and images.","img":"https://www.macmenubar.com/wp-content/uploads/2019/09/Anydrop.jpg","u":"https://yuanjoy.com/anydrop/"},{"t":"Backtrack","d":"The menu bar app Backtrack lets you record all those conversations, you forgot to click the record button for, by over-writing a 60 minute window of audio over and over throughout the day, locally on your Mac. The new version even lets you backtrack up to 5 hours of audio!","img":"https://www.macmenubar.com/wp-content/uploads/2019/09/Backtrack.jpg","u":"https://apps.apple.com/us/app/backtrack-record-past-audio/id1477089520"},{"t":"Maccy","d":"This lightweight open-source clipboard manager does one job: keeping your copy history at hand.","img":"https://macmenubar.com/wp-content/uploads/2019/12/maccy-2.webp","u":"https://maccy.app/"},{"t":"Halo","d":"This menu bar app is a little bot that tries to take care of you on your Mac. It tells you cute, self care things, and tries not to stress you out.","img":"https://ph-files.imgix.net/e085d8a6-77ea-45bc-96d0-8ae0a71ff0b4?auto=format&auto=compress&codec=mozjpeg&cs=strip","u":"https://github.com/gauravchl/halo"},{"t":"Clarity","d":"Clarity brings minimal Mac wallpapers right to your menu bar, letting you customize your desktop aesthetic with curated, beautiful designs.","img":"https://www.macmenubar.com/wp-content/uploads/2019/09/Clarity.jpg","u":"https://apps.apple.com/cn/app/%E5%85%8B%E6%8B%89%E5%A3%81%E7%BA%B8/id1469525516?mt=12&ref=producthunt"},{"t":"Harvest","d":"Harvest brings time tracking directly into your workflow, letting you log hours and review weekly totals without switching apps. It syncs with popular project tools, keeping billing and reporting accurate and effortless.","img":"https://www.macmenubar.com/wp-content/uploads/2019/09/Harvest.jpg","u":"https://www.getharvest.com/apps-and-integrations/mac"},{"t":"Hummingbird","d":"Hummingbird is a menu bar app that allows easy moving and resizing of windows by holding modifier keys and dragging your mouse to move and resize windows.","img":"https://www.macmenubar.com/wp-content/uploads/2019/08/Hummingbird.jpg","u":"https://finestructure.co/hummingbird"},{"t":"PingBar","d":"PingBar keeps an eye on your server. It will ping your server periodically, and show you the delay in the menubar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/08/Pingbar.jpg","u":"https://apps.apple.com/app/id432088983"},{"t":"Mindfulness Bell","d":"Simply choose an interval and a small or large bell will sound at the prescribed time.","img":"https://www.macmenubar.com/wp-content/uploads/2019/08/Mindfulness_Bell.jpg","u":"https://apps.apple.com/app/id1144260305"},{"t":"Bidbar","d":"With Bidbar, all your Terminal commands are at your finger tips, just a click of a button or a tap of a key away.","img":"https://www.macmenubar.com/wp-content/uploads/2019/08/bidbar-1024x834.jpg","u":"https://www.getbidbar.com"},{"t":"Dato","d":"Dato is a replacement for the system menu bar clock. You get a small calendar, calendar events for the selected day, the current time in various time zones (even with custom names), week number, and more.","img":"https://macmenubar.com/wp-content/uploads/2019/12/dato-new.jpg","u":"https://sindresorhus.com/dato"},{"t":"Menu Bar Controller for Sonos","d":"Seamlessly control your Sonos system from the macOS menu bar with quick access to playback, volume, and more, all in a sleek, unobtrusive companion that enhances your listening experience.","img":"https://macmenubar.com/wp-content/uploads/2019/12/sonos-2.webp","u":"https://apps.apple.com/app/apple-store/id6749351423"},{"t":"Horo","d":"Horo is a free timer that uses a simple and speedy natural language interface. Type the time, hit return, and go.","img":"https://matthewpalmer.net/horo-free-timer-mac/demo.gif","u":"https://matthewpalmer.net/horo-free-timer-mac/"},{"t":"Coin Tick","d":"Coin Tick lets you view prices of your selected cryptocurrency coins directly in your Mac menu bar with real-time updates and multiple currencies.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/Coin-tick.jpg","u":"https://apps.apple.com/us/app/coin-tick-menu-bar-crypto/id1141688067"},{"t":"Statsey","d":"This menu bar app lets you analyze your app-usage habits, and find out how much they are impacting your productivity.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/Statsey.jpg","u":"https://getniceapps.com/statsey"},{"t":"Minesweepey","d":"The classic minesweeper game is just one click away in your menu bar, bringing retro gaming fun to your everyday Mac experience and breaks.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/Minesweepey.jpg","u":"https://getniceapps.com/minesweepey"},{"t":"Fanny","d":"Fanny is a free menu bar app that monitors your Mac’s fan stats, keeping you informed about cooling performance and thermal conditions.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/Fanny.jpg","u":"https://fannywidget.com"},{"t":"Pingey","d":"Pingey sits in the menu bar. Click on the icon to see the status of all your websites. Or add separate menu bar items for your most important sites.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/Pingey.jpg","u":"https://getniceapps.com/pingey"},{"t":"Gifox","d":"Gifox is a menu bar app that records your screen into animated GIFs. You can also share your captured GIFs with Dropbox, Google Drive and Imgur.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/Gifox.jpg","u":"https://gifox.io/"},{"t":"QuickNas","d":"QuickNas is a menu bar app that connects you quick and easy to your network attached storage volumes.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/QuickNas.png","u":"http://dosdude1.com/quicknas/"},{"t":"Todoey","d":"A fast and simple way to remember things. Todoey syncs with iCloud and has both a dark and a light theme.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/Todoey.jpg","u":"https://apps.apple.com/us/app/todoey-a-cloud-synced-menubar-checklist-manager/id1143519262"},{"t":"Voicey","d":"This voice memo recorder lives in your menu bar. Voicey is designed for only one job: record voice memos anytime you need it. With support for AAC and Apple Lossless.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/Voicey.jpg","u":"https://apps.apple.com/us/app/voicey-a-menubar-voice-memo-recorder/id1035454232"},{"t":"One Switch","d":"This menu bar app keeps all your powerful switches in one place: Hide Desktop Icons, Dark Mode, Keep Awake, Screen Saver, AirPods Connect, DND and Night Shift.","img":"https://www.macmenubar.com/wp-content/uploads/2019/07/One-switch.jpg","u":"https://fireball.studio/oneswitch/"},{"t":"Timestamp","d":"A macOS menu bar clock with a fully customizable date/time display and a calendar. Inspired by Day-O.","img":"https://www.macmenubar.com/wp-content/uploads/2019/06/Timestamp.jpg","u":"https://github.com/mzdr/timestamp"},{"t":"Mater","d":"Mater simply runs a 25 minute timer, resets for a 5 minute break, and repeats until you stop it.","img":"https://user-images.githubusercontent.com/6104/37107543-9627589a-2202-11e8-825b-c68b248610ce.gif","u":"https://github.com/jasonlong/mater"},{"t":"Pomolectron","d":"Pomolectron is another Pomodoro timer that lives in your menu bar with dark mode support, helping you manage focused work and rest intervals.","img":"https://www.macmenubar.com/wp-content/uploads/2019/06/pomolectron.png","u":"https://github.com/amitmerchant1990/pomolectron"},{"t":"KeepingYouAwake","d":"KeepingYouAwake prevents your Mac from entering sleep mode for a predefined duration or as long as it is activated. Inspired by Caffeine.","img":"https://www.macmenubar.com/wp-content/uploads/2019/06/Keepingyouawake.jpg","u":"https://github.com/newmarcel/KeepingYouAwake"},{"t":"Spaces Renamer","d":"Spaces Renamer allows you to rename your spaces. The menu bar app supports multiple monitors, and highlights the current space in each monitor with an outline.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Spaces-renamer-1024x269.jpg","u":"https://github.com/dado3212/spaces-renamer"},{"t":"Dev 10","d":"This little app shows you the top posts on Dev.to in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Devio.jpg","u":"https://github.com/sarthology/Dev10"},{"t":"Artpaper 5K","d":"This menu bar app puts 1300 art wallpapers in 5K on your Mac’s desktop. Featuring some of the world’s top-tier galleries.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Artpaper-5k.jpg","u":"https://twopeoplesoftware.com/artpaper"},{"t":"Klokki","d":"Klokki delivers a powerful way of time-tracking directly from the Menu Bar. The timer gets out of your way and always stays just a click away in the menubar. Klokki Slim is the free version of Klokki: just without auto-tracking.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Klokki.jpg","u":"https://klokki.com/index.html"},{"t":"Calendar 366","d":"Calendar 366 is a powerful calendar app for macOS and iOS, featuring a menu bar companion, 8 different views, 9 themes, and tools such as invitations and attachments.","img":"https://macmenubar.com/wp-content/uploads/2019/12/Calendar_366.webp","u":"https://apps.apple.com/us/app/calendar-366-events-tasks/id6502818600?platform=mac"},{"t":"Almighty","d":"Almighty exposes powerful configurations for your Mac, like stopping alerts for installing new major release of macOS, stopping iTunes from automatically opening and much more.","img":"https://macmenubar.com/wp-content/uploads/2019/12/almighty-2.png","u":"https://indiegoodies.com/almighty"},{"t":"NBA Bar","d":"You like basketball? Check NBA in your menu bar. It’s free and open source, keeping you updated on games and scores throughout the season.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/NBA-bar.jpg","u":"https://github.com/xxhomey19/nba-bar"},{"t":"CoconutBattery","d":"CoconutBattery shows you live information about the battery quality in your Mac, iPhone and iPad. You can also save the current health information, so you can see the changes of your battery over time.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/CoconutBattery.jpg","u":"https://www.coconut-flavour.com/coconutbattery/"},{"t":"AccessMenuBarApps","d":"AccessMenuBarApps removes the problem of viewing menu bar icons on laptop displays. This utility allows you to expand your menu bar when you need it.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Accessmenubarapps.png","u":"http://www.ortisoft.de/en/accessmenubarapps/"},{"t":"TimeProgress","d":"TimeProgress shows you what percentage of the current year, quarter, month, week or day has passed (or is remaining).","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/TimeProgress.jpg","u":"https://runtimesharks.com/projects/timeprogress"},{"t":"Jettison","d":"Jettison automatically ejects external disks from your Mac before your computer goes to sleep.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Jettison.jpg","u":"https://www.stclairsoft.com/Jettison/index.html"},{"t":"Default Folder X","d":"The menu bar app of Default Folder X allows you to quickly browse through folders, preview files and grab what you’re looking for.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Default-folder-x.jpg","u":"https://www.stclairsoft.com/DefaultFolderX/"},{"t":"Pliim","d":"Plimm puts your Mac into presentation mode. This menu bar hides all the mess on your desktop and even disables notifications.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Pliim.jpg","u":"https://zehfernandes.github.io/pliim/"},{"t":"Contrast Safe","d":"Contrast Safe allows you to check the contrast ratio between 2 colors and validate it against the WCAG standard. A nice companion for every digital designer.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Contrast-safe-1-1024x587.jpg","u":"https://contrastsafe.com/"},{"t":"Notebook","d":"Notebook lets you take notes, create lists, record audio, and more right from your menu bar, keeping your information organized and instantly accessible","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Notebook-zoho.jpg","u":"https://itunes.apple.com/us/app/notebook-take-notes-sync/id1173152781"},{"t":"Clipy","d":"Clipy lets your Mac remember earlier pasteboard entries when you have to copy multiple items consecutively. It even lets you create permanent items you can paste whenever you need them.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Clipy.jpg","u":"https://clipy-app.com"},{"t":"ColorSlurp","d":"ColorSlurp is a tiny color productivity booster that lives in your menu bar. Now you can pick colors from anywhere on your screen with the magnifier. Or create and edit colors using a variety of color selection tools.","img":"https://www.macmenubar.com/wp-content/uploads/2019/05/Colorslurp.jpg","u":"http://colorslurp.com"},{"t":"Analytics Bar","d":"Realtime Google Analytics in your menu bar! This application delivers real time / current Google Analytics stats for the day of all your tracked websites.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Analytics-bar.jpg","u":"https://analyticsbar.com/"},{"t":"Web Ping","d":"This menu bar app will ping all your websites straight from your computer and notify you when something is wrong with any of them, or when a broken website is back online.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Web-ping.jpg","u":"https://keenappsgroup.com/web-ping-monitor-websites-app"},{"t":"Color Picker and Library","d":"With Color Picker and Library you can keep all your colours in one place. Now it’s easy to keep your colors organized and share them with team members.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Color-library.jpg","u":"https://keenappsgroup.com/color-picker-library-app"},{"t":"Stand Up","d":"This menu bar app reminds you to take a break as often as you want. And you can’t trick it: it knows exactly when you’re away from the keyboard.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Stand-up-app.jpg","u":"https://keenappsgroup.com/stand-up-take-regular-breaks-app"},{"t":"PeakHour","d":"Monitor your Internet performance, usage, connection quality and lots more right from your menu bar with comprehensive real-time network statistics and insights.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/PeakHour-4.jpg","u":"https://peakhourapp.com/"},{"t":"Start","d":"Innovative::bytes start is a launcher for macOS that allows you to open applications, documents or folders quickly and easily. Open your items with a simple mouse click in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Start.jpg","u":"https://start.innovative-bytes.net"},{"t":"DND Me","d":"Ever wanted to get your work done? Do you turn Do Not Disturb on, but always forget to turn it off? Activate Do Not Disturb for a few hours and work distraction free.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Dnd-me.jpg","u":"https://runtimesharks.com/projects/dnd-me"},{"t":"Take a break – timer, reminder","d":"Use ‘Take a break’ to remind you to take regular breaks that help you relieve eye strain. As the doctor mentions, every 20 minutes spent using a screen, look away at something that is 20 feet away for a total of 20 seconds.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Take-a-break-1.jpg","u":"https://itunes.apple.com/cn/app/take-a-break-timer-reminder/id1457158844"},{"t":"Mac Media Key Forwarder","d":"Mac Media Key Forwarder forwards the media keys of your Mac keyboard to iTunes or Spotify directly. You can prioritize which app you would like to control. The app runs in the menu bar. No more accidental opening of iTunes!","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/mac-media-key-forwarder.jpg","u":"https://github.com/milgra/macmediakeyforwarder"},{"t":"Mathpix snipping tool","d":"Take a screenshot of math and paste the LaTeX into your editor, all with a single keyboard shortcut. Choose your desired format, edit it, and more, right from your menu bar.","img":"https://mathpix.com/images/snip-page/gif_3.gif","u":"https://mathpix.com"},{"t":"Muzzle","d":"Muzzle runs quietly in the menu bar. When you start sharing your screen, it automatically enables ‘Do Not Disturb’ so that no notifications appear on your screen and interrupt or embarrass you during a meeting.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Muzzle.jpg","u":"https://muzzleapp.com"},{"t":"Chameleon","d":"Chameleon is a quick and easy way to change your interface, accent and highlight colors. Right click on the bar icon to toggler between Light & Dark modes.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Chameleon.jpg","u":"https://chameleon.level3studios.net/"},{"t":"OverSight","d":"OverSight monitors you mac’s mic and webcam. The app lives in your menu bar and alerts you when the internal mic is activated, or whenever a process accesses the webcam.","img":"https://www.macmenubar.com/wp-content/uploads/2019/03/Oversight.jpg","u":"https://objective-see.com/products/oversight.html"},{"t":"LuLu","d":"LuLu is the free, open firewall for Macs that can protect your network connections and detect malicious activity. It blocks any unknown outgoing connections, until approved by the user.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Lulu.png","u":"https://objective-see.com/products/lulu.html"},{"t":"Do Not Disturb","d":"Do Not Disturb lives in your menu bar. This small utility works with your iPhone and sends a notification when your macbook is opened.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Do-not-disturb.png","u":"https://objective-see.com/products/dnd.html"},{"t":"Yoink","d":"Yoink lives in your menu bar. This utility simplifies and improves drag and drop between windows, apps, spaces and fullscreen apps. The app offers a temporary place for files and app-content you want to move or copy.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/yoink.jpg","u":"https://eternalstorms.at/yoink/mac/"},{"t":"Wattagio","d":"Wattagio informs you about the current battery health and helps your Mac to decrease power usage. Themenu bar app shows you detailed stats & health information for your Macbook’s battery and helps to optimize apps activity.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Wattagio.jpg","u":"https://filincode.com/wattagio.html"},{"t":"Displays","d":"Click on Displays icon in the upper-right corner of your screen and choose your monitor resolution among all supported resolutions.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Displays.jpg","u":"https://www.jibapps.com/apps/displays/"},{"t":"Numi","d":"Numi is a calculator that blends math with text. Currency, units, time zones, numeral systems, variables, export, etc.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Numi.jpg","u":"https://numi.io"},{"t":"ToothFairy","d":"The ToothFairy menu icon shows you, at a glance, whether your AirPods or Bluetooth accessory is connected.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/ToothFairy.jpg","u":"https://c-command.com/toothfairy/"},{"t":"windOCD","d":"Align, arrange and move any window to your needs. WindOCD is a menu bar application that doesn’t show up in your dock.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/WindOCD.jpg","u":"https://windocd.moapp.software/index.html"},{"t":"CopyClip","d":"CopyClip runs discreetly from your menu bar. It stores all that you have copied or cut in the past, allowing you to easily find that snippet of text you’ve been looking for.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Copyclip.jpg","u":"https://apps.apple.com/nl/app/copyclip-clipboard-history/id595191960"},{"t":"Resolutionator","d":"Need more space for a project? Resolutionator makes switching screen resolutions effortless. The app makes it simple to use any of your display’s available resolutions.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/resolutionator.jpg","u":"https://manytricks.com/resolutionator/"},{"t":"Trickster","d":"Trickster keeps track of recent files you’ve been using on your Mac and gives you super easy and lightning fast access to them. Your recently used files, at your fingertips. Weel, in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Trickster-app.jpg","u":"https://www.apparentsoft.com/trickster"},{"t":"Butler for Mac","d":"Butler for Mac is a do-it-all utility for your Mac: Launcher, iTunes controller, macros, pop-up folders, multiple clipboards, and more.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Butler.jpg","u":"https://manytricks.com/butler/"},{"t":"Quitter for Mac","d":"Quitter automatically hides or quits apps after periods of inactivity, helping you keep your Mac organized and your battery life extended throughout the day.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Quitter-1024x417.jpg","u":"https://marco.org/apps#quitter"},{"t":"SelfControl","d":"SelfControl saves you from the meaningless waste of time of websites like Facebook, Twitter or any other website you stick for hours. Simply add the websites which distract you from your work, set the timer and turn it on.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Selfcontrol.png","u":"https://selfcontrolapp.com/"},{"t":"Screenfloat","d":"Screenfloat is a simple way to capture, annotate and share screenshots with beautiful floating previews, making screenshot management intuitive and visually appealing.","img":"https://macmenubar.com/wp-content/uploads/2019/12/screenfloat.jpeg","u":"https://eternalstorms.at/ScreenFloat/ScreenFloat_-_Make_your_Shots_fly/ScreenFloat_-_Make_your_Shots_fly%21.html"},{"t":"iStat Menus","d":"iStat Menus provides tiny graphs in the menu bar. Click them and they expand into a wealth of info about your CPU, GPU, memory, network, disk usage, disk activity, temperatures, fans, battery info and more.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/iStat-Menus-1024x666.jpg","u":"https://bjango.com/mac/istatmenus/"},{"t":"TripMode","d":"With TripMode you can prevent apps from connecting to the internet when you are using a mobile hotspot. This prevents unexpected bills for high data usage on your mobile plan.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Tripmode.jpg","u":"https://www.tripmode.ch/"},{"t":"iClock","d":"This menubar clock replaces the limited time app in the menubar with a drop-down menu of the current time/date in any city in the world, time & date simultaneously in any format, font or color, instant calendar, stopwatch, moon phase, floating clocks, and much more.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Iclock-1024x553.jpg","u":"https://plumamazing.com/product/iclock/"},{"t":"BetterSnapTool","d":"BetterSnapTool runs in the background as a menu bar app. It lets you manage your window positions and sizes by either dragging them to one of the screen’s corners or to the top, left or right. You can also set keyboard shortcuts in order to move and resize your windows.","img":"https://www.macmenubar.com/wp-content/uploads/2019/03/Bettersnaptool.jpg","u":"https://folivora.ai/bettersnaptool"},{"t":"Boom 2","d":"Boom 2 analyzes your system and optimizes the sound based on the result. It self-calibrates itself according to the type of Mac. Boom will sit silently on the menu bar, and you can use it to increase or decrease the global volume of your system.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Boom-2.jpg","u":"https://www.globaldelight.com/boom/index.php"},{"t":"There","d":"Never think of timezones again. Follow your family members or teammates and have their local time, no matter if they move.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/There.jpg","u":"https://there.pm/"},{"t":"Bandwidth+","d":"Bandwidth+ tracks your Wi-Fi hotspot usage and network bandwidth usage on various networks, helping you stay aware of data consumption throughout your day.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Bandwith.jpg","u":"https://itunes.apple.com/us/app/bandwidth/id490461369"},{"t":"MenuBar Stats 3","d":"MenuBar Stats 2 is composed of modules (CPU, Disk, Network, Memory, Battery, etc). Each module can be seen in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Menubar-stats-1024x639.jpg","u":"https://www.seense.com/menubarstats/"},{"t":"Micro Snitch","d":"Know when someone or something is using your computer’s microphone (or web cam). This menu bar app monitors and reports any microphone and camera activity to help you figure out if someone’s spying on you.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Micro-snitch.jpg","u":"https://www.obdev.at/products/microsnitch/index.html"},{"t":"CleanShot X","d":"Instantly save, copy or drag & drop screenshots or screen recordings to other apps. You can also upload your captures to the CleanShot Cloud and instantly get a shareable link. Simple and useful.","img":"https://www.macmenubar.com/wp-content/uploads/2019/12/cleanshot.jpg","u":"https://getcleanshot.com/"},{"t":"Text Expander","d":"Also with TextExpander, you can store big blocks of text which you can quickly expand using a simple abbreviation or keyboard shortcut.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/TextExpander.jpg","u":"https://textexpander.com/"},{"t":"Effortless","d":"Effortless is a Mac menu bar app that helps you stay focused on one thing at a time. It allows you to create a simple plaintext to-do list and shows the task you’re currently working on in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Effortless.jpg","u":"https://www.effortless.app"},{"t":"Dropzone","d":"Dropzone makes it faster and easier to move and copy files. The app sits in the menu bar. When you click it, a drop-down window unfurls, with shortcuts to apps and folders, as well as built-in actions you can click to share a file on Twitter, Facebook, and Flickr.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Dropzone-1-1024x647.jpg","u":"https://aptonic.com/"},{"t":"Sip","d":"Sip is a color picker that gives you the ability to share colors with everyone and link them between the other tools in your workflow.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Sip-color-picker.jpg","u":"https://sipapp.io"},{"t":"Itsycal","d":"Itsycal is a (free) tiny calendar for your Mac’s menu bar, synchronizing with your Mac calendar app. You can also create and delete events.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Itsycall.jpg","u":"https://www.mowglii.com/itsycal/"},{"t":"Amphetamine","d":"With Amphetamine, you can effortlessly override your energy saving settings and keep your Mac awake. You just have to tap on a single icon on your macOS Menu Ba. Once activated, your system will stop going to sleep. You can also set it up so that Amphetamine only kicks on when it notices that a particular app is running.","img":"https://www.macmenubar.com/wp-content/uploads/2019/03/Amphetamine.png","u":"https://itunes.apple.com/at/app/amphetamine/id937984704"},{"t":"SoundSource","d":"With SoundSource you can change the volume and output device for individual apps, right from your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Soundsource.jpg","u":"https://rogueamoeba.com/soundsource/"},{"t":"RescueTime","d":"RescueTime is a time-management tool that runs securely in the background of your computer. The app keeps track on the time you spent on applications and websites, giving you an accurate picture of your working day.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/RescueTime.jpg","u":"https://www.rescuetime.com"},{"t":"Rocket","d":"Rocket is a free Mac app that makes typing emoji faster and easier using Slack-style shortcuts. A simple and effective app that gets the job done. It lets you quickly enter emoji by typing rather than scrolling through a list.","img":"https://www.macmenubar.com/wp-content/uploads/2019/03/Rocket-1024x705.jpg","u":"https://matthewpalmer.net/rocket/"},{"t":"Typinator","d":"Typinator streamlines the reuse of commonly used phrases, terms, and images. It lets you insert phrases and pictures into any type of document.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Typinator.jpg","u":"https://www.ergonis.com/products/typinator/"},{"t":"Vanilla","d":"Vanilla is a free Mac app that lets you hide menu bar icons, keeping your menu bar clean and clutter-free while maintaining quick access when needed.","img":"https://www.macmenubar.com/wp-content/uploads/2019/03/Vanilla-mac.jpg","u":"https://matthewpalmer.net/vanilla/"},{"t":"Workspaces","d":"Workspaces allows you to bundle the resources linked with a project (files, websites, emails, apps) into one set, in your menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Workspaces-1024x638.jpg","u":"https://www.apptorium.com/workspaces"},{"t":"Kiwi","d":"Are you a Gmail user? Kiwi puts your Gmail account inside a popup panel that you can bring up from the menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Kiwi-1024x512.png","u":"https://www.kiwiforgmail.com"},{"t":"BusyCal","d":"BusyCal displays your calendar in Day, Week, Month, Year and List views. What makes BusyCal unique is its ability to customize these views to more precisely meet your needs.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Busycal-1024x623.jpg","u":"https://www.busymac.com/busycal/"},{"t":"SpotMenu","d":"SpotMenu is a Spotify style menu bar app that displays the artist/album in the menu bar. The app comes in handy when you hear a song and wonder “Who is the artist/album?” Then you can click the Menu Bar icon to interact with what’s playing.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/spotmenu.jpeg","u":"https://kmikiy.github.io/SpotMenu/"},{"t":"SizeUp","d":"SizeUp allows you to quickly resize and position your windows with keyboard shortcuts or a handy menu bar icon.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Sizeup.jpg","u":"http://www.irradiatedsoftware.com/sizeup/"},{"t":"Clocker","d":"Clocker helps you keeping track of your friends and colleagues in different time zones. You can also add notes and create reminders.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Clocker.jpg","u":"https://abhishekbanthia.com/clocker/"},{"t":"MacID","d":"Unlock your Mac with just your fingerprint. MacID is a fast, secure way to unlock your Mac without the inconvenience of typing your password over and over.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Macid-1024x780.jpg","u":"https://macid.co/"},{"t":"Monosnap","d":"Make screenshots. Draw on it, highlight important details with pen, text, arrows, and shapes. Monosnap is fast, easy and free.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Monosnap.png","u":"https://monosnap.com/welcome"},{"t":"HazeOver","d":"HazeOver is a nifty app that automatically highlights the front window by fading out all the background windows. A kind of dimmer switch that reduces distractions by fading out background windows.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/HazeOver-1024x596.jpg","u":"https://hazeover.com/"},{"t":"Mate","d":"Mate is a translation app that lives in your menu bar, making it quick and easy to translate text between multiple languages whenever you need it.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Mate-translate.jpg","u":"https://twopeoplesoftware.com/mate"},{"t":"TextBar","d":"TextBar lets you add any text to your Mac menu bar, such as the output of a shell script. There is even a web service that lets you see all of your TextBar items from all your Macs.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/textbar.png","u":"http://richsomerfield.com/apps/textbar/"},{"t":"Mia for Gmail","d":"Mia for Gmail puts the contents of your Gmail inbox in the menu bar, giving you quick access to your messages without opening a separate window.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Mia-for-gmail-1024x644.jpg","u":"https://www.miaforgmail.com/"},{"t":"PopClip","d":"PopClip appears when you select text with your mouse. Instantly copy & paste, and access actions like search, spelling, dictionary and over 100 more.","img":"https://www.macmenubar.com/wp-content/uploads/2019/03/Popclip.jpg","u":"https://pilotmoon.com/popclip/"},{"t":"Fantastical 2","d":"Fantastical 2 is a robust, intuitive calendar app with a beautiful interface and dozens of features. For instance, a full-fledged mini-calendar that sits in your menu bar for quick access. It works with iCloud, Exchange, Google, Yahoo, fruux, and CalDAV accounts. But… it comes with a $50 price tag.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Fantastical2.jpg","u":"https://flexibits.com/fantastical"},{"t":"Hazel","d":"With Hazel you can create rules for organizing and cleaning folders. You can start and stop Hazel, open the Hazel app window, and even run individual rules from the menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Hazel-1024x750.jpg","u":"https://www.noodlesoft.com/"},{"t":"F.lux","d":"Is your Mac keeping you up late? F.lux is a free download that warms up your computer display at night, to match your indoor lighting. The app saves your eyes by making your display’s brightness adapt to the time of day.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Flux-1024x775.jpg","u":"https://justgetflux.com/"},{"t":"Dropshare","d":"Upload screen shots, screen recordings, files, literally anything to your favorite storage provider or to your own server and share them with just a link.","img":"https://macmenubar.com/wp-content/uploads/2019/11/dropshare.jpg","u":"https://dropshare.app/"},{"t":"iBetterCharge","d":"iBetterCharge tracks the power of your iOS devices. When they hit a specific battery capacity (or are fully charged up when plugged in), the app will let you know.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/ibettercharge-app.jpg","u":"https://softorino.com/ibettercharge/"},{"t":"Unclutter","d":"Unclutter is a digital drawer for your Mac. A single place where you can drag and drop files, notes, and clipboard clips, accessed by moving your mouse to the top.","img":"https://www.macmenubar.com/wp-content/uploads/2019/03/unclutter.jpg","u":"https://unclutterapp.com/"},{"t":"PixelSnap","d":"PixelSnap makes it easy to measure anything on your screen by just clicking and dragging around the cursor. Easily save selected areas as screenshots.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/pixelsnap-1024x576.jpg","u":"https://getpixelsnap.com/"},{"t":"aText","d":"With aText you avoid typing the same thing over and over, such as responding to common email questions, auto-populating commonly used phrases and even passwords if needed. aText runs in the background. You’ll see the app’s icon in the menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/atext.jpg","u":"http://www.trankynam.com/atext/"},{"t":"Magnet","d":"Simply drag the window to one of the sides of the screen and it snaps there. Every open Mac window can be resized into the top, bottom, left or right half of your screen size. You can also use keyboard shortcuts or the menu bar to manage your Mac windows.","img":"https://www.macmenubar.com/wp-content/uploads/2019/03/Magnet-1024x768.png","u":"http://magnet.crowdcafe.com/"},{"t":"Focus","d":"Focus is a Mac app that sits in your menu-bar and helps you block websites and applications.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Focus.jpg","u":"https://heyfocus.com/"},{"t":"File Cabinet Pro","d":"File Cabinet Pro is the file manager for your macOS menu bar. Quickly navigate to files without cluttering your desktop. Open, move, rename, compress, tag, trash, copy and paste files, all from the menu bar.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/File-cabinet-pro-1024x716.jpg","u":"https://apptyrant.com/file-cabinet-pro-help/"},{"t":"Cardhop","d":"Cardhop solely lives in your menu bar and makes managing contacts much easier. Its powerful natural language input field lets you quickly search, add, edit, and interact.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Cardhop-1024x610.jpg","u":"https://flexibits.com/cardhop"},{"t":"CloudMounter","d":"Mount your different cloud storages and web servers to your Mac as local drives. Now you can open cloud storage (Google Drive, Microsoft OneDrive, Dropbox, FTP/FTPS, WebDAV, Amazon s3, and SFTP) as if it were an external drive.","img":"https://macmenubar.com/wp-content/uploads/2019/11/cloudmounter-new.webp","u":"https://cloudmounter.net/"},{"t":"gfxCardStatus","d":"gfxCardStatus is an unobtrusive menu bar app for OS X that allows MacBook Pro users to see which apps are affecting their battery life by using the more power-hungry graphics. It also tells you which graphics card you are using.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/gfxcardstatus.jpg","u":"https://gfx.io/"},{"t":"Shiftit","d":"ShiftIt installs itself in the menu bar (optionally it can be completely hidden). It provides a set of actions that manipulates windows positions and sizes.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Shiftit.png","u":"https://github.com/fikovnik/ShiftIt"},{"t":"Snagit","d":"Snagit makes it easy and intuitive to capture images or record video. Edit and annotate screenshots with a few clicks.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Snagit-1024x677.jpg","u":"https://www.techsmith.com/screen-capture.html"},{"t":"Gestimer","d":"With Gestimer, you can create quick timebased reminders. Simply drag the Gestimer menu bar icon onto the screen to create your reminder. Click on the icon to view all your reminders as a list.","img":"https://www.macmenubar.com/wp-content/uploads/2019/03/Gestimer.jpg","u":"http://maddin.io/gestimer/"},{"t":"Pomodoro One","d":"Pomodoro One is a simple application for macOS and iPhone for increasing personal productivity using the Pomodoro Technique with focused work and rest intervals.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Tomato-one.jpg","u":"http://rinik.net/pomodoro/"},{"t":"Bumpr","d":"Most people pretend one browser is enough. The rest of us know better. Bumpr lets you choose where every link opens, so you can separate work and private browsing, test across browsers, or try something new without commitment. It handles mailto links just as smoothly, opening them in your preferred email app or Gmail in the browser you trust, with optional extensions that fit neatly into your daily workflow.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Bumpr.jpg","u":"https://www.getbumpr.com/"},{"t":"Endurance","d":"Endurance increases your Mac’s battery life by removing unwanted applications and shutting down programs that suck up the maximum amount of energy. On a typical Mac notebook, this can help your Mac run for 20 per cent longer.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Endurance-app.jpg","u":"https://enduranceapp.com/"},{"t":"TinyCal","d":"TinyCal brings Google and Apple Calendar to your Mac in a clean, compact view that keeps your schedule within reach. You can add events and reminders in seconds, display multiple months, combine personal and business calendars, and even include holidays from countries and religions worldwide, all without interrupting your workflow.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Tinycal.jpg","u":"https://plumamazing.com/product/tinycal/"},{"t":"Clean","d":"Because we all treat our desktop like a digital junk drawer, Clean quietly steps in and restores order. With a single click or on a schedule you choose, it moves scattered files into a designated folder and neatly organizes them by month or day. Your desktop stays clear, while everything remains safely stored and easy to find whenever you need it again.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Clean.jpg","u":"https://itunes.apple.com/gb/app/clean/id418412301"},{"t":"Display Menu","d":"Display Menu makes it easy to adjust your screen settings with a single click. Switch resolutions, toggle mirroring, and fine-tune refresh rates on the fly. With the optional upgrade, you can unlock Retina resolutions, AppleScript support, and handy resolution bookmarks for even greater control.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Display-menu.jpg","u":"http://displaymenu.milchimgemuesefach.de/"},{"t":"Shortcut Bar","d":"Shortcut Bar keeps your most important files, folders, apps, bookmarks, text snippets and even color swatches within instant reach. Add as many shortcuts as you like and access everything with a quick click, so the things you use every day are never more than a moment away.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Shortcut-bar-app.jpg","u":"https://fiplab.com/apps/shortcut-bar-for-mac"},{"t":"Amelita","d":"Amelita adds a smart context menu to your menu bar to grant you quick access to functions, like the ability to quickly change desktop backgrounds, copy images to your clipboard, add multiple senders to your address book with one click and so much more. It takes all these complex tasks and puts them in the menu bar, ready to go when you need them.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Amelita.jpg","u":"http://www.limitpointstore.com/products/amelita/"},{"t":"iGlance","d":"iGlance displays current stats about your Mac on the status bar. It is built to be highly customizable so that everyone can adjust it to his/her needs.","img":"https://www.macmenubar.com/wp-content/uploads/2019/11/iGlance.jpg","u":"https://iglance.github.io/"},{"t":"Aware","d":"Aware quietly tracks how long you’ve been actively using your Mac by monitoring mouse movement and keystrokes, pausing during breaks and resuming when you return. No preachy reminders or forced wellness rituals, just a clear, unobtrusive record of your screen time whenever you feel brave enough to look.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Aware.jpg","u":"https://awaremac.com/"},{"t":"Stay","d":"Stay remembers exactly where you placed every window and restores them instantly, even when you connect or disconnect external displays, so your setup always feels intentional rather than accidental.","img":"https://www.macmenubar.com/wp-content/uploads/2019/04/Stay.jpg","u":"https://cordlessdog.com/stay/"},{"t":"SMARTReporter","d":"Your hard drive rarely sends polite warnings before it collapses. SMARTReporter keeps an eye on its S.M.A.R.T. status and I/O errors, flagging early signs of trouble through clear alerts and a color-changing icon. It can also watch RAID health and available boot disk space. It is not a backup solution, but it does give you a fighting chance before hardware failure turns into data loss
