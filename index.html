t, and strong privacy controls, it delivers seamless dictation.","img":"https://macmenubar.com/wp-content/uploads/2026/02/spokenly.webp","u":"https://spokenly.app/"},{"t":"FineTune","d":"FineTune gives you precise control over your Mac’s audio, letting you adjust volume per app, route sound to multiple devices, fine-tune with a 10-band EQ, and even boost output up to 400%.","img":"https://macmenubar.com/wp-content/uploads/2026/02/finetune-2.webp","u":"https://github.com/ronitsingh10/FineTune"},{"t":"Network Throttler","d":"Developers can simulate slow or unstable internet connections directly from the menu bar, testing how apps behave on 3G, Edge, or flaky Wi-Fi. Built-in profiles, timers, and fine-grained controls keep testing quick and painless.","img":"https://macmenubar.com/wp-content/uploads/2026/03/network-throttler.webp","u":"https://macos-network-throttler.com/"},{"t":"Default Tamer","d":"Default Tamer routes links to the right browser automatically, based on the app, domain, or URL pattern. Work, personal, and testing browsers stay neatly separated, while everything runs locally with no tracking.","img":"https://macmenubar.com/wp-content/uploads/2026/03/Default_Tamer_2.webp","u":"https://www.defaulttamer.app/"},{"t":"Fluent","d":"Fluent brings ChatGPT, Claude, Gemini and hundreds of other AI models directly into your daily workflow. Its Smart Panel understands context, refines text, chats with documents, and lets you customize powerful actions without breaking focus.","img":"https://macmenubar.com/wp-content/uploads/2026/02/fluent.webp","u":"https://fluentmac.app/"},{"t":"Glanceway","d":"Glanceway keeps news, stocks, RSS feeds and developer updates one click away. Install ready-made sources, create your own with YAML or JavaScript, or let AI generate them while everything stays private and local.","img":"https://macmenubar.com/wp-content/uploads/2026/03/glanceway-2.webp","u":"https://glanceway.app/"},{"t":"Veil","d":"Veil helps you reclaim focus by dimming distractions or blurring sensitive areas with a simple drag. Ideal for deep work, coding, or presentations, keeping attention exactly where it belongs.","img":"https://macmenubar.com/wp-content/uploads/2026/03/veil.webp","u":"https://apps.apple.com/us/app/veil-focus-screen-privacy/id6752677429"},{"t":"ClipDoc","d":"ClipDoc quietly records everything you copy, from text and links to images and files, while skipping sensitive data. Find anything instantly, preserve original formatting, and browse your clipboard history with fast search and filters.","img":"https://macmenubar.com/wp-content/uploads/2026/03/clipdoc.webp","u":"https://apps.apple.com/nl/app/clipdoc/id6759217885"},{"t":"Hush","d":"Hush gives you instant presentation mode with a single click, keeping messy desktops and private apps out of sight. Choose between a clean desktop overlay or a new Focus Mode that blurs everything except the apps you want visible, so your screen stays professional, private, and distraction-free across meetings, streams, and demos.","img":"https://macmenubar.com/wp-content/uploads/2026/02/hush.webp","u":"https://www.poteam.pro/products/hush"},{"t":"TickBar","d":"TickBar keeps multiple cities within easy reach, clearly showing who’s ahead or behind so you can skip the mental math. With flexible time formats and subtle customization, it stays fast, lightweight, and pleasantly out of the way while you work across time zones.","img":"https://macmenubar.com/wp-content/uploads/2026/02/tickbar.webp","u":"https://apps.apple.com/sg/app/tickbar/id6757521248"},{"t":"Skreen","d":"Skreen[me] turns everyday screenshots and code snippets into polished visuals in seconds. Capture with a shortcut, add gradients, shadows, and annotations.","img":"https://macmenubar.com/wp-content/uploads/2026/02/skreenme.webp","u":"https://github.com/levskiy0/skreenme"},{"t":"ActionBar","d":"This lightweight macOS companion keeps an eye on your GitHub Actions runs, shows real-time statuses, sends completion notifications, and connects securely with minimal permissions and zero code access.","img":"https://macmenubar.com/wp-content/uploads/2026/02/actionbar.webp","u":"https://apps.apple.com/us/app/actionbar/id6758538752"},{"t":"Solace","d":"Solace quietly keeps your Mac in step with the outside world, switching appearance with sunrise, sunset, and even changing weather. It can warm your screen in the evening and sync wallpapers, then simply runs unnoticed.","img":"https://macmenubar.com/wp-content/uploads/2026/03/solace.webp","u":"https://theodorehq.com/solace/"},{"t":"WLEDControl","d":"WLEDControl puts your WLED lights within easy reach, letting you adjust brightness, pick colors, trigger effects, and organize devices in seconds. The clean interface keeps everyday lighting control fast, simple, and pleasantly friction-free.","img":"https://macmenubar.com/wp-content/uploads/2026/03/wledcontrol.webp","u":"https://apps.apple.com/us/app/wledcontrol/id6759883611"},{"t":"Vigil","d":"Vigil keeps a quiet eye on your Mac, showing in real time which apps are using your camera or microphone, complete with proper names and icons. It even resolves Electron helpers, runs fully offline, and respects your privacy.","img":"https://macmenubar.com/wp-content/uploads/2026/02/vigil.webp","u":"https://vigil.griffoncrest.com/"},{"t":"Ghost Text","d":"Ghost Text lets you capture unselectable or hidden text from anywhere on your screen in seconds. It works instantly through macOS’s built-in Vision framework, keeps everything offline, and quietly copies results straight to your clipboard.","img":"https://macmenubar.com/wp-content/uploads/2026/02/ghosttext.webp","u":"https://www.ghosttext.app/"},{"t":"Consul","d":"Some people convert files the old-fashioned way, clicking through dialogs like it’s 2007. Consul quietly does it for you: simply rename a file’s extension and it instantly converts images, documents, audio, or video right on your Mac.","img":"https://macmenubar.com/wp-content/uploads/2026/03/consul.webp","u":"https://getconsul.app/"},{"t":"LocalPorts","d":"LocalPorts keeps your localhost projects organized by letting you monitor running services, start or restart them, open local URLs instantly, and save commands for quick reuse, all in a lightweight, native macOS interface that stays fully local and distraction-free.","img":"https://macmenubar.com/wp-content/uploads/2026/02/localports.webp","u":"https://github.com/onderk-motion/LocalPorts"},{"t":"SuperMenuBar","d":"SuperMenuBar bundles a Pomodoro timer, sleep control, quick calendar access, camera preview, and mic monitoring into one lightweight, low-RAM utility, replacing a handful of single-purpose tools with a cleaner, more efficient workflow.","img":"https://macmenubar.com/wp-content/uploads/2026/03/supermenubar.webp","u":"https://macsuperapp.com/"},{"t":"PRBar","d":"PRBar keeps your GitHub pull requests and workflow checks within reach, so you can follow reviews, builds, and updates at a glance without living in a browser tab. It supports macOS 13+, uses the GitHub API, and stores your token securely in the Keychain for straightforward, private access to everything that matters.","img":"https://macmenubar.com/wp-content/uploads/2026/02/prbar.webp","u":"https://github.com/Neural-Harmonics/prbar"},{"t":"Lumiv","d":"Lumiv intelligently adjusts your screen’s color temperature throughout the day, reducing eye strain during long work sessions and supporting better sleep at night. It adapts to your location and routine, so your eyes can finally relax.","img":"https://macmenubar.com/wp-content/uploads/2026/03/lumiv.webp","u":"https://lumivapp.com/"},{"t":"Darki","d":"Darki switches between Light and Dark mode on your schedule, offers instant one-click control, and quietly runs at login so your Mac always matches the moment.","img":"https://macmenubar.com/wp-content/uploads/2026/02/darki.webp","u":"https://github.com/Kitround/Darki"},{"t":"BlinkMate","d":"BlinkMate gently reminds you to follow the 20-20-20 rule, helping reduce eye strain without disrupting your flow. Customizable intervals and subtle notifications keep your work rhythm intact while encouraging healthier screen habits.","img":"https://macmenubar.com/wp-content/uploads/2026/03/blinkmate.webp","u":"https://blinkmate.app/"},{"t":"AuraFi","d":"AuraFi is a menu bar app that plays lofi radio in one click. Choose a mood, press play, and stay focused without ads, accounts, algorithms, or browser distractions..","img":"https://macmenubar.com/wp-content/uploads/2026/02/aurafi.webp","u":"https://ariv.one/tools/"},{"t":"GitMenuBar","d":"GitMenuBar keeps everyday GitHub work close at hand, letting you create repos, commit changes, and manage branches straight from your menu bar without breaking focus or opening bulky clients.","img":"https://macmenubar.com/wp-content/uploads/2026/02/gitmenubar.webp","u":"https://github.com/saihgupr/GitMenuBar"},{"t":"Phyllon","d":"Phyllon lives in your macOS menu bar, letting you capture notes the moment inspiration strikes with instant typing, auto-save, and simple text export, all local, private, and distraction-free.","img":"https://macmenubar.com/wp-content/uploads/2026/02/phyllon.webp","u":"https://kaanuluer.com/ph/"},{"t":"Mino","d":"Mino is a lightweight, fully native macOS app that keeps track of GitHub releases with quiet precision. Add repositories in seconds, monitor updates at a glance, install via Homebrew when available, and store tokens securely in the Keychain, all wrapped in a clean, dependency-free design.","img":"https://macmenubar.com/wp-content/uploads/2026/02/mino.webp","u":"https://github.com/nad-bit/Mino"},{"t":"SimplShot","d":"SimplShot makes screenshots feel less like admin and more like momentum. Capture once, then instantly export every format you need, from social squares to custom pixel-perfect sizes, without repeating the same tedious steps. It is fast, focused and refreshingly simple.","img":"https://macmenubar.com/wp-content/uploads/2026/02/simplshot.webp","u":"https://www.simplshot.com/"},{"t":"RenderFocus","d":"RenderFocus gives you hands-on control over Apple Silicon by steering background apps to Efficiency cores and reserving full Performance power for the task that matters. With a single click, your Mac prioritizes builds, renders, and exports without distractions or data collection. (Now in beta, with access available upon request)","img":"https://macmenubar.com/wp-content/uploads/2026/02/RenderFocus.webp","u":"https://celalbasaran.com/renderfocus/"},{"t":"HomeBar","d":"HomeBar brings your Homey Pro smart home to your Mac, so there’s no need to jump between apps. With a single click, you can control devices by room, monitor energy and temperature in real time, trigger flows, and manage presence effortlessly.","img":"https://macmenubar.com/wp-content/uploads/2026/02/homebar_2.webp","u":"https://www.homebar.pro/"},{"t":"Meteorite","d":"Meteorite gives you an instant place to drop thoughts without breaking your flow. It stays fully keyboard-driven, supports Markdown, searches fast, and keeps everything local, so your notes remain simple and entirely yours.","img":"https://macmenubar.com/wp-content/uploads/2026/02/meteorite-2.webp","u":"https://trymeteorite.com/"},{"t":"GoogleDriveSync","d":"GoogleDriveSync keeps Google Drive syncing light and sane, letting you connect multiple accounts and folders from one native menu bar app while using minimal memory and handling external drives gracefully.","img":"https://macmenubar.com/wp-content/uploads/2026/02/googledrivesync.webp","u":"https://github.com/saihgupr/GoogleDriveSync"},{"t":"Netfluss","d":"Netfluss keeps things simple, showing real-time upload and download speeds across all active adapters, along with key IP details and quick reconnect options, all in a clean, open-source Swift build that stays lightweight and out of your way.","img":"https://macmenubar.com/wp-content/uploads/2026/02/netfluss.webp","u":"https://github.com/rana-gmbh/netfluss"},{"t":"SRV Status","d":"SRV Status gives you clear insight into network and local volumes, lets you reconnect servers in a click, organize shares neatly, and monitor capacity without clutter or drama.","img":"https://macmenubar.com/wp-content/uploads/2026/02/SRV_status.webp","u":"https://apps.apple.com/us/app/srv-status/id6753591144"},{"t":"Dad Jokes","d":"Dad Jokes brings you a fresh, mildly embarrassing punchline on demand, wrapped in a clean native macOS design with proper dark mode support and a launch-at-login option for uninterrupted paternal humor.","img":"https://macmenubar.com/wp-content/uploads/2026/02/dad-jokes.webp","u":"https://github.com/hurazz/DadJokes"},{"t":"USB Status","d":"USB Status gives you instant insight into connected devices, showing negotiated speeds, power draw, vendor details and live status at a glance. You can rename hardware, inspect volumes and safely eject with precision, all in a fast, native macOS app that keeps every detail on your machine.","img":"https://macmenubar.com/wp-content/uploads/2026/02/usb_status.webp","u":"https://apps.apple.com/us/app/usb-status/id6751750190"},{"t":"Radioform","d":"Radioform is a free open source macOS equalizer that shapes sound system wide from the menu bar with a clean 10-band parametric EQ presets and custom curves for any app.","img":"https://macmenubar.com/wp-content/uploads/2026/02/radioform_new.webp","u":"https://www.radioform.app/"},{"t":"Workspace+","d":"Workspace+ lets you capture your entire working setup and bring it back in seconds, from open apps and files to window positions and browser tabs across multiple displays. It keeps context switching smooth, private, and genuinely effortless.","img":"https://macmenubar.com/wp-content/uploads/2026/02/workspace-plus-2.webp","u":"https://workspaceplus.app/"},{"t":"TextSniper","d":"TextSniper allows you to quickly convert uncopiable or unselectable text from any content visible on your mac’s screen into editable text copied to your clipboard.","img":"https://macmenubar.com/wp-content/uploads/2026/02/TextSniper-2.webp","u":"https://textsniper.app/"},{"t":"VoxTap","d":"VoxTap brings fast, offline voice-to-text to your Mac with a single hotkey and no setup drama. Your words stay on-device, appear instantly at the cursor, and remain searchable forever.","img":"https://macmenubar.com/wp-content/uploads/2026/02/voxtap.webp","u":"https://voxtap.app"},{"t":"Lean Running","d":"LeanRunning puts your Mac on autopilot by turning USB devices and WiFi networks into smart triggers. Launch or quit apps, run Shortcuts, and automate routines effortlessly, all without scripts, subscriptions, or unnecessary complexity.","img":"https://macmenubar.com/wp-content/uploads/2026/02/lean-running.webp","u":"https://www.ignotietquasiocculti.com/apps/leanrunning"},{"t":"Lumo","d":"Lumo quietly helps you protect your eyes and recharge during long screen sessions. Inspired by the 20-20-20 rule, it combines gentle break and breathing reminders with thoughtful analytics, making healthier daily habits feel natural and sustainable.","img":"https://macmenubar.com/wp-content/uploads/2026/02/lumo-scaled.webp","u":"https://apps.apple.com/us/app/lumo-eye-strain-20-20-20/id6758925986"},{"t":"Devly","d":"Devly brings more than fifty essential developer tools together in one lightweight macOS companion, keeping encoding, hashing, formatting, and text processing close at hand so you can move faster without breaking focus or opening another tab.","img":"https://macmenubar.com/wp-content/uploads/2026/02/devly.webp","u":"https://apps.apple.com/us/app/devly/id6759269801"},{"t":"Macty","d":"Macty keeps everyday tasks tight and local, from formatting JSON or decoding JWTs to generating tokens, cleaning URLs, and creating polished visuals. Lightweight, offline, and surprisingly complete.","img":"https://macmenubar.com/wp-content/uploads/2026/02/macty.webp","u":"https://apps.apple.com/app/id6758399106"},{"t":"Emojibar","d":"Emojibar keeps every emoji within easy reach and learns which ones you actually use, placing them front and center. One click copies, your preferred skin tone sticks, and everything runs quietly without hogging memory.","img":"https://macmenubar.com/wp-content/uploads/2026/02/emojibar.webp","u":"https://emojibar.com"},{"t":"Dorso","d":"Dorso keeps a quiet eye on your posture and gives you gentle on-screen nudges when you start to slouch. Using your webcam or AirPods, it tracks locally, respects your privacy, and helps you build healthier habits over time.","img":"https://macmenubar.com/wp-content/uploads/2026/02/dorso.webp","u":"https://dorso.app/"},{"t":"Net Bar","d":"Net Bar shows real-time upload and download speeds in your menu bar, then opens detailed network diagnostics with a click, all within a clean, customizable app.","img":"https://macmenubar.com/wp-content/uploads/2026/02/net-bar.webp","u":"https://netbar.xyz/"},{"t":"Thaw","d":"Thaw (a fork of Ice) keeps your menu bar tidy by hiding and revealing icons as needed, while steadily adding fixes and features, making this revived fork a reliable, versatile companion for modern macOS.","img":"https://macmenubar.com/wp-content/uploads/2026/02/thaw-3.webp","u":"https://github.com/stonerl/Thaw"},{"t":"Menubar Timeline","d":"MenubarTimeline lives quietly in your menu bar, blending calendar events and reminders into one clean timeline, with a live countdown so you always know what’s next without opening anything.","img":"https://macmenubar.com/wp-content/uploads/2026/01/menubartimeline.webp","u":"https://apps.apple.com/us/app/menubar-timeline/id6758136586"},{"t":"OpenUsage","d":"OpenUsage keeps track of your AI coding limits across providers like Codex, Claude, and Cursor, so you always know what’s left before a reset hits. It’s plugin-based, and quietly updates in the background, giving you one clear overview instead of ten scattered dashboards.","img":"https://macmenubar.com/wp-content/uploads/2026/02/openusage.webp","u":"https://www.openusage.ai/"},{"t":"Hexa","d":"Hexa gives you instant number conversions and live expression evaluation in one small menu bar app, so hex, binary, and bitmasks finally make sense without extra tabs or calculators.","img":"https://macmenubar.com/wp-content/uploads/2026/01/hexa.webp","u":"https://hexa.skushagra.com/"},{"t":"FlowPods","d":"FlowPods turns your AirPods or Beats into a quiet focus companion, automatically tracking deep work and breaks through motion data. With clear daily insights and fully local processing, it keeps productivity effortless and private.","img":"https://macmenubar.com/wp-content/uploads/2026/02/flowpods.webp","u":"https://getflowpods.com/"},{"t":"BucketDrop","d":"BucketDrop is a macOS menu bar app that lets you upload files to your own S3-compatible storage, then instantly copies a shareable URL.","img":"https://macmenubar.com/wp-content/uploads/2026/01/bucketdrop.webp","u":"https://github.com/fayazara/bucketdrop"},{"t":"Dot","d":"Dot lives quietly in your menu bar, showing upcoming meetings, reminders, attachments, and one-click joins, while adding shortcuts, world clocks, and a clean, lightweight design that stays out of way.","img":"https://macmenubar.com/wp-content/uploads/2026/01/dot-scaled.webp","u":"https://www.trydot.app/"},{"t":"WebWatcher","d":"WebWatcher monitors websites from your Safari sessions, quietly checking for changes and sending clean, native notifications, so important updates surface without extra logins or extensions.","img":"https://macmenubar.com/wp-content/uploads/2026/01/webwatcher.webp","u":"https://github.com/ivg-design/web-watcher"},{"t":"Unblockd","d":"Unblockd quietly monitors your pull requests across Bitbucket, GitHub, and GitLab. Instead of noisy notifications, it surfaces only what needs attention, so you can review on your own schedule.","img":"https://macmenubar.com/wp-content/uploads/2026/02/unblockd.webp","u":"https://unblockd.app"},{"t":"Plae","d":"Plae lives in your macOS menu bar and lets you translate instantly with a simple shortcut. Everything runs on-device, so your text stays private, even offline, and results can be shown full-screen for easy sharing.","img":"https://macmenubar.com/wp-content/uploads/2026/02/plae.webp","u":"https://getplae.app"},{"t":"Presently","d":"Presently keeps your Slack status in sync with your location by switching emojis automatically based on your Wi-Fi network, so your team knows whether you’re home, at the office, or away without lifting a finger.","img":"https://macmenubar.com/wp-content/uploads/2026/02/presently.webp","u":"https://apps.apple.com/se/app/presently/id6504904260"},{"t":"MenuNotes","d":"menuNotes is a tiny menu bar companion that gives you a fast, always-available space for temporary text. Just click, type, and move on, with simple formatting and zero distractions.","img":"https://macmenubar.com/wp-content/uploads/2026/02/menunotes.webp","u":"https://apps.apple.com/de/app/menunotes/id6758704553"},{"t":"FocusFlow","d":"A calm macOS menu bar companion that keeps your day on track with Pomodoro and custom timers, gentle alarms, and breathing exercises for steady focus and quiet productivity.","img":"https://macmenubar.com/wp-content/uploads/2026/01/focus_flow.webp","u":"https://kaanuluer.com/ff/"},{"t":"JotDown","d":"JotDown lets you jot quick thoughts with hotkeys and send them straight to Apple Notes, offering a clean, fast, distraction-free capture space.","img":"https://macmenubar.com/wp-content/uploads/2026/01/jotdown.webp","u":"https://jotdown.rishisingh.in/"},{"t":"Portsly","d":"Portsly lives in your menu bar, showing which apps occupy which ports, so you can inspect processes, open services instantly, and terminate anything misbehaving with a single click.","img":"https://macmenubar.com/wp-content/uploads/2026/01/portsly.webp","u":"https://github.com/ghinkle/portsly"},{"t":"MacPulse","d":"MacPulse reimagines Activity Monitor with a clear dashboard and plain-English insights, recording performance sessions and turning CPU, memory, and thermal data into practical advice so you actually understand your Mac.","img":"https://macmenubar.com/wp-content/uploads/2026/02/macpulse.webp","u":"https://www.macpulse.app/"},{"t":"VPN Bypass","d":"VPN Bypass lives in your menu bar and routes selected apps and domains outside your VPN, keeping work secure while streaming, messaging, and everyday browsing stay fast and hassle-free.","img":"https://macmenubar.com/wp-content/uploads/2026/01/vpn-bypass.webp","u":"https://github.com/GeiserX/VPN-Bypass"},{"t":"Pacebuddy","d":"Pacebuddy lives in your menu bar, turning CPU monitoring into a playful ritual as animated characters dance with real-time load, while a lightweight dashboard quietly tracks system stats.","img":"https://macmenubar.com/wp-content/uploads/2026/01/pacebuddy.webp","u":"https://apps.apple.com/us/app/pacebuddy/id6749213835"},{"t":"CodexBar","d":"CodexBar sits quietly in your menu bar, tracking AI coding tools’ session and weekly limits so you always know your runway and avoid surprise resets, with minimal, privacy-friendly design.","img":"https://macmenubar.com/wp-content/uploads/2026/01/codexbar.webp","u":"https://codexbar.app/"},{"t":"Usagebar","d":"Usagebar lives in your menu bar, quietly tracking Claude Code’s five-hour and weekly limits so you stay informed, adjust models wisely, and avoid sudden lockouts while working.","img":"https://macmenubar.com/wp-content/uploads/2026/01/usagebar.webp","u":"https://usagebar.com/"},{"t":"Recadio","d":"Recadio keeps your Mac’s audio under control by prioritizing preferred input and output devices automatically, so Bluetooth no longer hijacks quality and switching feels effortless, fast, and quietly reliable.","img":"https://macmenubar.com/wp-content/uploads/2026/02/recadio.webp","u":"https://recadio.com/"},{"t":"OS Engine","d":"OS Engine brings your Mac desktop to life with dynamic video wallpapers, custom HTML overlays, and real-time widgets, all optimized for performance, battery life, and effortless control from the menu bar.","img":"https://macmenubar.com/wp-content/uploads/2026/01/os-engine.webp","u":"https://osengine.org/"},{"t":"CaddyBar","d":"CaddyBar brings Caddy Server to your macOS menu bar, making local development smoother with automatic HTTPS, reverse proxies, and effortless control over sites and domains.","img":"https://macmenubar.com/wp-content/uploads/2026/01/caddybar.png","u":"https://caddybar.app/"},{"t":"Clipmighty","d":"Clipmighty quietly remembers everything you copy, offering infinite history, iCloud sync, and smart search in a lightweight menu bar app with privacy at heart.","img":"https://macmenubar.com/wp-content/uploads/2026/02/clipmighty.webp","u":"https://nalarin.com/clipmighty"},{"t":"Itsytv","d":"Control your Apple TV effortlessly from the menu bar, browse apps, type with your keyboard, and see what’s playing, all in a fast, native, privacy-friendly companion.","img":"https://macmenubar.com/wp-content/uploads/2026/02/itsytv.webp","u":"https://itsytv.app/"},{"t":"FocusPet","d":"FocusPet adds a playful Pomodoro timer to your menu bar, where a tiny animated pet keeps you company, making focus sessions lighter, customizable, and surprisingly pleasant without cluttering your screen.","img":"https://macmenubar.com/wp-content/uploads/2026/02/focuspet.webp","u":"https://apps.apple.com/nl/app/focuspet-pomodoro-timer/id6757148785"},{"t":"Itsyhome","d":"Itsyhome brings your entire HomeKit setup to the menu bar, letting you control lights, locks, and more instantly while staying fast, native, and lightweight with handy shortcuts and smart grouping.","img":"https://macmenubar.com/wp-content/uploads/2026/02/itsyhome.webp","u":"https://itsyhome.app/"},{"t":"Viraam","d":"Viraam gently nudges you to rest, stretch, and reset during work and calls, grouping breaks intelligently, tracking habits with a clean heatmap, and keeping all your data private and local.","img":"https://macmenubar.com/wp-content/uploads/2026/01/gentle-break-reminder.webp","u":"https://www.viraam.app/"},{"t":"AutoMounter","d":"AutoMounter lives in your menu bar and automatically connects your network shares when conditions are right, keeping servers, files, and workflows quietly available without constant manual mounting.","img":"https://macmenubar.com/wp-content/uploads/2026/01/automounter.webp","u":"https://www.pixeleyes.co.nz/automounter/"},{"t":"Whispr","d":"Whispr is a quiet, privacy-first clipboard manager for macOS that lives in your menu bar, keeps duplicates away, masks sensitive data, and offers fast, distraction-free access when you need it.","img":"https://macmenubar.com/wp-content/uploads/2026/01/whispr.webp","u":"https://kaanuluer.com/whispr/"},{"t":"Typester","d":"Typester turns speech into text in any app, using your own Soniox key for fast, private dictation with hotkeys, auto-paste, and dozens of languages.","img":"https://macmenubar.com/wp-content/uploads/2026/01/typester.webp","u":"https://github.com/nickustinov/typester-macos"},{"t":"Pinster","d":"Pinster sits quietly in your menu bar and opens pinned websites in fast, floating popovers, so your favorite tools stay close without the clutter of a full browser.","img":"https://macmenubar.com/wp-content/uploads/2026/01/pinster.webp","u":"https://github.com/nickustinov/pinster-macos"},{"t":"Roam FM","d":"Roam FM turns live radio from 40,000 stations worldwide into ambient background sound, letting you drift through unfamiliar voices and places in real time, quietly from your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2026/01/roam_FM.webp","u":"https://roamfm.app/en/"},{"t":"1Setter","d":"1Setter lets you toggle common and hidden macOS settings instantly, so you skip System Settings and switch modes faster, keeping everyday workflows simple and smooth.","img":"https://macmenubar.com/wp-content/uploads/2026/01/1setter.webp","u":"https://www.1setter.app/"},{"t":"WeekNumber","d":"A minimal menu bar app that quietly shows the current week number, so you always know where the year stands without opening a calendar or breaking your focus.","img":"https://macmenubar.com/wp-content/uploads/2026/01/weeknumber.webp","u":"https://github.com/BaldrianSector/week-number"},{"t":"Montr","d":"Montr gives precise hardware-level control over brightness, contrast, and color across all monitors, with smart profiles that switch automatically based on displays, time, or power state.","img":"https://macmenubar.com/wp-content/uploads/2026/01/montr.png","u":"https://www.montr.iamngoni.dev/"},{"t":"Resurf","d":"Capture thoughts, links, images and notes in seconds from your menu bar, then browse and organize them in a clean, private, local-first library that stays fast and quietly out of your way.","img":"https://macmenubar.com/wp-content/uploads/2026/01/Resurf-.webp","u":"https://resurf.so/"},{"t":"Relinq","d":"Relinq lives in your Mac’s menu bar and converts music links between Spotify, Apple Music, and more with one click, so sharing songs stays effortless instead of awkward.","img":"https://macmenubar.com/wp-content/uploads/2026/01/relinq_2.webp","u":"https://relinq.app/"},{"t":"Currency Converter","d":"Convert over 130 currencies instantly from your Mac’s menu bar. Fast, elegant, and always visible, it delivers real-time exchange rates without switching apps or breaking your workflow.","img":"https://macmenubar.com/wp-content/uploads/2026/01/currency-converter.webp","u":"https://apps.apple.com/us/app/menu-bar-currency-converter/id6514281147"},{"t":"TighterMenubar","d":"TighterMenubar lets you fine-tune menu bar spacing for a cleaner, more compact layout, so all your items stay visible without slipping behind the notch.","img":"https://macmenubar.com/wp-content/uploads/2026/01/tightermenubar.webp","u":"https://apps.apple.com/us/app/tightermenubar/id6751470911"},{"t":"Ahsk","d":"Ahsk brings AI directly into every Mac app. Select text, speak, or capture screenshots to ask, translate, rewrite, and analyze without breaking focus, all from a native menu bar companion.","img":"https://macmenubar.com/wp-content/uploads/2026/01/ahsk-scaled.webp","u":"https://www.ahsk.app/"},{"t":"Purifai","d":"Purifai keeps pasted text readable by removing unsupported formatting while preserving structure. Destination-aware cleanup for Mail, Docs, Slack, and more, fully offline, instant, and distraction-free.","img":"https://macmenubar.com/wp-content/uploads/2026/01/purifai.webp","u":"https://purifai.app"},{"t":"Emoji Pro","d":"Emojo is a lightweight menu bar app that brings playful text-based emoticons to your chats, offering quick access to expressive ASCII art that works everywhere, without subscriptions or fuss.","img":"https://macmenubar.com/wp-content/uploads/2026/01/emojo-pro.webp","u":"https://emojo.sagomind.com/"},{"t":"SaneBar","d":"SaneBar is a privacy-first macOS menu bar manager that hides clutter, protects sensitive icons with Touch ID, and helps you find any app instantly, even behind the notch.","img":"https://macmenubar.com/wp-content/uploads/2026/01/sanebar.webp","u":"https://sanebar.com/"},{"t":"ZoneBar","d":"A macOS menu bar app that shows multiple world clocks at a glance, with custom names and a time-travel slider to plan meetings or check if friends abroad are awake.","img":"https://macmenubar.com/wp-content/uploads/2026/01/zonebar.webp","u":"https://apps.apple.com/ca/app/zonebar-time-zones/id6756977321"},{"t":"GoTrio","d":"GoTrio is a macOS menu bar app that limits you to three priorities, helping you focus, finish tasks one by one, and end the day with clarity.","img":"https://macmenubar.com/wp-content/uploads/2026/01/gotrio.webp","u":"https://www.usegotrio.app/"},{"t":"MiddleDrag","d":"MiddleDrag brings true middle-click and middle-drag to your Mac trackpad with a simple three-finger gesture, making tab management, terminal pasting, and 3D navigation feel oddly normal at last.","img":"https://macmenubar.com/wp-content/uploads/2026/01/middledrag.webp","u":"https://github.com/NullPointerDepressiveDisorder/MiddleDrag"},{"t":"Hotspot Peek","d":"Hotspot Peek lives in your menu bar and automatically tracks iPhone hotspot data in real time, helping you stay within limits and avoid surprise overages while working on the go.","img":"https://macmenubar.com/wp-content/uploads/2026/01/hotspot_peek.webp","u":"https://apps.apple.com/us/app/hotspot-peek/id6757591640"},{"t":"YapYap","d":"YapYap is a macOS menu bar app that lets you post to X and LinkedIn instantly, without timelines, distractions, or overthinking, so sharing ideas feels quick, natural, and painless.","img":"https://macmenubar.com/wp-content/uploads/2026/01/yapyap.webp","u":"https://yapyap.dev/"},{"t":"WhisperShortcut","d":"WhisperShortcuts is a macOS menu bar app that turns speech into text or AI prompts, combining Gemini intelligence with offline Whisper dictation and custom shortcuts for faster everyday workflows.","img":"https://macmenubar.com/wp-content/uploads/2026/01/whispershortcut.webp","u":"https://github.com/mgsgde/whisper-shortcut"},{"t":"Battery Vitals","d":"Battery Vitals keeps your MacBook’s battery health visible in the menu bar, showing cycles, capacity, and condition at a glance so you know when performance starts to fade.","img":"https://macmenubar.com/wp-content/uploads/2026/01/battery-vitals.webp","u":"https://apps.apple.com/us/app/battery-vitals/id6757302299"},{"t":"FlareBar","d":"FlareBar brings Cloudflare to your Mac menu bar, letting developers search resources, jump to dashboards instantly, and monitor live metrics without breaking focus or opening endless browser tabs.","img":"https://macmenubar.com/wp-content/uploads/2026/01/flarebar.webp","u":"https://flarebar.app/"},{"t":"AudiBar","d":"AudiBar brings simple audio playback and internet radio to your menu bar, letting you drag, drop, and play instantly without libraries, clutter, or heavyweight music apps.","img":"https://macmenubar.com/wp-content/uploads/2026/01/audibar.webp","u":"https://audibar.app/"},{"t":"VPN Peek","d":"VPN Peek quietly watches your VPN from the menu bar, alerting you to disconnects and DNS or IPv6 leaks, so you always know when your privacy slips.","img":"https://macmenubar.com/wp-content/uploads/2026/01/vpn-peek.webp","u":"https://apps.apple.com/us/app/vpn-peek/id6757384027"},{"t":"Bettery","d":"Bettery is a lightweight macOS menu bar app that shows precise battery percentage, health, and charging details in a clean, compact icon, giving you essential insight without unnecessary clutter.","img":"https://macmenubar.com/wp-content/uploads/2026/01/bettery.webp","u":"https://apps.apple.com/us/app/bettery-indicator/id6756705246"},{"t":"MacDNS","d":"MacDNS secures your Mac at DNS level, blocking malware, phishing, ads, and trackers, with customizable protection, DNSSEC validation, developer overrides, and seamless use on any network, all running locally.","img":"https://macmenubar.com/wp-content/uploads/2026/01/macdns.webp","u":"https://macdns.app/"},{"t":"GHomeBar","d":"GHomeBar brings Google Home to your macOS menu bar, letting you manage devices, automations, and cameras instantly without opening a browser tab.","img":"https://macmenubar.com/wp-content/uploads/2026/01/ghomebar.webp","u":"https://github.com/paolorotolo/GHomeBar"},{"t":"SnippetsLab","d":"SnippetsLab is a macOS menu bar assistant that lets developers quickly store, search, and reuse code snippets and notes, keeping everything organized and instantly accessible while you stay focused.","img":"https://macmenubar.com/wp-content/uploads/2026/01/snippetslab.webp","u":"https://www.renfei.org/snippets-lab/"},{"t":"Notchifications","d":"A lightweight macOS menu bar app that tracks build progress quietly in the notch, showing smooth animations and a small confetti moment when tasks finally finish.","img":"https://macmenubar.com/wp-content/uploads/2026/01/notchifications.webp","u":"https://notchification.carrd.co/"},{"t":"Cistern","d":"Cistern is a native macOS menu bar app that quietly tracks your CircleCI builds in real time, reflecting build status at a glance and notifying you when builds start or finish.","img":"https://macmenubar.com/wp-content/uploads/2026/01/cistern.webp","u":"https://github.com/atombender/cistern"},{"t":"Simple Screenshot","d":"A simple screenshot tool that lives in your Mac’s menu bar. Capture screens, windows, or selections, then save them automatically to your chosen folder or the clipboard.","img":"https://macmenubar.com/wp-content/uploads/2026/01/simple-screenshot.webp","u":"https://www.simplescreenshot.app"},{"t":"Ooml","d":"A lightweight macOS menu bar app for recording screen and face video messages offline, running quietly in the background while keeping everything local, private, and refreshingly simple.","img":"https://macmenubar.com/wp-content/uploads/2026/01/ooml.webp","u":"https://emfinnigan.github.io/io.ooml.app/"},{"t":"Taphouse","d":"Taphouse brings Homebrew out of the terminal and into a clean, native macOS interface, letting you browse, install, update, and manage packages visually with minimal effort.","img":"https://macmenubar.com/wp-content/uploads/2026/01/taphouse.webp","u":"https://taphouse.multimodalsolutions.gr/"},{"t":"ExtraBar","d":"ExtraBar turns your macOS menu bar into a customizable command center, letting you jump into apps, files, and automations instantly, with shortcuts that match how you work.","img":"https://macmenubar.com/wp-content/uploads/2025/12/extrabar.webp","u":"https://extrabar.app/"},{"t":"Time","d":"Time is a macOS menu bar app that shows multiple time zones, previews future hours, and lets you join meetings instantly, keeping global schedules clear without clutter.","img":"https://macmenubar.com/wp-content/uploads/2025/12/time-scaled.webp","u":"https://menubartime.com/"},{"t":"DisplayMode Menu","d":"Switch display resolutions from the menu bar with ease. Save favorites, manage each display separately, and trigger changes via Shortcuts without digging through macOS settings.","img":"https://macmenubar.com/wp-content/uploads/2025/12/displaymode-menu.webp","u":"https://github.com/peaz/displaymodemenu"},{"t":"BrewServicesManager","d":"Manage Homebrew services straight from the menu bar. Start, stop, and monitor user or system services in real time, without touching the Terminal or breaking your workflow.","img":"https://macmenubar.com/wp-content/uploads/2025/12/BrewServicesManager.png","u":"https://github.com/validatedev/BrewServicesManager"},{"t":"Let It Snow Desktop","d":"Add a gentle snowfall to your desktop with one click. Let It Snow Desktop lives in the menu bar, animating smooth, realistic snow across all your displays.","img":"https://macmenubar.com/wp-content/uploads/2025/12/let-it-snow-desktop.webp","u":"https://apps.apple.com/us/app/let-it-snow-desktop/id6755482420"},{"t":"Workspace Manager","d":"Switch projects without rebuilding your setup every time. From the menu bar, WorkSpace Manager opens terminals, apps, folders, and websites in one click, turning context switches into instant focus.","img":"https://macmenubar.com/wp-content/uploads/2025/12/workspace-manager.webp","u":"https://frafra077.github.io/workspace-manager/"},{"t":"Thock","d":"Thock adds satisfying keyboard sounds, with multiple sound modes and custom packs that make typing feel mechanical, playful, and fully native.","img":"https://macmenubar.com/wp-content/uploads/2025/12/thock.webp","u":"https://github.com/kamillobinski/thock"},{"t":"Capcha","d":"Capcha is a macOS menu bar app for capturing, enhancing, and animating screenshots, helping you turn everyday captures into polished visuals quickly, ready for sharing or presentation.","img":"https://macmenubar.com/wp-content/uploads/2025/12/capcha.webp","u":"https://apps.apple.com/in/app/screenshot-tool-pro-capcha/id6449191849"},{"t":"Brain Plus","d":"Brain Plus is a macOS menu bar app offering quick 15-second mental math challenges, helping you stay sharp with focused practice, simple streaks, and distraction-free brain training throughout the day.","img":"https://macmenubar.com/wp-content/uploads/2025/12/mental-math.webp","u":"https://apps.apple.com/in/app/mental-math-brain-plus/id6756784276"},{"t":"BetterAudio","d":"BetterAudio is a macOS menu bar app that puts audio control within reach, letting you switch devices, adjust volume, see what’s playing, and work faster with shortcuts.","img":"https://macmenubar.com/wp-content/uploads/2025/12/betteraudio.webp","u":"https://github.com/rokartur/BetterAudio/"},{"t":"ClaudeBar","d":"A macOS menu bar app that quietly tracks Claude, Codex, and Gemini usage, showing remaining quotas at a glance with subtle alerts, so you stop checking commands and keep coding.","img":"https://macmenubar.com/wp-content/uploads/2025/12/claudebar.webp","u":"https://github.com/tddworks/ClaudeBar"},{"t":"Deploy Status for Vercel","d":"A lightweight macOS menu bar app that shows real-time Vercel deploy statuses with clear color indicators, letting you monitor multiple projects at a glance without breaking your workflow.","img":"https://macmenubar.com/wp-content/uploads/2025/12/deploy-status-vercel.webp","u":"https://clemstation.com/deploy-status-for-vercel"},{"t":"Spacer","d":"Spacer helps you reclaim your Mac’s menu bar by adding smart gaps that push stubborn icons aside, creating calm, organized space even on notched displays.","img":"https://macmenubar.com/wp-content/uploads/2025/12/spacer.webp","u":"https://clemstation.com/spacer"},{"t":"Rex","d":"A smart macOS menu bar alarm that quietly protects your MacBook in cafés and airports, automatically arming itself and sounding off loudly if someone tries to walk away with it.","img":"https://macmenubar.com/wp-content/uploads/2025/12/rex.webp","u":"https://rexprotects.com/"},{"t":"FireWally","d":"This menu bar app lets you monitor and control which apps connect to the internet in real time, clearly explains their activity, and allows you to block unwanted connections to protect privacy and data usage.","img":"https://macmenubar.com/wp-con y.com"},{"t":"Parall","d":"Parall adds a menu bar icon for each isolated app instance, giving you quick, clutter-free access to multiple versions of the same app directly from the macOS menu bar.","img":"https://macmenubar.com/wp-content/uploads/2025/12/parall.webp","u":"https://parall.app/"},{"t":"OpenFolder","d":"This menu bar app opens your most-used folders and files instantly. OpenFolder keeps your workspace within reach with a clean, glassy interface that stays out of your way.","img":"https://macmenubar.com/wp-content/uploads/2025/11/openfolder.webp","u":"https://apps.apple.com/us/app/openfolder/id6753940577"},{"t":"CountUp","d":"A lightweight, minimal menu bar stopwatch that keeps time without fuss. Start, pause, or reset instantly, all in a clean, friendly little tool.","img":"https://macmenubar.com/wp-content/uploads/2025/11/countup.webp","u":"https://github.com/problaze20/CountUp"},{"t":"PortKiller","d":"PortKiller reveals active development port processes, identifies their sources, and lets you effortlessly kill anything misbehaving, with smooth support for Docker, Homebrew, and modern Macs.","img":"https://macmenubar.com/wp-content/uploads/2025/11/portkiller.webp","u":"https://github.com/gupsammy/PortKiller/"},{"t":"QuickShelf","d":"This menu bar app gives instant access to your favorite folders, with quick previews, drag-and-drop, and smooth SwiftUI performance.","img":"https://macmenubar.com/wp-content/uploads/2025/11/quickshelf.webp","u":"https://quickshelf-app.slowlab.dev/"},{"t":"VibeViewer","d":"A macOS menu bar app offering quick insight into team usage and spending, with seamless sign-in, smart refreshing, and a modular SwiftUI architecture built for clarity and flexibility.","img":"https://macmenubar.com/wp-content/uploads/2025/11/vibeviewer.webp","u":"https://github.com/MarveleE/Vibeviewer"},{"t":"Port Smith","d":"Port Smith keeps your local development smooth by showing which processes occupy which ports and letting you stop them instantly. A loads/2025/04/subscription-day.webp","u":"https://apps.apple.com/ua/app/subscription-day-calendar/id6743316600"},{"t":"SomLauncher","d":"Create custom workflows and launch them instantly with a single click from your menu bar, streamlining repetitive tasks and boosting productivity.","img":"https://macmenubar.com/wp-content/uploads/2025/04/somlauncher.webp","u":"https://www.somapplication.com/launcher"},{"t":"BarCuts","d":"BarCuts is a menu bar app that smartly shows the Shortcuts you need, right when you need them – based on the app you’re currently using.","img":"https://macmenubar.com/wp-content/uploads/2025/04/barcuts.webp","u":"https://actions.work/barcuts/"},{"t":"MenuCopy","d":"MenuCopy lets you instantly view and copy your most recent text and image, right from the menu bar. Built for productivity, it keeps your clipboard history private, organized, and always within reach.","img":"https://macmenubar.com/wp-content/uploads/2025/04/menucopy.webp","u":"https://apps.apple.com/app/id6742753291"},{"t":"Text Lens","d":"Extract text from anywhere on your screen. Select any area containing text – from images, videos, PDFs, or presentations – and instantly convert it to editable text. You can also drag and drop images onto the menu bar icon to extract text.","img":"https://macmenubar.com/wp-content/uploads/2025/03/text-lens.webp","u":"https://sindresorhus.com/text-lens"},{"t":"CleanerXCode","d":"CleanerXcode frees up storage by removing unnecessary Xcode files like Derived Data, build caches, device support files, and simulator data.","img":"https://macmenubar.com/wp-content/uploads/2025/03/cleanerxcode.webp","u":"https://github.com/didisouzacosta/CleanerXcode"},{"t":"ColorKeep","d":"ColorKeep automatically captures HEX values from your clipboard, creating your perfect color library in seconds. Perfect for designers who need to quickly reuse colors.","img":"https://macmenubar.com/wp-content/uploads/2025/03/colorkeep.webp","u":"https://colorkeep.attach.design/"},{"t":"AppleAI","d":"A menu bar app that lets you chat instantly with ChatGPT, Claude, Copilot, Perplexity, DeepSeek, and Grok—from any window. Fast, seamless, and always accessible.","img":"https://macmenubar.com/wp-content/uploads/2025/03/apple-ai.webp","u":"https://github.com/bunnysayzz/AppleAI"},{"t":"ZoneShare","d":"This menu bar app lets you mirror part of your screen into a resizable window—perfect for clearer screen sharing during video calls on ultra-wide monitors.","img":"https://macmenubar.com/wp-content/uploads/2025/03/zoneshare.webp","u":"https://apps.apple.com/us/app/zoneshare-mirror-your-screen/id6743621581"},{"t":"FlightBar","d":"Track flights effortlessly with FlightBar—real-time updates, live maps, and notifications, all from your menu bar. Perfect for travelers and aviation enthusiasts.","img":"https://macmenubar.com/wp-content/uploads/2025/03/flightbar.webp","u":"https://apps.apple.com/ca/app/flightbar/id6743351003?mt=12"},{"t":"SoundShare","d":"This menu bar app makes it easy to share audio on macOS, just like on iOS. Connect multiple Bluetooth audio devices and enjoy music, podcasts, or movies together—without the hassle. SoundShare keeps your audio perfectly in sync.","img":"https://macmenubar.com/wp-content/uploads/2025/03/soundshare.webp","u":"https://apps.apple.com/us/app/soundshare-audio-sharing/id6742040464"},{"t":"NameQuick","d":"NameQuick automates file renaming with AI, custom rules, and real-time monitoring—perfect for designers, photographers, and developers handling large file batches.","img":"https://macmenubar.com/wp-content/uploads/2025/03/namequick.webp","u":"https://www.namequick.cc/"},{"t":"DropNote","d":"DropNote is a lightweight, distraction-free note-taking app, living in your menu bar for instant access. With autosave, tabbed notes, and a minimal design, it keeps your ideas organized without getting in the way.","img":"https://macmenubar.com/wp-content/uploads/2025/03/dropnote.webp","u":"https://dropnote.dev/"},{"t":"Time Until","d":"This menu bar app helps you track countdowns to important events—birthdays, vacations, and more. Add up to 8 events, optionally sync with your macOS calendar, get real-time updates, and receive alerts when the time comes.","img":"https://macmenubar.com/wp-content/uploads/2025/03/time_until.webp","u":"https://widgetworx.com/apps/timeuntil.html"},{"t":"SymbolScribe","d":"SymbolScribe lets you quickly find, manage, and organize your favorite emojis, kaomojis, and symbols—perfect for messaging, social media, and email!","img":"https://macmenubar.com/wp-content/uploads/2025/03/symbolscribe.webp","u":"https://apps.apple.com/us/app/symbolscribe/id6470879005"},{"t":"PopTranslate","d":"PopTranslate is a translation app that lives in your menu bar. With a simple shortcut or click, you can instantly translate text from any app without disrupting your workflow.","img":"https://macmenubar.com/wp-content/uploads/2025/03/pop-translate.webp","u":"https://poptranslate.app/"},{"t":"Peace","d":"This menu bar app keeps your Mac awake by playing a built-in game or logs you out when you step away. No more unwanted timeouts or security worries—just set it and forget it.","img":"https://macmenubar.com/wp-content/uploads/2025/03/peace.webp","u":"https://marcoluthi.gumroad.com/l/dqsgmj"},{"t":"Tasktile","d":"Tasktile turns task tracking into a visual experience with a GitHub-style contribution calendar. It keeps users engaged by transforming daily tasks into a clear, motivating progress map.","img":"https://macmenubar.com/wp-content/uploads/2025/03/tasktile.webp","u":"https://github.com/jasonqiu0/Tasktile"},{"t":"Antinote","d":"Antinote is a temporary notes and calculations app for quick tasks, featuring plain text, conversions, and easy export to other apps.","img":"https://macmenubar.com/wp-content/uploads/2025/03/antinote.webp","u":"https://antinote.io/"},{"t":"Monocle","d":"Monocle is a menu bar app that keeps you focused by blurring everything except your active window. Instantly reduce distractions while staying flexible—toggle on and off as needed for deep work or multitasking.","img":"https://macmenubar.com/wp-content/uploads/2025/03/monocle.webp","u":"https://iamdk.gumroad.com/l/monocle-elegant-macos-window-blur-focus"},{"t":"Scroll the Volume","d":"Instantly adjust your Mac’s volume by scrolling over the menu bar icon with an intuitive, elegant interface that stays completely out of your way.","img":"https://macmenubar.com/wp-content/uploads/2025/03/scroll-the-volume-2.webp","u":"https://apps.apple.com/be/app/scroll-the-volume/id6743161021"},{"t":"Simple Time Tracker","d":"Track time efficiently with integrations to your favorite tools and applications seamlessly together. Visualize how you spend time across days, weeks, and months with detailed stats and charts.","img":"https://macmenubar.com/wp-content/uploads/2025/03/simple-time-tracker.webp","u":"https://apps.apple.com/us/app/simple-time-tracker/id6642659223"},{"t":"Mouse Jiggler","d":"Prevent your Mac from entering sleep mode reliably, protecting against unexpected sleep cycles interrupting work. Perfect for long downloads, presentations, or when you need continuous operation without interruptions.","img":"https://macmenubar.com/wp-content/uploads/2025/03/mouse-jiggler.webp","u":"https://mousejigglermac.com/"},{"t":"DiskView","d":"DiskView shows all mounted drives with free and used space at a glance. Simple, minimal, and efficient for quick disk monitoring.","img":"https://macmenubar.com/wp-content/uploads/2025/03/diskview.webp","u":"https://apps.apple.com/us/app/diskview/id6627346631"},{"t":"Year Progress App","d":"The Year Progress app visually tracks your progress through the year, displaying how much time has passed and how much remains. It offers a simple, motivating way to stay aware of time.","img":"https://macmenubar.com/wp-content/uploads/2025/03/year-progress-app.webp","u":"https://theyearprogress.app/en"},{"t":"Wunderbar","d":"Wunderbar helps you learn new words in your target language through spaced repetition, example sentences, and audio—seamlessly integrating language learning into your daily workflow.","img":"https://macmenubar.com/wp-content/uploads/2025/03/wunderbar.webp","u":"https://wunderbarapp.com/"},{"t":"Googly Eyes","d":"This menu bar app adds animated googly eyes to your screen that follow your cursor as you move— a fun and lighthearted way to bring some personality to your desktop.","img":"https://macmenubar.com/wp-content/uploads/2025/03/googly-eyes.webp","u":"https://sindresorhus.com/googly-eyes"},{"t":"FocusNudge","d":"FocusNudge is a menu bar app that gives you a gentle nudge when you switch to a distracting app, reminding you of what you actually intended to do.","img":"https://macmenubar.com/wp-content/uploads/2025/03/focusnudge.webp","u":"https://apps.apple.com/nl/app/focusnudge/id6742843669"},{"t":"Last Window Quits","d":"Last Window Quits is designed to automatically close apps when their last window is closed, saving system memory and preventing unnecessary background processes.","img":"https://macmenubar.com/wp-content/uploads/2025/03/last-window-quits.webp","u":"https://lawand.io/last-window-quits/"},{"t":"BlackEyes","d":"BackEyes uses the front camera to detect faces in real time and prevent screen peeping. The app works offline, using an AI model to recognize faces without requiring an internet connection. It does not store or process any facial data of you or others.","img":"https://macmenubar.com/wp-content/uploads/2025/03/black-eyes.webp","u":"https://apps.apple.com/cn/app/backeyes/id6741500980"},{"t":"MaClicker","d":"MaClicker is a simple auto-clicker for Mac. It is built with Swift and can achieve up to 100 clicks per second.","img":"https://macmenubar.com/wp-content/uploads/2025/03/maclicker.png","u":"https://github.com/WorldOfBasti/MaClicker"},{"t":"WattSec","d":"WattSec shows your system’s real-time power consumption (in watts) directly in the menu bar. It provides an easy way to monitor energy usage, helping users optimize power efficiency and battery life.","img":"https://macmenubar.com/wp-content/uploads/2025/03/wattsec.webp","u":"https://github.com/beutton/wattsec"},{"t":"Sleep Aid","d":"Sleep Aid monitors your Mac’s sleep activity and highlights what’s keeping it awake unnecessarily, giving you the insight to fix energy-wasting habits and letting your machine rest properly when you’re not using it.","img":"https://macmenubar.com/wp-content/uploads/2025/03/sleep-aid.webp","u":"https://ohanaware.com/sleepaid/"},{"t":"MenuBar IP","d":"MenuBar IP displays your Mac’s public IP address in the menu bar, making it easy to monitor your network, verify VPN locations, and access geolocation insights instantly.","img":"https://macmenubar.com/wp-content/uploads/2025/03/menubar-ip.webp","u":"https://apps.apple.com/us/app/menubar-ip/id6532621020"},{"t":"DeskMinder","d":"DeskMinder is a menu bar app for quick desktop reminders. Set timers up to 99 minutes, get full-screen alerts, and sync with Apple Reminders to stay focused and organized.","img":"https://macmenubar.com/wp-content/uploads/2025/03/deskminder.webp","u":"https://appps.od.ua/deskminder/"},{"t":"AIBattery","d":"AIBattery helps optimize battery performance and extend its lifespan with real-time insights and smart charging tools. It monitors battery health, adjusts charging patterns, and provides expert tips to maintain peak performance.","img":"https://macmenubar.com/wp-content/uploads/2025/03/aibattery.webp","u":"https://www.aibatteryapp.com/"},{"t":"Stickier","d":"This menu bar app combines classic note-taking with modern features like iCloud sync, rich text formatting, and customizable designs. It prioritizes privacy (no tracking, ads, or subscriptions) and offers quick search, handy widgets, and seamless access.","img":"https://macmenubar.com/wp-content/uploads/2025/02/stickier.webp","u":"https://camazotz.com/stickier/"},{"t":"DockLock","d":"DockLock stops your Mac’s Dock from jumping between screens unexpectedly in multi-monitor setups, keeping it exactly where you put it. A small fix that makes a noticeable difference for anyone working across displays.","img":"https://macmenubar.com/wp-content/uploads/2025/02/docklock.webp","u":"https://docklockpro.com/"},{"t":"Command Keeper","d":"This menu bar app lets you organize your command-line snippets, Bash scripts, and even SQL queries, giving you quick access to them anytime from virtually any program. Works on macOS Ventura, Sonoma, and Sequoia.","img":"https://macmenubar.com/wp-content/uploads/2025/02/command_keeper.webp","u":"https://widgetworx.com/apps/commandkeeper.html"},{"t":"Momentry","d":"Keep track of life’s important moments with Momentry – a sleek countdown tracker in your Mac’s menu bar for birthdays, anniversaries, and special events, always visible at a glance.","img":"https://macmenubar.com/wp-content/uploads/2025/02/momentry.webp","u":"https://apps.apple.com/us/app/momentry/id6741929907"},{"t":"Captin","d":"Captin displays your Mac’s Caps Lock status clearly on screen, preventing accidental all-caps messages and embarrassing typos from keyboard mistakes.","img":"https://macmenubar.com/wp-content/uploads/2025/02/captain.webp","u":"https://captin.mystrikingly.com/"},{"t":"Dropclock","d":"Dropclock lets you create timers instantly with a simple drag-and-drop gesture. No complicated menus—just click the menu bar icon, drag to set the time, and release to start your timer.","img":"https://macmenubar.com/wp-content/uploads/2025/02/dropclock.webp","u":"https://github.com/WrkX/Dropclock/"},{"t":"DNS Easy Switcher","d":"This menu bar app lets you quickly switch between different DNS providers (or add custom ones).","img":"https://macmenubar.com/wp-content/uploads/2025/02/dns_easy_switcher.webp","u":"https://github.com/glinford/dns-easy-switcher"},{"t":"TypoTab","d":"TypoTab enhances writing with AI-powered tools, allowing users to refine text, correct grammar, and adjust tone seamlessly across applications.","img":"https://macmenubar.com/wp-content/uploads/2025/02/typotab.webp","u":"https://www.typotab.com/"},{"t":"DayBar","d":"DayBar displays the local date and reminders in the menu bar. Click it to view your calendar, events, and reminders, all synced with Apple Calendar. It seamlessly integrates scheduling and task management into your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2025/02/daybar.webp","u":"https://apps.apple.com/us/app/daybar/id6739052447"},{"t":"FlexiBackup","d":"This menu bar app makes it easy to change your iOS backup location, allowing you to store backups on an external hard drive instead of taking up space on your Mac or iCloud.","img":"https://macmenubar.com/wp-content/uploads/2025/02/flexibackup.webp","u":"https://kahsenglee.gumroad.com/l/FlexiBackup"},{"t":"Promptly for AI","d":"Promptly lets you capture any text on your screen and run it through AI-powered actions in seconds. Select, trigger, and move on without copying or switching apps. With built-in prompts, custom workflows, and smart OCR, it turns scattered screen text into something instantly useful.","img":"https://macmenubar.com/wp-content/uploads/2025/02/promptly.webp","u":"https://apps.apple.com/tr/app/promptly-for-ai/id6741008514"},{"t":"PowerHungry","d":"This menu bar app shows AC power and remaining battery time. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications.","img":"https://macmenubar.com/wp-content/uploads/2025/02/powerhungry.webp","u":"https://www.louisdassy.dev/PowerHungry"},{"t":"MenuToDo","d":"This Kanban-style task manager keeps your tasks organized without disrupting your workflow. Drag and drop tasks between To Do, In Progress, and Done, prioritize with colors, and stay focused—all from your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2025/02/menu_todo.webp","u":"https://www.mehmetali.co/menutodo"},{"t":"RadioBar","d":"With RadioBar, you can listen to over 50,000 radio stations from every corner of the globe, right from your Mac’s menu bar.","img":"https://macmenubar.com/wp-content/uploads/2025/02/radiobar-new.webp","u":"https://apps.apple.com/it/app/radiobar/id6741157331"},{"t":"StockMonitor","d":"StockMonitor lets you track real-time stock prices with a minimalist approach. Get alerts, customize your watchlist, and stay effortlessly updated on market changes.","img":"https://macmenubar.com/wp-content/uploads/2025/02/stockmonitor.webp","u":"https://stockmonitor.xyz/"},{"t":"Flameshot","d":"Capture, annotate, and instantly share screenshots with customizable tools, quick cloud uploads, and precise editing controls all in one fluid workflow.","img":"https://macmenubar.com/wp-content/uploads/2025/02/flameshot.webp","u":"https://flameshot.org/"},{"t":"SwatchKeep","d":"SwatchKeep keeps your color palettes always accessible. Capture, store, and retrieve colors instantly with a global shortcut—perfect for designers, developers, and creatives.","img":"https://macmenubar.com/wp-content/uploads/2025/02/swatchkeep.webp","u":"https://www.davidevago.com/swatchkeep/"},{"t":"Fairy Lights","d":"This menu bar app adds festive Christmas lights beneath your Mac’s menu bar, bringing a cozy and cheerful holiday touch to your screen.","img":"https://macmenubar.com/wp-content/uploads/2025/02/fairy-lights.webp","u":"https://github.com/chippokiddo/fairylights"},{"t":"AutoShot","d":"This menu bar app automatically captures screenshots at set intervals. It supports multiple displays, custom formats, and auto-deletion.","img":"https://macmenubar.com/wp-content/uploads/2025/02/autoshot.webp","u":"https://arthursmithdev.gumroad.com/l/AutoShot"},{"t":"Sprinkles","d":"Ever wanted to change something about a website? Now you can! When you visit a website, Sprinkles checks a directory on your computer for CSS and JS files that match the site’s hostname, then applies them to the site.","img":"https://macmenubar.com/wp-content/uploads/2025/02/sprinkles-2.webp","u":"https://getsprinkles.app/"},{"t":"AutoRun","d":"AutoRun eliminates the need for manual app launches by automating the process, saving time and ensuring your essential programs start instantly every time.","img":"https://macmenubar.com/wp-content/uploads/2025/01/AutoRun_new.webp","u":"https://apps.apple.com/de/app/autorun-run-apps/id6739644500?"},{"t":"Moti","d":"This menu bar app displays the current temperature and weather conditions, with an intuitive icon for quick reference. When clicked, it opens a detailed 3-day weather forecast.","img":"https://macmenubar.com/wp-content/uploads/2025/01/moti.webp","u":"https://ko-fi.com/s/56af3c1636"},{"t":"Curiosa","d":"Curiota is designed for quick note-taking, file storage, and idea organization. It integrates effortlessly with your workflow, allowing you to save notes, links, images, and other data.","img":"https://macmenubar.com/wp-content/uploads/2025/01/curiota.webp","u":"https://www.zengobi.com/curiota/"},{"t":"Moves","d":"Moves makes window positioning effortless. Simply hold your modifier keys and move the mouse—no more struggling with tiny window edges or distant title bars.","img":"https://macmenubar.com/wp-content/uploads/2025/01/moves.webp","u":"https://mikkelmalmberg.com/moves"},{"t":"Leader Key","d":"This menu bar app boosts your keyboard productivity by enabling custom shortcuts with a single ‘leader’ key. You can set up key combos to open apps, run commands, or even spray confetti.","img":"https://macmenubar.com/wp-content/uploads/2025/01/leader-key.jpg","u":"https://github.com/mikker/LeaderKey.app"},{"t":"Click","d":"This menu bar app bring the authentic sound of mechanical keyboards to your Mac with Click—featuring premium switch recordings and zero latency.","img":"https://macmenubar.com/wp-content/uploads/2025/01/click.webp","u":"https://apps.apple.com/us/app/click-keyboard-sounds/id6740429323"},{"t":"Salah Time","d":"Salah Time displays precise prayer and adhan times in your menu bar, tailored to your location.","img":"https://macmenubar.com/wp-content/uploads/2025/01/salah-time.webp","u":"https://apps.apple.com/uk/app/prayer-times-salah-time/id6740510170"},{"t":"Deplog","d":"Monitor your Vercel deployments directly from your Mac’s menu bar — all without opening a browser.","img":"https://macmenubar.com/wp-content/uploads/2025/01/deplog.webp","u":"https://emredemirbulut.com/deplog"},{"t":"U Do","d":"U Do rotates tasks from your to-do list and displays them directly in your menu bar. Tasks rotate every 5 seconds (default).","img":"https://macmenubar.com/wp-content/uploads/2025/01/u-do.webp","u":"https://github.com/chriyocc/U-Do"},{"t":"KeyClicker","d":"KeyClicker is a menu bar app that brings the authentic typing sounds of over 200 mechanical keyboards and typewriters to life.","img":"https://macmenubar.com/wp-content/uploads/2025/01/keyclicker.webp","u":"https://wangchujiang.com/key-clicker/"},{"t":"Dyet","d":"This menu bar app automatically colors your folder icons to help you visually organize your files and add a personal touch to your workspace. It also supports one-time coloring.","img":"https://macmenubar.com/wp-content/uploads/2025/01/dyet.webp","u":"https://inchman.gumroad.com/l/Dyet"},{"t":"Mini Calendar","d":"Mini Calendar is a menu bar calendar showing both the Gregorian calendar and the traditional Chinese lunar calendar for quick date reference.","img":"https://macmenubar.com/wp-content/uploads/2019/12/minicalendar.webp","u":"https://github.com/sabercon/mini-calendar"},{"t":"Salah","d":"Prayer times in Islam change daily with the sun’s position due to Earth’s rotation and tilt. This menu bar app shows the next prayer time and a countdown. One click gives you a daily schedule tailored to your location.","img":"https://macmenubar.com/wp-content/uploads/2025/01/salah.webp","u":"https://haidernawaz8.gumroad.com/l/oeviz"},{"t":"Default Browser","d":"This menu bar app lets you change your Mac’s default browser on demand. Unlike similar apps, this one actually changes the system default browser.","img":"https://macmenubar.com/wp-content/uploads/2025/01/DefaultBrowser.webp","u":"https://sindresorhus.com/default-browser"},{"t":"PX to REM Converter","d":"Effortlessly convert between pixels (px) and rem for precise, responsive layouts — much more convenient than constantly relying on online converters!","img":"https://macmenubar.com/wp-content/uploads/2025/01/px-to-rem-converter.webp","u":"https://apps.apple.com/us/app/px-to-rem-converter/id6740210628"},{"t":"Check Check Check","d":"Yet another to-do app. Quietly living in your menu bar, it’s ready when you need it. No complex time management, just Check Check Check!","img":"https://macmenubar.com/wp-content/uploads/2025/01/check-check-check.webp","u":"https://lucas.io/checkcheckcheck/"},{"t":"Kleanly","d":"With just a tap, Kleanly lets you completely disable your keyboard and trackpad, allowing you to clean them without turning your Mac off.","img":"https://macmenubar.com/wp-content/uploads/2025/01/kleanly.jpg","u":"https://haidernawaz8.gumroad.com/l/tiyffv"},{"t":"Trace","d":"This menu bar app tracks the active apps and websites you visit without requiring any extra plugins or extensions (works with Firefox, Safari, Google Chrome, Arc, Brave, Chromium, and more).","img":"https://macmenubar.com/wp-content/uploads/2025/01/trace.webp","u":"https://trace-app.pages.dev/"},{"t":"Onliner","d":"Onliner keeps you “online” effortlessly by simulating undetectable mouse activity in the background. Ideal for remote workers and professionals, Onliner ensures uninterrupted focus and avoids idle status notifications. Simple, efficient, and smarter than any mouse jiggler.","img":"https://macmenubar.com/wp-content/uploads/2025/01/Onliner.webp","u":"https://apps.apple.com/app/onliner/id6738056056"},{"t":"Hawa","d":"Hawa means air/breeze in Hindi. This menubar plays ambient sounds to help you focus on your work or relax. You can choose from a variety of sounds, adjust the volume of each sound individually, or create your own mix.","img":"https://macmenubar.com/wp-content/uploads/2025/01/hawa.webp","u":"https://github.com/fayazara/hawa"},{"t":"RSS Ticker","d":"This menu bar app is an RSS reader designed to mimic the ticker display seen on forex stock exchange boards. News feeds update automatically when their respective RSS feeds are refreshed. The free version is limited to a single RSS feed.","img":"https://macmenubar.com/wp-content/uploads/2025/01/RSS-ticker.webp","u":"https://apps.apple.com/app/rss-ticker-news-feed/id6737011935"},{"t":"Sudoku Anyway","d":"This menubar sudoku app features unlimited puzzles across five difficulty levels with customizable board colors and helpful hints for solving every single skill level challenge.","img":"https://macmenubar.com/wp-content/uploads/2024/12/sudoku-anyway.webp","u":"https://apps.apple.com/us/app/sudoku-anyway/id6469003116"},{"t":"Learn Flags","d":"Learn world flags and dramatically enhance your geographic knowledge with this engaging, quick-access menubar game that sharpens your memory with every challenging session.","img":"https://macmenubar.com/wp-content/uploads/2024/12/learn-flags.webp","u":"https://apps.apple.com/us/app/learn-flags-menu-edition/id1456617441"},{"t":"Menuist","d":"This menu bar app is a Finder extension that adds powerful functionality to the right-click menu and toolbar in Finder.","img":"https://macmenubar.com/wp-content/uploads/2024/12/rightmenu-master.webp","u":"https://wangchujiang.com/rightmenu-master/"},{"t":"Overkill","d":"This menu bar app makes sure iTunes never interrupts your work. If you have other apps you don’t want to launch automatically (e.g. Photos app), you can add those apps to the Overkill list as well.","img":"https://macmenubar.com/wp-content/uploads/2024/12/overkill.jpg","u":"https://github.com/KrauseFx/overkill-for-mac"},{"t":"Let It Snow","d":"Experience a touch of winter wonder with snowflakes that gracefully drift across your screen, creating a peaceful and beautiful seasonal atmosphere on your Mac.","img":"https://macmenubar.com/wp-content/uploads/2024/12/let-it-snow.webp","u":"https://binhara.gumroad.com/l/letitsnow"},{"t":"MenuBarGrid","d":"Turn Google Sheets into powerful menu bar apps. Customize layouts, automate updates, and manage projects effortlessly.","img":"https://macmenubar.com/wp-content/uploads/2024/12/menubargrid.webp","u":"https://apps.apple.com/app/menubargrid/id6738577187"},{"t":"Ping Menubar","d":"This menu bar app displays ongoing ping (ICMP) results as a compact visualization. The design is similar to Pingr.","img":"https://macmenubar.com/wp-content/uploads/2024/12/ping-menubar.png","u":"https://github.com/simpleapps-public/ping-menubar"},{"t":"NeverNap","d":"NeverNap keeps your Mac awake, preventing sleep or screensaver activation for 5 minutes or indefinitely. It ensures smooth operation without manual system adjustments. (there’s also a pro version)","img":"https://macmenubar.com/wp-content/uploads/2024/12/nevernap.webp","u":"https://lucas.io/nevernap/"},{"t":"Totals App","d":"This menu bar app tracks your revenue in real time from Stripe, Paddle, Gumroad, Lemon Squeezy, and Polar. No dashboards or logins, just your earnings at a glance.","img":"https://macmenubar.com/wp-content/uploads/2024/12/totals-app.webp","u":"https://totalsapp.com"},{"t":"Barmarks","d":"Barmarks gives you quick, easy access to your most important links without the hassle of keeping browser tabs open – not scattered across multiple browsers or buried in bookmark apps you never check.","img":"https://macmenubar.com/wp-content/uploads/2024/12/barmarks.webp","u":"https://apps.apple.com/az/app/barmarks/id6739710035"},{"t":"Mappa Mini","d":"Quickly search for locations directly from your menu bar and open them in Apple Maps, Google Maps, or OpenStreetMap without leaving your desktop.","img":"https://macmenubar.com/wp-content/uploads/2024/12/mapa-mini.webp","u":"https://apps.apple.com/us/app/mappa-mini/id6739544806"},{"t":"Looks Like Rain","d":"Looks Like Rain provides real-time weather updates, focusing on precipitation forecasts. It displays detailed information on upcoming rain, snow, or storms, providing accurate weather alerts for your location.","img":"https://macmenubar.com/wp-content/uploads/2024/12/looks-like-rain.webp","u":"https://www.lookslikerain.app/"},{"t":"Weather Dock","d":"Weather Dock uses the user’s location to provide forecasts by coordinates, or users can manually enter any city to view its weather. The app allows switching between imperial and metric units and adjusting pressure units.","img":"https://macmenubar.com/wp-content/uploads/2024/12/weather-dock.webp","u":"https://apps.apple.com/us/app/weather-dock/id1624480719"},{"t":"Statuz","d":"This menu bar app lets you post to X (Twitter) and BlueSky in seconds, right from your desktop.","img":"https://macmenubar.com/wp-content/uploads/2024/12/statuz.png","u":"https://statuz.gg/"},{"t":"iCollections","d":"With iCollections, you can organize your desktop by grouping icons, folders, and files into customizable containers (collections).","img":"https://macmenubar.com/wp-content/uploads/2024/12/icollections.jpg","u":"https://naarakstudio.com/icollections/index.html"},{"t":"Festivitas","d":"Bring holiday spirit and festive cheer to your Mac with decorative visual elements in both your menu bar and dock, celebrating the season throughout your entire workday.","img":"https://macmenubar.com/wp-content/uploads/2024/12/festivitas.webp","u":"https://www.festivitas.app/"},{"t":"Snowy","d":"This menu bar app transforms your workspace into a winter wonderland. Including a little penguin that slides and glides across your dock.","img":"https://macmenubar.com/wp-content/uploads/2024/12/snowy.webp","u":"https://978244704581.gumroad.com/l/dbfkgh"},{"t":"Wifilicious","d":"Wifilicious transforms complex and confusing Wi-Fi network data into clear, actionable insights displayed right in your menu bar for better network understanding and effective management today.","img":"https://macmenubar.com/wp-content/uploads/2024/12/wifilicious.jpeg","u":"https://wifilicious.app/"},{"t":"Semantic SF","d":"This menu bar app lets you use natural language to search through SF Symbols. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications.","img":"https://macmenubar.com/wp-content/uploads/2024/12/semantic-sf-new.jpg","u":"https://apps.apple.com/us/app/semantic-sf/id6738750845"},{"t":"LightsOut","d":"This menu bar app allows for disabling monitors with a simple button click – no more cable fidgeting.","img":"https://macmenubar.com/wp-content/uploads/2024/12/lightsout.jpg","u":"https://github.com/AlonX2/LightsOut"},{"t":"QuickBrowse","d":"This menu bar app lets you access websites without leaving the app you’re currently in. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications.","img":"https://macmenubar.com/wp-content/uploads/2024/11/quickbrowse.jpeg","u":"https://github.com/QwertyOfficial/QuickBrowse"},{"t":"Last Thing","d":"This menu bar app helps you focus on a single task. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications.","img":"https://macmenubar.com/wp-content/uploads/2024/11/last-thing.jpg","u":"https://github.com/davideagostini/last_thing"},{"t":"EyeSpy Mouse Eyes","d":"This menu bar app adds playful eyes that follow your cursor. Now you can spy back at your mouse.","img":"https://macmenubar.com/wp-content/uploads/2024/11/eyespy.jpg","u":"https://apps.apple.com/us/app/eyespy-mouse-eyes/id6504020324"},{"t":"Billboard","d":"Add custom text to your menu bar and keep important information, reminders, or personal notes always visible and easily accessible on your screen at all times.","img":"https://raw.githubusercontent.com/daschaa/billboard/refs/heads/main/demo/demo.gif","u":"https://github.com/daschaa/billboard"},{"t":"Availability Sync Menu Bar","d":"When are you free? This menu bar app lets you choose your available days and times from a small calendar, then hit ‘generate’ to receive an email with all of the dates and hours you selected.","img":"https://macmenubar.com/wp-content/uploads/2024/11/availability-sync.jpg","u":"https://apps.apple.com/us/app/availability-sync-menu-bar/id6689494261"},{"t":"mactop","d":"View your CPU usage, core count, and memory consumption instantly with a single menu bar click for fast and effortless system performance monitoring and detailed real-time analysis today.","img":"https://macmenubar.com/wp-content/uploads/2024/11/mtop.jpg","u":"https://github.com/connor-finlay/mactop"},{"t":"Netlify Deploy Status","d":"This menu bar app is designed to keep you informed about the current deploy status of your Netlify sites. Whether you’re deploying a new version of your site or monitoring ongoing builds, this app gives you easy access to deployment updates in real-time.","img":"https://macmenubar.com/wp-content/uploads/2024/12/netlify-deploy-status.jpeg","u":"https://clemstation.com/apps/netlify-deploy-status"},{"t":"SoundSeer","d":"This menu bar app shows your currently playing song, and allows you to skip a track, click straight to the song / artist / album, and copy the URL for sharing.","img":"https://macmenubar.com/wp-content/uploads/2024/11/soundseer.jpeg","u":"https://github.com/jonathangarelick/SoundSeer"},{"t":"BlueFetch","d":"BlueFetch lets you instantly recover the Decentralized Identifiers (DIDs) for Bluesky using just a handle. (built for macOS Sequoia)","img":"https://macmenubar.com/wp-content/uploads/2024/12/bluefetch.png","u":"https://fitomad.gumroad.com/l/BlueFetch"},{"t":"Commitments","d":"This menu bar app is a lightweight solution for tracking small tasks throughout your workday. It works offline, and doesn’t collect any user data.","img":"https://macmenubar.com/wp-content/uploads/2024/12/commitments.png","u":"https://apps.apple.com/us/app/commitments-tasks-in-menu-bar/id6738696802"},{"t":"EmberMate","d":"A menu bar app that allows for full control of your ember mug, without having to use your phone.","img":"https://macmenubar.com/wp-content/uploads/2024/11/embermate.png","u":"https://github.com/matthewnitschke/EmberMate"},{"t":"Bartender Pro","d":"BartenderPro now includes Top Shelf, a clever upgrade that turns your MacBook notch into a surprisingly useful hub for files, weather, meetings, music, and quick access to everyday tools.","img":"https://macmenubar.com/wp-content/uploads/2024/11/bartender-pro-2.webp","u":"https://www.macbartender.com/pro/?utm_source=macmenubar&utm_campaign=may2026"},{"t":"Sportsbar","d":"Sportsbar is a menu bar app to track live scores, fixtures and standings on various major football leagues.","img":"https://macmenubar.com/wp-content/uploads/2024/06/sportsbar-new.jpg","u":"https://sports.menubarapp.com/"},{"t":"Automation Clipper","d":"Easily launch Python programs and scripts directly from your menu bar with a boost of inspirational motivation powering your entire automation workflow and overall productivity needs very effectively.","img":"https://macmenubar.com/wp-content/uploads/2024/11/automation-clipper.jpeg","u":"https://github.com/angx1/automation-clipper"},{"t":"StudioICC","d":"This menu bar app is designed for color management, enabling you to create, edit, and optimize ICC color profiles for precise color reproduction.","img":"https://macmenubar.com/wp-content/uploads/2024/11/studioicc.jpeg","u":"https://lowtechguys.com/studioicc/"},{"t":"Gamma Dimmer","d":"This menu bar app lets you dim the brightness of all your screens without compromising color accuracy.","img":"https://macmenubar.com/wp-content/uploads/2024/11/gamma_dimmer.jpg","u":"https://lowtechguys.com/gammadimmer/"},{"t":"Clockzones","d":"This menu bar app displays up to 8 different time zones simultaneously. Features include day/night indication, sunrise/sun
