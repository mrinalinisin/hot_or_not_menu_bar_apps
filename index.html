<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Menu Bar Catalogue &mdash; Hot or Not</title>
<style>
  :root {
    --paper: #f4efe4;
    --ink: #2b2622;
    --accent: #7a1f2b;
    --rule: #d8cdb6;
    --keep: #1f7a3d;
    --pass: #8a3320;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    line-height: 1.55;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;          /* dynamic vh: accounts for mobile browser chrome */
    overflow: hidden;        /* the card area scrolls, not the whole page */
  }
  header, .progresswrap, .controls, .sitefoot { flex: 0 0 auto; }   /* fixed-height shell pieces */
  .sitefoot {
    text-align: center;
    padding: .6rem 1rem;
    font-size: .72rem;
    color: #8a7f6d;
    border-top: 1px solid var(--rule);
  }
  .sitefoot a { color: var(--accent); }

  /* ---------- Top bar ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: .9rem 1.2rem;
    border-bottom: 2px solid var(--rule);
    flex-wrap: wrap;
  }
  header h1 { font-size: 1.35rem; letter-spacing: .03em; margin: 0; white-space: nowrap; }
  header .tag { font-style: italic; color: var(--accent); font-size: .85rem; }
  .spacer { flex: 1 1 auto; }
  .navbtn {
    font-family: inherit; font-size: .85rem; cursor: pointer;
    background: #fff; color: var(--ink);
    border: 1px solid var(--rule); border-radius: 999px;
    padding: .4rem .9rem;
    transition: background .15s ease, border-color .15s ease;
  }
  .navbtn:hover { border-color: var(--accent); }
  .navbtn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .navbtn .pill { font-weight: bold; }

  /* ---------- Progress ---------- */
  .progresswrap { padding: .55rem 1.2rem 0; }
  .progressbar { height: 6px; background: var(--rule); border-radius: 999px; overflow: hidden; }
  .progressbar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .25s ease; }
  .counts { display: flex; gap: 1rem; flex-wrap: wrap; font-size: .8rem; color: #6f6557; margin: .4rem 0 0; }
  .counts b { font-style: normal; }
  .counts .k { color: var(--keep); }
  .counts .p { color: var(--pass); }
  .counts .ct { cursor: pointer; border: 0; background: none; font: inherit; padding: .1rem .4rem; margin: -.1rem -.1rem; border-radius: 6px; transition: background .15s ease; }
  .counts .ct:hover, .counts .ct:focus-visible { background: rgba(0,0,0,.06); outline: none; }
  .counts .ct:focus-visible { box-shadow: 0 0 0 2px currentColor; }

  /* ---------- Card stage ---------- */
  .stage {
    flex: 1 1 auto;
    min-height: 0;            /* allow the flex child to shrink + scroll */
    display: flex;
    overflow-y: auto;
    padding: 1.2rem;
    position: relative;
  }
  /* margin:auto centers the card when it fits, but still lets the stage
     scroll to the top of a tall card (which justify-content:center clips). */
  .deck { width: min(440px, 92vw); margin: auto; position: relative; }
  .card {
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,.14);
    overflow: hidden;
    user-select: none;
    touch-action: pan-y;
    will-change: transform;
  }
  .card .art { background: #fff; padding: 1rem 1rem 0; }
  .card .art img { display: block; width: 100%; height: auto; max-height: 42vh; object-fit: contain; background: var(--paper); }
  .card .body { padding: .9rem 1.1rem 1.2rem; }
  .card .body h2 { font-size: 1.25rem; margin: 0 0 .4rem; letter-spacing: .01em; }
  .card .body p { margin: 0; font-size: .95rem; color: #4a423b; }
  .card .visit {
    display: block; margin-top: .9rem; font-size: .78rem; font-style: italic;
    color: var(--accent); text-decoration: none; opacity: .8;
  }

  /* swipe verdict stamp */
  .stamp {
    position: absolute; top: 18px; padding: .25rem .8rem;
    font-family: Georgia, serif; font-weight: bold; font-size: 1.4rem; letter-spacing: .08em;
    border: 4px solid; border-radius: 8px; text-transform: uppercase;
    opacity: 0; transition: opacity .08s linear; pointer-events: none;
  }
  .stamp.keep  { right: 18px; transform: rotate(12deg);  color: var(--keep);  border-color: var(--keep); }
  .stamp.pass  { left: 18px;  transform: rotate(-12deg); color: var(--pass);  border-color: var(--pass); }

  /* fly-off animations */
  .card.fly-keep  { transition: transform .35s ease, opacity .35s ease; transform: translateX(140%) rotate(18deg);  opacity: 0; }
  .card.fly-pass  { transition: transform .35s ease, opacity .35s ease; transform: translateX(-140%) rotate(-18deg); opacity: 0; }
  .card.fly-back  { transition: transform .3s ease, opacity .3s ease; transform: translateY(-40px); opacity: 0; }

  /* ---------- Action buttons (pinned footer) ---------- */
  .controls {
    border-top: 1px solid var(--rule);
    background: var(--paper);
    padding: .9rem 1rem 1rem;
  }
  .actions {
    display: flex; align-items: center; justify-content: center; gap: 1rem;
    margin: 0 0 .4rem;
  }
  .act {
    cursor: pointer; font-family: inherit;
    border: 2px solid var(--rule); background: #fff; color: var(--ink);
    border-radius: 999px; display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    line-height: 1; transition: transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .act:hover { transform: translateY(-2px); }
  .act .glyph { font-size: 1.7rem; }
  .act .glyph.svg { width: 1.7rem; height: 1.7rem; }
  .act .lbl { font-size: .62rem; margin-top: .25rem; letter-spacing: .06em; text-transform: uppercase; }
  .act .key { font-size: .58rem; opacity: .55; margin-top: .15rem; }
  .act.big { width: 78px; height: 78px; }
  .act.sm  { width: 60px; height: 60px; }
  .act.pass:hover  { border-color: var(--pass);  color: var(--pass); }
  .act.keep:hover  { border-color: var(--keep);  color: var(--keep); }
  .act:disabled { opacity: .35; cursor: default; transform: none; }
  .hint { text-align: center; font-size: .78rem; color: #8a7f6d; margin: .2rem 0 0; }

  /* ---------- Done screen ---------- */
  .done { text-align: center; max-width: 520px; }
  .done h2 { font-size: 1.8rem; margin: 0 0 .6rem; }
  .done p { color: #4a423b; }

  /* ---------- Review overlay ---------- */
  .review {
    position: fixed; inset: 0; z-index: 100; background: var(--paper);
    display: none; flex-direction: column;
  }
  .review.open { display: flex; }
  .review-head {
    display: flex; align-items: center; gap: .8rem; padding: 1rem 1.2rem;
    border-bottom: 2px solid var(--rule); flex-wrap: wrap;
  }
  .review-head h2 { margin: 0; font-size: 1.3rem; }
  .tabs { display: flex; gap: .4rem; }
  .tab {
    font-family: inherit; font-size: .85rem; cursor: pointer;
    background: #fff; border: 1px solid var(--rule); border-radius: 999px; padding: .35rem .9rem; color: var(--ink);
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .review-search {
    display: flex; align-items: center; gap: .8rem; padding: .7rem 1.2rem;
    border-bottom: 1px solid var(--rule);
  }
  .review-search input {
    flex: 1 1 auto; min-width: 0; font-family: inherit; font-size: .95rem;
    padding: .5rem .9rem; border: 1px solid var(--rule); border-radius: 8px;
    background: #fff; color: var(--ink);
  }
  .review-search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(122,31,43,.15); }
  .review-search .search-count { font-size: .8rem; color: #8a7f6d; white-space: nowrap; }
  .review-body { flex: 1 1 auto; overflow-y: auto; padding: 1.2rem; }
  .list {
    max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px; align-items: start;
  }
  .scroll-sentinel { grid-column: 1 / -1; height: 1px; }
  .row {
    display: flex; flex-direction: column; background: #fff; border: 1px solid var(--rule);
    border-radius: 8px; overflow: hidden;
    transition: box-shadow .15s ease, transform .15s ease;
  }
  .row:hover { box-shadow: 0 6px 16px rgba(0,0,0,.08); transform: translateY(-2px); }
  .card-main { text-decoration: none; color: inherit; display: block; }
  .row .card-image { padding: 12px 12px 0; }
  .row .card-image img {
    display: block; width: 100%; aspect-ratio: 1; object-fit: cover;
    border-radius: 6px; background: var(--paper);
  }
  .row .meta { padding: 12px 14px; flex: 1 1 auto; min-width: 0; }
  .row .meta h3 {
    margin: 0 0 .35rem; font-size: 1rem; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .row .meta p {
    margin: 0; font-size: .82rem; color: #6f6557; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
  }
  .row .rebucket { display: flex; gap: .3rem; flex-wrap: wrap; align-items: center; padding: 0 14px 14px; margin-top: auto; }
  .row .rebucket-label { flex-basis: 100%; font-size: .7rem; color: #8a7f6d; margin-bottom: .1rem; }
  .row .rebucket button {
    font-family: inherit; font-size: .72rem; cursor: pointer; padding: .2rem .5rem;
    border-radius: 999px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink);
    transition: background .12s ease, color .12s ease, border-color .12s ease;
  }
  .row .rebucket button.bk:hover { background: var(--keep);  color: #fff; border-color: var(--keep); }
  .row .rebucket button.bp:hover { background: var(--pass);  color: #fff; border-color: var(--pass); }
  /* the bucket this card is already in: shown as current, not a move target */
  .row .rebucket button.on { cursor: default; }
  .row .rebucket button.bk.on { background: var(--keep);  color: #fff; border-color: var(--keep); }
  .row .rebucket button.bp.on { background: var(--pass);  color: #fff; border-color: var(--pass); }
  .empty { text-align: center; color: #8a7f6d; font-style: italic; padding: 3rem 1rem; }
  .review-foot { padding: .9rem 1.2rem; border-top: 2px solid var(--rule); display: flex; gap: .8rem; flex-wrap: wrap; align-items: center; }
  .danger { color: var(--pass); }
  textarea.export {
    width: 100%; max-width: 760px; margin: 0 auto; display: block; height: 160px;
    font-family: ui-monospace, Menlo, monospace; font-size: .8rem; padding: .7rem;
    border: 1px solid var(--rule); border-radius: 6px; background: #fff; color: var(--ink);
  }

  /* ---------- Small screens ---------- */
  @media (max-width: 560px) {
    header { padding: .6rem .9rem; gap: .5rem .7rem; }
    header h1 { font-size: 1.1rem; }
    header .tag { font-size: .75rem; }
    .progresswrap { padding: .45rem .9rem 0; }
    .counts { gap: .5rem .9rem; font-size: .74rem; }
    .stage { padding: .8rem; }
    .card .art img { max-height: 38vh; }
    .controls { padding: .7rem .8rem .8rem; }
    .actions { gap: .8rem; }
    .act.big { width: 66px; height: 66px; }
    .act.sm  { width: 52px; height: 52px; }
    .act .glyph { font-size: 1.5rem; }
    .act .glyph.svg { width: 1.5rem; height: 1.5rem; }
    .hint { font-size: .7rem; }
    .review-head { padding: .8rem .9rem; gap: .5rem; }
    .row img { width: 64px; height: 48px; }
  }
  /* very short / landscape phones: keep the image from eating the card */
  @media (max-height: 560px) {
    .card .art img { max-height: 30vh; }
  }
</style>
</head>
<body>

<header>
  <h1>The Menu Bar Catalogue</h1>
  <span class="tag">Hot or Not</span>
  <span class="spacer"></span>
  <button id="reviewBtn" class="navbtn primary" type="button">Shortlist <span class="pill" id="keepPill">0</span></button>
</header>

<div class="progresswrap">
  <div class="progressbar"><i id="progressFill"></i></div>
  <p class="counts">
    <span><b id="cDone">0</b> of <button type="button" class="ct" data-bucket="todo" title="View items still to review"><b id="cTotal">0</b></button> reviewed</span>
    <button type="button" class="k ct" data-bucket="keep" title="View your Keep list">&hearts; Keep <b id="cKeep">0</b></button>
    <button type="button" class="p ct" data-bucket="pass" title="View your Pass list">&times; Pass <b id="cPass">0</b></button>
  </p>
</div>

<main class="stage" id="stage">
  <div class="deck" id="deck"></div>
</main>

<div class="controls" id="controls">
  <div class="actions" id="actions">
    <button class="act pass big" id="bPass" type="button" title="Pass (&larr;)" aria-label="Pass">
      <span class="glyph">&larr;</span>
    </button>
    <button class="act keep big" id="bKeep" type="button" title="Keep (&rarr;)" aria-label="Keep">
      <span class="glyph">&rarr;</span>
    </button>
  </div>
  <p class="hint" id="hint">Drag the card or use the buttons &middot; keys: &larr; pass &nbsp; &rarr; keep &nbsp; U undo</p>
</div>

<footer class="sitefoot">
  Data scraped from <a href="https://macmenubar.com/recently-added/" target="_blank" rel="noopener noreferrer">https://macmenubar.com</a> for educational purposes only
  &middot; <a href="stats.html">Stats</a>
</footer>

<!-- Review / shortlist overlay -->
<div class="review" id="review">
  <div class="review-head">
    <h2 id="reviewTitle">Your shortlist</h2>
    <div class="tabs" id="tabs">
      <button class="tab active" data-bucket="keep" type="button">&hearts; Keep <span id="tKeep">0</span></button>
      <button class="tab" data-bucket="pass" type="button">&times; Pass <span id="tPass">0</span></button>
      <button class="tab" data-bucket="todo" type="button">&#9744; To review <span id="tTodo">0</span></button>
    </div>
    <span class="spacer"></span>
    <button class="navbtn" id="closeReview" type="button">Back to swiping</button>
  </div>
  <div class="review-search">
    <input type="search" id="reviewSearch" placeholder="Search this list&hellip;" autocomplete="off" aria-label="Search this list">
    <span class="search-count" id="searchCount"></span>
  </div>
  <div class="review-body">
    <div class="list" id="reviewList"></div>
    <p class="empty" id="reviewEmpty" hidden>Nothing here yet.</p>
  </div>
  <div class="review-foot">
    <button class="navbtn" id="copyBtn" type="button">Copy this list</button>
    <span class="spacer"></span>
    <button class="navbtn danger" id="resetBtn" type="button">Reset everything</button>
  </div>
</div>

<script>
const DATA = [{"t":"Framéd – FREATURED","d":"This menu bar app keeps screenshots consistent. Set a fixed ratio or resolution once, then capture perfectly sized images for documentation, social posts, or landing pages in seconds.","img":"https://macmenubar.com/wp-content/uploads/2026/05/framed.webp","u":"https://apps.apple.com/de/app/framéd/id6763412000?utm_source=macmenubar&utm_campaign=june2026"},{"t":"MenuFC","d":"MenuFC keeps live football scores just a glance away, displaying match updates in real time and offering quick access to the full day’s fixtures.","img":"https://macmenubar.com/wp-content/uploads/2026/06/menufc.webp","u":"https://rujitraval.github.io/MenuFC/"},{"t":"O Fidget","d":"O adds a physics-based fidget toy to your Mac desktop, giving restless hands something to do during meetings, calls, or slow afternoons. With customizable physics, haptic feedback, and instant keyboard access, it turns distraction into harmless entertainment.","img":"https://macmenubar.com/wp-content/uploads/2026/06/O-fidget.webp","u":"https://ofidget.com/"},{"t":"Drafty","d":"Drafty keeps lightweight Codex tasks close at hand, making it easy to launch quick prompts, attach files, hand off to terminal editors, or dictate drafts locally without interrupting your command-line workflow.","img":"https://macmenubar.com/wp-content/uploads/2026/06/drafty.webp","u":"https://brrai.nz/products/drafty"},{"t":"LanGuard","d":"LanGuard automatically disables Wi-Fi whenever your Mac is connected to Ethernet and restores it when the cable is unplugged. Lightweight and wake-aware, it helps keep networking clean while respecting your manual Wi-Fi preferences and requiring no admin privileges.","img":"https://macmenubar.com/wp-content/uploads/2026/06/languard.webp","u":"https://github.com/roypadina/LanGuard"},{"t":"GreenRAM","d":"GreenRAM helps keep your Mac responsive by monitoring memory usage and automatically closing long-idle background apps. With customizable rules, smart app handling, and whitelist support, it reduces memory pressure without interfering with the app you’re actively using.","img":"https://macmenubar.com/wp-content/uploads/2026/06/greenram.webp","u":"https://github.com/lwj1994/greenram"},{"t":"QuickKey","d":"QuickKey keeps keyboard shortcuts close at hand by automatically showing commands for the app you’re using. Search, save favorites, and even trigger shortcuts instantly.","img":"https://macmenubar.com/wp-content/uploads/2026/06/quickkey.webp","u":"https://github.com/BrianB-22/QuickKey"},{"t":"Lockpaw","d":"Lockpaw lets you cover your screen instantly while keeping AI agents, builds, downloads, and SSH sessions running uninterrupted. It even alerts you when your agent needs attention.","img":"https://macmenubar.com/wp-content/uploads/2026/06/lockpaw.webp","u":"https://getlockpaw.com/"},{"t":"TimeGauge","d":"TimeGauge turns days, months, years, deadlines, and personal goals into elegant progress bars, helping you track projects while offering a broader perspective on how quickly life and time move forward.","img":"https://macmenubar.com/wp-content/uploads/2026/06/timegauge.webp","u":"https://timegauge.minilabs.cc/"},{"t":"Headroom","d":"Headroom keeps your Claude Code usage visible at a glance, showing live 5-hour and 7-day limits directly in the menu bar before they catch you in the middle of a task. It reads the usage data Claude Code already stores locally, requires no setup, API key, or login, and never makes a network connection.","img":"https://macmenubar.com/wp-content/uploads/2026/06/headroom-claude.webp","u":"https://headroom.walls.sh/"},{"t":"GhostCursor","d":"GhostCursor replaces your Mac’s pointer with a subtle highlight ring that remains visible to you while staying completely absent from screen recordings and screen sharing, making demos, tutorials, and presentations look cleaner.","img":"https://macmenubar.com/wp-content/uploads/2026/06/ghostcursor.webp","u":"https://bendansby.com/apps/ghostcursor.html"},{"t":"FlagBar","d":"FlagBar brings visual keyboard layout indicators back to macOS, replacing plain text with country flags, custom emojis, or your own images. It’s lightweight, easy to personalize, and keeps language switching instantly recognizable at a glance.","img":"https://macmenubar.com/wp-content/uploads/2026/06/flagbar.webp","u":"https://apps.apple.com/us/app/flagbar-keyboard-flags/id6772763170"},{"t":"Fan Control Center","d":"Fan Control Center gives Mac users direct control over cooling performance with manual fan adjustments, real-time temperature monitoring, and customizable automation rules.","img":"https://macmenubar.com/wp-content/uploads/2026/06/Fan-Control-Center.webp","u":"https://github.com/ShahzaibAli02/Fanny-MacOs-FanControl"},{"t":"DevCacheCleaner","d":"DevCacheCleaner helps developers reclaim valuable disk space by scanning for cache files, build artifacts, and other generated data created by Xcode, Node.js, Android, Flutter, and similar tools. It provides a clear overview of storage usage before cleanup, making it easy to safely remove unnecessary files while keeping source code untouched.","img":"https://macmenubar.com/wp-content/uploads/2026/06/devcachecleaner.webp","u":"https://www.kangama.com/en/devcachecleaner/"},{"t":"KeyMinder","d":"KeyMinder instantly reveals keyboard shortcuts for your active macOS app, grouped by menu. Triggered by a hotkey, it keeps workflows smooth. Free, open source, and always up to date.","img":"https://macmenubar.com/wp-content/uploads/2026/06/KeyMinder.webp","u":"https://keyminder.app/"},{"t":"Offsend","d":"Offsend helps prepare projects, files, and clipboard text before sending them into AI tools like ChatGPT and Claude. It runs locally on your Mac, masking sensitive data such as keys, client info, and internal paths without relying on cloud processing or external servers.","img":"https://macmenubar.com/wp-content/uploads/2026/06/offsend.webp","u":"https://github.com/Offsend/Offsend"},{"t":"MenuBarShelf","d":"MenuBarShelf keeps overcrowded Mac menu bars manageable by gathering every icon, even the ones sacrificed to the notch, into a clean native popover.","img":"https://macmenubar.com/wp-content/uploads/2026/06/menubarshelf_new.webp","u":"https://menubarshelf.talkiplanet.com/"},{"t":"Menuist","d":"Menuist enhances Finder with practical file management tools and faster access to frequently used folders. It streamlines everyday workflows with features like file creation, path copying, code previews, folder history, and customizable context menus.","img":"https://macmenubar.com/wp-content/uploads/2026/06/menuist.webp","u":"macappstore://itunes.apple.com/app/id6737160756"},{"t":"QuickCal","d":"QuickCal brings calendars, world clocks, and natural-language time calculations together in a fast, offline workspace. It helps professionals coordinate across time zones, track holidays, and answer date-related questions without subscriptions or internet access.","img":"https://macmenubar.com/wp-content/uploads/2026/06/quickcal.webp","u":"https://github.com/BrianB-22/quickcal"},{"t":"DoD","d":"DoD puts a fast, system-wide dictionary at your fingertips, letting you look up English and German words from anywhere with a keyboard shortcut. It works entirely offline, includes thesaurus support for English, and offers customizable themes to match your workflow and taste.","img":"https://macmenubar.com/wp-content/uploads/2026/06/DoD.webp","u":"https://widgetworx.com/apps/dod.html"},{"t":"AppHault","d":"AppHalt helps keep your Mac responsive by pausing unused apps without closing their windows, tabs, or documents. It offers a simple way to reduce background activity while keeping your workspace fully intact.","img":"https://macmenubar.com/wp-content/uploads/2026/06/apphault.webp","u":"https://apphalt.app/"},{"t":"Fader","d":"Fader brings precise audio control to your Mac with per-app volume sliders, instant output switching, Bluetooth device management, and microphone activity monitoring.","img":"https://macmenubar.com/wp-content/uploads/2026/06/fader.webp","u":"https://fader.pantafive.dev/"},{"t":"Latte","d":"latte is a lightweight downloader that makes grabbing videos and audio surprisingly simple. Paste one or multiple links, choose your preferred format, and download content from thousands of supported sites, all through a clean, unobtrusive interface.","img":"https://macmenubar.com/wp-content/uploads/2026/06/latte.webp","u":"https://github.com/arinltte/latte"},{"t":"rubarb.bar","d":"This menu bar app brings a smarter approach to screen brightness by adapting to what’s actually on your display, keeping light levels comfortable whether you’re reading a bright document or working in a dark editor.","img":"https://macmenubar.com/wp-content/uploads/2026/06/rubarb.webp","u":"https://paretosecurity.com"},{"t":"StayUp","d":"StayUp Duck keeps Apple Silicon machines awake while local tasks like AI agents, renders, downloads, or servers continue running. It switches between manual and auto modes, watching activity and preventing sleep when work is active, then stepping back once things settle.","img":"https://macmenubar.com/wp-content/uploads/2026/06/stayup.webp","u":"https://getstayup.app/"},{"t":"LUCE","d":"This menu bar app temporarily locks your keyboard while keeping mouse controls active, making keyboard cleaning effortless.","img":"https://macmenubar.com/wp-content/uploads/2026/05/luce-scaled.webp","u":"https://github.com/arinltte/LUCE"},{"t":"GetCompress","d":"GetCompress compresses videos, images, GIFs, and PDFs locally with efficient batch processing, broad format support, and smooth drag-and-drop workflows.","img":"https://macmenubar.com/wp-content/uploads/2026/05/getcompress-scaled.webp","u":"https://getcompress.com"},{"t":"Trigger","d":"Trigger helps Ableton Live users take control of their workflow by remapping keyboard shortcuts and MIDI controls to more comfortable commands. It also supports macros, profiles, and iCloud sync across multiple Macs.","img":"https://macmenubar.com/wp-content/uploads/2026/06/trigger.webp","u":"https://allgoodfolks.com/trigger"},{"t":"Tokens4Breakfast","d":"Tokens 4 Breakfast keeps track of AI token usage, subscriptions and spending across tools like ChatGPT, Claude and Cursor, all from one lightweight place.","img":"https://macmenubar.com/wp-content/uploads/2026/05/tokens4breakfast.webp","u":"https://www.tokens4breakfast.app/"},{"t":"PredictBar","d":"PredictBar keeps your Kalshi portfolio within reach, displaying real-time P&L, ROI, cash-out value, and open positions at a glance. Smart alerts highlight profit targets, stop-loss thresholds, and arbitrage opportunities, helping traders stay informed without constantly checking a browser.","img":"https://macmenubar.com/wp-content/uploads/2026/06/predictbar.webp","u":"https://www.predictbar.app/"},{"t":"CrossHair","d":"This menu bar app helps designers and developers inspect interfaces with precision, combining a fullscreen crosshair, pixel loupe, persistent guides, and measurement tools that make layout work faster, clearer, and far less guesswork-driven.","img":"https://macmenubar.com/wp-content/uploads/2026/06/crosshair.webp","u":"https://bendansby.com/apps/crosshair.html"},{"t":"Vibedock","d":"Vibedock makes managing Claude Code MCP servers simple by letting you enable or disable them with a single click. It automatically restarts sessions when changes occur and keeps project-specific configurations in sync.","img":"https://macmenubar.com/wp-content/uploads/2026/05/vibedock.webp","u":"https://vibedock.dev"},{"t":"Tiny Remap","d":"Tiny Remap lets you remap almost any key system-wide in seconds, helping writers, developers, and multilingual users create a more efficient and comfortable typing experience without complicated setup.","img":"https://macmenubar.com/wp-content/uploads/2026/05/tiny-remap.webp","u":"https://egi.ch/en/tiny-remap/"},{"t":"Snapback","d":"Snapback helps you save and restore complete workspace layouts, making it easy to return to the exact setup you need. With window snapping, multi-display support, keyboard shortcuts, and fast workspace switching.","img":"https://macmenubar.com/wp-content/uploads/2026/05/snapback.webp","u":"https://snapbackapp.com/"},{"t":"BarDict","d":"BarDict keeps dictionary lookups fast and fluid, combining multi-dictionary search with polished animations, trackpad gestures, and keyboard-first navigation.","img":"https://macmenubar.com/wp-content/uploads/2026/05/bardict.webp","u":"https://github.com/TokinoyuushaLink/BarDict"},{"t":"iCanHazShortcut","d":"iCanHazShortcut keeps terminal commands a keyboard shortcut away, turning repetitive tasks into quick reflexes instead of tiny daily rituals of annoyance.","img":"https://macmenubar.com/wp-content/uploads/2026/05/iCanHazShortcut.webp","u":"https://github.com/deseven/iCanHazShortcut"},{"t":"Leaf","d":"Leaf quietly watches for inactive apps wasting memory in the background and nudges you when it might be time to quit them.","img":"https://macmenubar.com/wp-content/uploads/2026/05/leaf.webp","u":"https://satwiktungala.com/apps"},{"t":"ChocolateBar","d":"ChocolateBar adds a second row beneath your Mac’s menu bar, bringing hidden notch-blocked icons and open windows back into view.","img":"https://macmenubar.com/wp-content/uploads/2026/05/ChocolateBar.webp","u":"https://chocolatebar.app/"},{"t":"RetroMac","d":"RetroMac turns your Mac into a glowing slice of digital nostalgia, complete with CRT shimmer, VHS fuzz and classic desktop themes from the Mac OS 9 and Windows XP era.","img":"https://macmenubar.com/wp-content/uploads/2026/05/retromac.webp","u":"https://myretromac.app/"},{"t":"SmartClose","d":"SmartClose makes macOS behave a little more like Windows by quitting apps when their last window closes.","img":"https://macmenubar.com/wp-content/uploads/2026/05/smartclose.webp","u":"https://github.com/mahirozdin/SmartClose"},{"t":"Tug","d":"Tug makes setting a timer feel surprisingly natural. Pull down from the menu bar, release when the duration feels right, and your timer starts instantly.","img":"https://macmenubar.com/wp-content/uploads/2026/05/tug.webp","u":"https://apps.apple.com/us/app/tug-menu-bar-timer/id6768515427"},{"t":"LingoBar","d":"LingoBar turns your menu bar into a language tutor, surfacing bite-sized vocabulary throughout the day with audio pronunciation, flexible learning modes, and zero streak anxiety.","img":"https://macmenubar.com/wp-content/uploads/2026/05/lingobar.webp","u":"https://lingobar.net"},{"t":"WhatCable","d":"WhatCable reveals what your USB-C cables are actually doing, translating hidden power, speed, and e-marker data into plain language so you can quickly understand charging limits, data rates, and connected devices without guesswork or digging through system details.","img":"https://macmenubar.com/wp-content/uploads/2026/05/whatcable.webp","u":"https://www.whatcable.uk/"},{"t":"Raybeam","d":"Raybeam lets you share a draggable, resizable portion of your screen in video calls, making it easy to present only what matters without exposing your entire desktop to colleagues and accidental chaos.","img":"https://macmenubar.com/wp-content/uploads/2026/05/raybeam.webp","u":"https://raybeam.live/"},{"t":"RainbowApple","d":"RainbowApple brings the classic six-colour Apple logo back to macOS with a transparent overlay that blends seamlessly into the menu bar, staying perfectly aligned across Spaces.","img":"https://macmenubar.com/wp-content/uploads/2026/05/rainbowapple.webp","u":"https://jorviksoftware.cc/utilities/rainbowapple"},{"t":"Shiori","d":"Shiori turns bookmark management into something frictionless, letting you save and launch URLs in seconds with keyboard shortcuts, cloud sync, browser-profile routing and grouped links for people whose tabs have quietly become a lifestyle problem.","img":"https://macmenubar.com/wp-content/uploads/2026/05/shiori.webp","u":"https://shioriapp.io"},{"t":"ScreenAlert","d":"ScreenAlert keeps an eye on any part of your screen and alerts you the moment something changes, whether it’s a stock price, build status, or live score.","img":"https://macmenubar.com/wp-content/uploads/2026/05/screenalert.webp","u":"https://apps.apple.com/us/app/screenalert/id6761373715"},{"t":"Better Resource Monitor","d":"Better Resource Monitor keeps an eye on your Mac’s CPU, memory, GPU, and network activity with minimal system impact, offering a clean, privacy-friendly approach that stays fully sandboxed and never asks for elevated permissions.","img":"https://macmenubar.com/wp-content/uploads/2026/05/resource_monitor.webp","u":"https://better-resource-monitor.alexpedersen.dev/"},{"t":"AirSpace","d":"AirSpace turns macOS Spaces into something that finally feels organized instead of vaguely abandoned by Apple in 2013. Rename desktops, assign colors, jump between them instantly, and keep multi-monitor chaos surprisingly manageable.","img":"https://macmenubar.com/wp-content/uploads/2026/05/airspace.webp","u":"https://hazels.garden/airspace"},{"t":"Kompakt","d":"Kompakt optimizes images and videos on macOS Drag a file and a drop zone appears then it compresses shows space saved and supports lossless or smaller outputs with copy-or-replace options.","img":"https://macmenubar.com/wp-content/uploads/2026/05/kompakt.webp","u":"https://kompaktapp.com/"},{"t":"Skopia","d":"This menu bar app helps reduce screen fatigue with gentle blink reminders that quietly blend into your workflow. It offers a thoughtful way to protect your eyes during long hours of reading, coding, or focused screen work.","img":"https://macmenubar.com/wp-content/uploads/2026/05/skopia.webp","u":"https://getskopia.com/"},{"t":"Izzo","d":"YZZO keeps your clipboard history clean, fast, and entirely private by storing everything locally on your Mac, while staying simple to use.","img":"https://macmenubar.com/wp-content/uploads/2026/05/yzzo.webp","u":"https://yzzo.app"},{"t":"Port Monitor","d":"Port Monitor keeps an eye on the chaos modern development tools create, showing active ports in real time and letting you kill stray processes instantly, all through a lightweight native macOS interface.","img":"https://macmenubar.com/wp-content/uploads/2026/05/port-monitor.webp","u":"https://www.port-monitor.app/"},{"t":"Doorry","d":"Doorry keeps an eye on every open port on your Mac and lets you shut down rogue processes with a single click. Built for developers tired of terminal rituals, it stays lightweight, private, and straightforward.","img":"https://macmenubar.com/wp-content/uploads/2026/05/doorry.webp","u":"https://www.altumdream.com/doorry/"},{"t":"Kofe Flow","d":"Kofe Flow is a lightweight Pomodoro timer with a clean macOS feel, gentle focus reminders, and an always-visible countdown that helps you stay productive without turning concentration into a full-time administrative career.","img":"https://macmenubar.com/wp-content/uploads/2026/05/kofe-flow-scaled.webp","u":"https://apps.apple.com/us/app/kofe-flow-pomodoro-timer/id6762003285"},{"t":"Popy","d":"Popy keeps track of your last 25 copied snippets. It stays out of sight, survives restarts, and keeps everything securely encrypted in your macOS Keychain.","img":"https://macmenubar.com/wp-content/uploads/2026/05/popy.webp","u":"https://github.com/anuragxxd/popy"},{"t":"ShotX","d":"ShotX is a lightweight screen capture tool for macOS inspired by CleanShot X. It offers screenshots, screen recording, annotations, GIF export, and capture history in a fast, privacy-friendly experience that runs entirely offline.","img":"https://macmenubar.com/wp-content/uploads/2026/05/shotx.webp","u":"https://github.com/aimen08/shotx"},{"t":"PoRaBar","d":"PoRaBar brings internet radio and podcasts neatly into your daily Mac routine, with live station info, smart podcast features, and a surprisingly polished listening experience.","img":"https://macmenubar.com/wp-content/uploads/2026/05/porabar.webp","u":"https://porabar.com/"},{"t":"ChessUnlock","d":"ChessUnlock slips a quick chess puzzle into your unlock routine, turning idle moments into consistent practice, with just enough friction to build a habit without getting in the way of actually using your Mac.","img":"https://macmenubar.com/wp-content/uploads/2026/05/chessunlock.webp","u":"https://chessunlock.app/"},{"t":"NotificationNanny","d":"NotificationNanny lets you place macOS notification banners anywhere on your displays, with drag-and-drop positioning, precise sliders, test alerts, and per-screen preferences so every screen behaves exactly the way you want.","img":"https://macmenubar.com/wp-content/uploads/2026/05/notificationnanny.webp","u":"https://github.com/chessper53/NotificationNanny"},{"t":"Linker","d":"Linker quietly connects files, folders, emails and websites through bidirectional links, making scattered information feel oddly coherent. Fast keyboard shortcuts, plain JSON storage and a clean, unobtrusive design keep everything within easy reach.","img":"https://macmenubar.com/wp-content/uploads/2026/05/linker.webp","u":"https://linker.appmac.fr/"},{"t":"MacRest","d":"This menu bar app gives you proper control over when your Mac sleeps by catching apps that quietly keep it awake in the background.","img":"https://macmenubar.com/wp-content/uploads/2026/05/macrest.webp","u":"https://macrest.appverge.net/"},{"t":"TaskMenu","d":"TaskMenu keeps Google Tasks within reach through a clean SwiftUI interface that feels genuinely native to macOS. It opens instantly as a compact popover, making everyday task management surprisingly painless.","img":"https://macmenubar.com/wp-content/uploads/2026/05/taskmenu.webp","u":"https://github.com/crazytan/TaskMenu"},{"t":"Three Month Calendar (3MC)","d":"3MC offers a smoother way to browse your calendar by presenting weeks as one continuous flow instead of isolated months. Fast, clean, and thoughtfully minimal, it stays synced with your existing calendar setup without trying to replace it.","img":"https://macmenubar.com/wp-content/uploads/2026/05/3MC.webp","u":"https://3mc.app/"},{"t":"Mini Break","d":"Mini Break turns waiting time into something slightly less soul-draining by hiding a polished Breakout-style arcade above your desktop.","img":"https://macmenubar.com/wp-content/uploads/2026/05/mini-break-scaled.webp","u":"https://apps.apple.com/us/app/mini-break-menu-bar-game/id6761735763"},{"t":"ClickFit","d":"ClickFit makes window management on macOS feel surprisingly fluid, letting you move, snap, tile, and organize windows with gestures, hotkeys, and custom layouts.","img":"https://macmenubar.com/wp-content/uploads/2026/05/ClickFit.webp","u":"https://clickfitapp.com/"},{"t":"TabShame","d":"This menu bar app quietly monitors your browser tabs across Safari, Chrome, and Edge, then playfully nudges you with escalating reminders and sounds when things get a little excessive.","img":"https://macmenubar.com/wp-content/uploads/2026/05/tabshame.webp","u":"https://www.tabshame.com"},{"t":"DateDrop","d":"DateDrop makes it easy to insert perfectly formatted dates, times, and time ranges anywhere you type. With quick hotkeys, timezone support, and flexible formatting options, scheduling stops feeling like administrative punishment.","img":"https://macmenubar.com/wp-content/uploads/2026/05/datedrop.webp","u":"https://bendansby.com/apps/datedrop.html"},{"t":"Converty","d":"Converty keeps currency conversions fast and pleasant. Pin favorite currencies, calculate taxes or discounts, and convert copied amounts instantly without breaking your workflow.","img":"https://macmenubar.com/wp-content/uploads/2026/05/converty-2-scaled.webp","u":"https://choterifa.site/converty"},{"t":"BigMac","d":"This menu bar app pulls clipboard history, screenshots, window snapping, app switching, and display control into one tidy place, with customizable hotkeys and polite conflict detection.","img":"https://macmenubar.com/wp-content/uploads/2026/04/bicmac_2.webp","u":"https://github.com/supaicy/homebrew-bicmac-tap"},{"t":"SitTall","d":"SitTall turns motion-sensing headphones into a quiet posture coach that detects forward head drift and gentle slouching in real time, nudges you back upright, and tracks daily habits locally with simple calibration and no extra hardware.","img":"https://macmenubar.com/wp-content/uploads/2026/04/sittall.webp","u":"https://apps.apple.com/us/app/sittall-fix-your-posture/id6761648859"},{"t":"DisplayAlign","d":"DisplayAlign brings some much-needed sanity to multi-monitor setups on macOS, letting you position displays with pixel-level precision, save custom layouts for different workspaces, and automatically restore everything the moment your screens reconnect.","img":"https://macmenubar.com/wp-content/uploads/2026/05/displayalign.webp","u":"https://github.com/sassman/display-align"},{"t":"TypeShift","d":"TypeShift takes a clean, no-nonsense approach to text expansion, turning short abbreviations into emails, signatures, or dynamic snippets with macros, while staying fast, private, and seamlessly synced across your Macs.","img":"https://macmenubar.com/wp-content/uploads/2026/04/typeshift.webp","u":"https://typeshift.monogramcreative.co/"},{"t":"Sonant","d":"Sonant keeps your music close without turning your screen into a control panel. With elegant glass-style controls, live visualizers, and seamless Spotify or Apple Music integration, it makes playback feel strangely calm and effortless on macOS.","img":"https://macmenubar.com/wp-content/uploads/2026/05/sonant.webp","u":"https://sonant.tbtech.app/"},{"t":"Tsundoku","d":"Tsundoku lets you save bookmarks to your self-hosted bookmarking service with a global hotkey, supporting Safari, Chrome, Edge, Arc and Brave, with tag autocomplete, duplicate detection, and multiple services.","img":"https://macmenubar.com/wp-content/uploads/2026/05/tsundoku.webp","u":"https://www.gingerbeardman.com/apps/tsundoku/"},{"t":"FilePop","d":"FilePop keeps file browsing close at hand with a fast, native interface that slides into your workflow effortlessly. Drag, preview, and organize files in seconds, without digging through Finder.","img":"https://macmenubar.com/wp-content/uploads/2026/05/filepop.webp","u":"https://bendansby.com/apps/filepop.html"},{"t":"Seeports","d":"Seeports scans your Mac for active TCP ports, grouping them by services like Docker, Kubernetes, and local dev servers, offering real-time visibility, quick actions, and clean developer-focused control, smooth experience.","img":"https://macmenubar.com/wp-content/uploads/2026/05/seeports.webp","u":"https://www.gingerbeardman.com/apps/seeports/"},{"t":"Octopping","d":"Octoping surfaces your GitHub notifications, neatly grouped by repository and marked with familiar color-coded icons. It lets you browse, mark as read, and jump straight to GitHub, with a refresh rhythm you can tune to your workflow.","img":"https://macmenubar.com/wp-content/uploads/2026/05/octoping.webp","u":"https://www.gingerbeardman.com/apps/octoping/"},{"t":"Localmost","d":"Run local HTTP servers on macOS by dragging any folder to instantly serve files with automatic port assignment, multiple server management, logs, and simple state restoration on launch, directory listings.","img":"https://macmenubar.com/wp-content/uploads/2026/05/localmost.webp","u":"https://www.gingerbeardman.com/apps/localmost/"},{"t":"Codeburn","d":"This menu bar app monitors your AI coding activity, offering real-time insights into costs and usage patterns. Gain instant visibility into trends and optimization hints to streamline your workflow across all providers.","img":"https://macmenubar.com/wp-content/uploads/2026/04/codeburn.webp","u":"https://github.com/getagentseal/codeburn"},{"t":"Pegboard","d":"Pegboard keeps small tasks within reach while you stay focused in full-screen mode. Instead of juggling windows to check a calendar, start a timer, or grab a snippet, everything appears instantly in a clean overlay. Humanity spent decades inventing computers just to spend half the day minimizing things.","img":"https://macmenubar.com/wp-content/uploads/2026/05/pegboard-scaled.webp","u":"https://monotools.app/pegboard/"},{"t":"Last Dance","d":"Last Dance fixes a persistent macOS issue where SMB file sharing stops responding after restart. It quietly disables sharing during shutdown and restores it on login, keeping everything reliably accessible.","img":"https://macmenubar.com/wp-content/uploads/2026/05/lastdance.webp","u":"https://www.gingerbeardman.com/apps/last-dance/"},{"t":"Driveaway","d":"Driveaway cleans external drives before ejecting, removing macOS metadata like DS_Store and Spotlight files. It detects volumes in real time, supports one-click eject, and keeps storage tidy across platforms.","img":"https://macmenubar.com/wp-content/uploads/2026/05/driveaway.webp","u":"https://www.gingerbeardman.com/apps/driveaway/"},{"t":"Battery Beggar","d":"Battery Beggar turns your MacBook’s battery into a running commentator with opinions, anxiety, and occasional philosophical restraint. It tracks charge levels, reacts to your questionable charging habits, and somehow makes low battery warnings feel oddly entertaining.","img":"https://macmenubar.com/wp-content/uploads/2026/05/batterybeggar.webp","u":"https://apps.apple.com/us/app/battery-beggar/id6762064738"},{"t":"Ditto","d":"Ditto sits quietly in your menu bar and translates text when you copy something twice, using Apple Translate or DeepL for 35+ languages, with live typing, auto-detection, and a floating window.","img":"https://macmenubar.com/wp-content/uploads/2026/05/ditto.webp","u":"https://www.gingerbeardman.com/apps/ditto/"},{"t":"Barfly","d":"This menu bar app keeps an eye on your itch.io game analytics without demanding a spreadsheet addiction. Track views, downloads, purchases, and performance changes over time, with notifications and quick access to your games when the numbers finally move.","img":"https://macmenubar.com/wp-content/uploads/2026/05/barfly.webp","u":"https://www.gingerbeardman.com/apps/barfly/"},{"t":"Dropshit","d":"Dropshit is a menu bar app that lets you temporarily stash files, text, and images with a quick shake gesture, then drag them back into any app later. It mirrors the familiar Dropover workflow.","img":"https://macmenubar.com/wp-content/uploads/2026/05/dropshit.webp","u":"https://github.com/iamsumanp/Dropshit"},{"t":"EQer","d":"EQer brings system-wide audio tuning to your Mac’s menu bar with real-time equalization, hearing compensation based on your audiogram, and flexible per-app controls. It includes 22 presets, custom curve adjustments, and smart safeguards against distortion.","img":"https://macmenubar.com/wp-content/uploads/2026/05/EQer.webp","u":"https://www.gingerbeardman.com/apps/eqer/"},{"t":"SmartPause","d":"SmartPause helps Mac users build healthier work habits with intelligent break timing, guided recovery exercises, and subtle productivity tools that wait patiently until your meeting, screen share, or tiny corporate collapse is finally over.","img":"https://macmenubar.com/wp-content/uploads/2026/04/smartpause.webp","u":"https://smartpause.app"},{"t":"AudioCentral","d":"AudioCentral brings deep system-wide audio control to macOS with elegant per-app mixing, routing, equalization, and device management. Built for serious listeners and creators, it makes advanced sound tuning feel effortless.","img":"https://macmenubar.com/wp-content/uploads/2026/04/audiocentral.webp","u":"https://www.loudlab-app.com/audiocentral-app"},{"t":"Runtab","d":"Runtab keeps your credit card balance visible throughout the day, offering a lightweight way to stay financially aware without opening bloated dashboards.","img":"https://macmenubar.com/wp-content/uploads/2026/04/runtab.webp","u":"https://runtab.io/?ref=macmenubar"},{"t":"VaultBar","d":"VaultBar keeps file encryption simple and local, letting you secure or unlock files and folders directly from Finder or drag and drop, with Touch ID support and strong AES-256 protection, without relying on the cloud.","img":"https://macmenubar.com/wp-content/uploads/2026/04/vaultbar.webp","u":"https://benwie.ch/vault"},{"t":"Just10","d":"Keeps your focus brutally simple by showing your top todo inline, while limiting active tasks to ten. Reordering is effortless, editing is instant, and anything beyond that level of ambition is politely refused.","img":"https://macmenubar.com/wp-content/uploads/2026/04/just10.webp","u":"https://github.com/zunguyen/Just10"},{"t":"What Did I Miss","d":"This menu bar app gathers what you missed, summarizes it on-device, and calmly reads it back in a short, surprisingly useful recap.","img":"https://macmenubar.com/wp-content/uploads/2026/04/what-sis-i-miss.webp","u":"https://amirhayek.dev/WhatDidIMiss/"},{"t":"WhyFi","d":"This menu bar app monitors your Wi-Fi in real time, revealing signal strength, latency, and hidden bottlenecks. It pinpoints whether issues stem from your network, router, or ISP, then suggests clear, practical fixes.","img":"https://macmenubar.com/wp-content/uploads/2026/04/whyfi.webp","u":"https://whyfi.network/"},{"t":"Mac Input Stats","d":"Mac Input Stats offers a quiet, surprisingly revealing look at how you use your Mac, tracking typing, clicks, scrolling, and even voice input, with clear trends and everything stored locally for peace of mind.","img":"https://macmenubar.com/wp-content/uploads/2026/04/mac-input-stats.webp","u":"https://github.com/SuveenE/mac-input-stats"},{"t":"Glow","d":"Glow reimagines menu bar management with a distinctly native feel, blending fluid animations, adaptive visuals, and thoughtful customization into an experience that feels less like a tool and more like macOS itself, just slightly better behaved.","img":"https://macmenubar.com/wp-content/uploads/2026/04/glow.webp","u":"https://macglow.app/"},{"t":"PongBar","d":"Still guessing why your internet feels so slow? PongBar quietly watches every hop in the background and surfaces real-time latency, packet loss, VPN performance, and outages at a glance.","img":"https://macmenubar.com/wp-content/uploads/2026/04/pongbar.webp","u":"https://github.com/PrometheusSourse/PongBar"},{"t":"TraceBar","d":"TraceBar keeps a continuous eye on your network by running traceroutes in the background, revealing latency and packet loss across each hop, so you can instantly spot where connections start to fall apart.","img":"https://macmenubar.com/wp-content/uploads/2026/04/tracebar.webp","u":"https://tracebar.app/"},{"t":"UTMBeGone","d":"UTMBeGone quietly cleans tracking parameters from links you copy, helping protect privacy for you and your friends. Customize which tags to strip, and share cleaner URLs without the extra tracking baggage.","img":"https://macmenubar.com/wp-content/uploads/2026/04/utmbegone.webp","u":"https://apps.apple.com/us/app/utmbegone/id1530867730"},{"t":"Ethernet Menu Monitor","d":"Ethernet Monitor puts your wired connection back where it belongs, offering real-time speeds, essential network details, and a clean native feel, with optional pro tools for deeper insight without compromising privacy.","img":"https://macmenubar.com/wp-content/uploads/2026/04/ethernet-menu-monitor.webp","u":"https://apps.apple.com/us/app/ethernet-menu-monitor/id6760477075"},{"t":"App Update Monitor","d":"App Update Monitor scans your apps in seconds, detects new versions from trusted sources, and keeps everything current without interrupting whatever you were pretending to focus on.","img":"https://macmenubar.com/wp-content/uploads/2026/04/App-Update-Monitor.webp","u":"https://apps.apple.com/es/app/app-update-monitor/id6759650610"},{"t":"Kedip","d":"Kedip gently nudges you to follow the 20-20-20 rule. It’s fast, private, distraction-free, and keeps breaks simple so you actually take them.","img":"https://macmenubar.com/wp-content/uploads/2026/04/kedip.webp","u":"https://github.com/dendianugerah/kedip"},{"t":"OptionV","d":"OptionV turns your clipboard into a searchable archive, indexing everything you copy and surfacing it instantly with a simple shortcut. No accounts, no tracking, just a faster, cleaner way to reuse what you’ve already typed.","img":"https://macmenubar.com/wp-content/uploads/2026/04/OptionV.webp","u":"https://www.optionv.app/"},{"t":"Git Glance","d":"Git Glance keeps track of your open GitHub pull requests or GitLab merge requests, while gently reminding you of anything waiting for your review, so nothing slips through unnoticed.","img":"https://macmenubar.com/wp-content/uploads/2026/04/git-glance.webp","u":"https://apps.apple.com/app/git-glance/id6760653851"},{"t":"Juicy","d":"Juicy replaces macOS’s blunt battery warnings with elegant, customizable alerts while tracking health, temperature, and lifecycle events, keeping every connected device in view and your Mac quietly alive when it matters most.","img":"https://macmenubar.com/wp-content/uploads/2026/04/getjuicy.webp","u":"https://getjuicy.app"},{"t":"Hivey","d":"Hivey gathers everyday Mac utilities into one tidy, expandable interface, from clipboard history and notes to storage, downloads, and battery insights, keeping everything close at hand without ever getting in your way.","img":"https://macmenubar.com/wp-content/uploads/2026/04/hivey.webp","u":"https://apps.apple.com/us/app/hivey/id6761101004"},{"t":"QUICOPY","d":"This menu bar app lets you trigger text snippets with global shortcuts, works instantly across apps, syncs via iCloud, and keeps everything local with a clean, unobtrusive presence.","img":"https://macmenubar.com/wp-content/uploads/2026/04/quicopy.webp","u":"https://www.quicopy.com/"},{"t":"Spent","d":"This menu bar app turns your screen time into a live dollar balance, quietly charging distractions while rewarding focus so you can watch your day drift red or claw it back to green.","img":"https://macmenubar.com/wp-content/uploads/2026/04/spent.webp","u":"https://spent.techfixpro.net/"},{"t":"PanicLock","d":"Some people trust biometric authentication right up to the exact moment they don’t. PanicLock keeps Touch ID for daily ease, but lets you instantly disable it and lock your Mac with a shortcut, forcing password-only access without interrupting your session.","img":"https://macmenubar.com/wp-content/uploads/2026/04/paniclock.webp","u":"https://paniclock.github.io/"},{"t":"ScoreBar","d":"ScoreBar delivers real-time IPL and EPL scores in a clean, native macOS experience, letting you follow matches at a glance without tabs, ads, or distractions, quietly fitting into your daily workflow.","img":"https://macmenubar.com/wp-content/uploads/2026/04/scorebar.webp","u":"https://scorebar.app/"},{"t":"CC Usage Bar","d":"CC Usage Bar offers a minimal, reliable way to view Claude Code usage at a glance, reading directly from the source for accurate results, with no setup or network calls.","img":"https://macmenubar.com/wp-content/uploads/2026/04/cc-usage-bar.webp","u":"https://github.com/lionhylra/cc-usage-bar"},{"t":"Whiplash","d":"Whiplash helps developers stay on top of Claude Code, Gemini CLI, and Codex sessions in one place, tracking what’s running, idle, or finished, with task awareness and a lightweight experience.","img":"https://macmenubar.com/wp-content/uploads/2026/04/whiplash.png","u":"https://arv.in/whiplash/"},{"t":"DMTools","d":"Transform your clipboard into a workspace for encoding, formatting, hashing, and AI queries. With access to JSON tools, UUID generation, and extensibility via plugins, it keeps tasks flowing smoothly.","img":"https://macmenubar.com/wp-content/uploads/2026/04/dmtools.webp","u":"https://github.com/dmasior/dmtool"},{"t":"Claude Account Switcher","d":"Switch between multiple Claude Code accounts instantly, without the usual logout ritual or browser detours. See live usage and rate limits, keep your credentials secure, and stay in flow when switching between work and personal setups.","img":"https://macmenubar.com/wp-content/uploads/2026/04/claude-account-switcher.webp","u":"https://github.com/Symbioose/claude-account-switcher"},{"t":"OSX Stats Nano","d":"OSX Stats Nano keeps an eye on your Mac with live CPU, memory, GPU, and network stats, offering clear visuals and detailed breakdowns in a remarkably small, efficient footprint.","img":"https://macmenubar.com/wp-content/uploads/2026/04/OSX_stats-nano.webp","u":"https://github.com/hefeicoder/osx_stats_nano"},{"t":"Keyboard Cleaner","d":"Keyboard Cleaner locks your keys with a single click so you can clean safely, then unlocks just as easily, a minimal, single-purpose tool that stays entirely on your Mac.","img":"https://macmenubar.com/wp-content/uploads/2026/04/keyboard-cleaner.webp","u":"https://www.vyasforge.com/"},{"t":"WiFi & IP Info","d":"This menu bar app puts essential network details at your fingertips, offering quick insights, real-time latency tracking, and privacy-friendly diagnostics without unnecessary complexity.","img":"https://macmenubar.com/wp-content/uploads/2026/04/wifi-ip-info.webp","u":"https://apps.apple.com/app/id6761272578"},{"t":"Ghostmoon","d":"Every feature you keep digging for in macOS is suddenly within reach, from hidden system controls to quick fixes and diagnostics, all wrapped in a lightweight tool that stays fast, quiet, and surprisingly complete.","img":"https://macmenubar.com/wp-content/uploads/2026/04/ghostmoon.webp","u":"https://www.mgrunwald.com/ghostmoon/"},{"t":"IdleMac","d":"IdleMac keeps an eye on your absence, nudging you back with playful, slightly judgmental sounds when you’ve been away too long. Simple timers, minimal impact, and just enough guilt to stay focused.","img":"https://macmenubar.com/wp-content/uploads/2026/04/idlemac.webp","u":"https://www.idlemac.com/"},{"t":"Drift","d":"Drift is a lightweight, native macOS sound mixer that blends up to four ambient tracks with spatial audio and head tracking, all offline, delivering focused calm without subscriptions, bloat, or unnecessary distractions.","img":"https://macmenubar.com/wp-content/uploads/2026/04/drift.webp","u":"https://driftsound.app/"},{"t":"Buffer","d":"Buffer sits somewhere between Maccy and Raycast, offering a lightweight clipboard history with a cleaner workflow. It adds on-device OCR, image support, and fast search, all while staying fully local, private, and open source.","img":"https://macmenubar.com/wp-content/uploads/2026/04/buffer.webp","u":"https://samirpatil2000.github.io/products/buffer/"},{"t":"HushScribe","d":"This menu bar app records and transcribes meetings entirely on your Mac, keeping everything local. It offers fast multilingual transcription, on-device summaries, and clean Markdown output without accounts, cloud services, or intrusive tracking.","img":"https://macmenubar.com/wp-content/uploads/2026/04/hushscribe.webp","u":"https://drcursor.github.io/HushScribe/"},{"t":"Meltdown","d":"Meltdown quietly tracks how you type and how hard you hit the keys, picking up rising frustration before it spills over, then signals it with subtle visual cues that are hard to ignore.","img":"https://macmenubar.com/wp-content/uploads/2026/03/meltdown.webp","u":"https://shipyard.today/meltdown/"},{"t":"Command Reopen","d":"Cmd+Tab (skipping minimized or closed apps) is a small frustration you’ve probably learned to tolerate. Command Reopen quietly fixes that, restoring or reopening windows automatically, without permissions, extra UI, or changing the familiar switcher.","img":"https://macmenubar.com/wp-content/uploads/2026/03/command-reopen.webp","u":"https://commandreopen.com/"},{"t":"Monthbar","d":"MonthBar quietly tracks your month as a clean pie chart or percentage, updating in real time and switching between elapsed and remaining time, all without fuss, noise, or unnecessary features.","img":"https://macmenubar.com/wp-content/uploads/2026/03/monthbar.webp","u":"https://apps.apple.com/us/app/monthbar-month-progress/id6759099775"},{"t":"Glanceway","d":"Glanceway brings everything you follow into one quiet, unified view, from Hacker News and GitHub to RSS, stocks, and crypto, with AI-powered sources and summaries that keep you informed without the usual noise.","img":"https://macmenubar.com/wp-content/uploads/2026/03/glanceway.webp","u":"https://glanceway.app"},{"t":"Gearbox","d":"Gearbox keeps your automations close and under control, combining a clean macOS interface with flexible scheduling, live log streaming, and Python-powered tasks, all running locally with a strong focus on transparency and privacy.","img":"https://macmenubar.com/wp-content/uploads/2026/03/gearbox.webp","u":"https://github.com/hgayan7/gearbox"},{"t":"Silkwave Voice","d":"Silkwave Voice records microphone and system audio simultaneously, transcribing everything in real time using Apple’s on-device models. No internet required, no API costs, no subscriptions. Summaries via Apple Intelligence. Completely private.","img":"https://macmenubar.com/wp-content/uploads/2026/04/Silkwave_Voice.webp","u":"https://www.silkwave.ai"},{"t":"MojiBar","d":"MojiBar lets you swap icons for emojis that match your mood, the weather, or whatever phase you’re in today, with playful automation and zero clutter.","img":"https://macmenubar.com/wp-content/uploads/2019/12/mojibar-1-scaled.webp","u":"https://mojibarapp.com/"},{"t":"TodoNxt","d":"TodoNxt keeps task management disarmingly simple, organizing your day into Now, Nxt, and Ltr. It’s fast, private, and quietly efficient, offering just enough structure to keep chaos at bay without getting in your way.","img":"https://macmenubar.com/wp-content/uploads/2026/04/todonxt-2.webp","u":"https://todonxt.com/"},{"t":"Quitte","d":"Quitty keeps your Mac under control with real-time memory insights and instant app management, letting you spot resource hogs, protect essentials, and quickly quit or force-close processes through a clean, native interface.","img":"https://macmenubar.com/wp-content/uploads/2026/03/quitty.webp","u":"https://quitty.iad1tya.cyou/"},{"t":"Macshot","d":"Macshot keeps screenshots fast and frictionless, combining capture, annotation, auto-redaction, scrolling shots, OCR, and quick sharing in one smooth, lightweight native experience without subscriptions or bloated overhead.","img":"https://macmenubar.com/wp-content/uploads/2026/03/macshot.webp","u":"https://github.com/sw33tLie/macshot"},{"t":"SlowQuit","d":"SlowQuit helps you avoid accidental quits by adding a short, customizable delay to Cmd-Q, complete with a subtle progress indicator, app-specific rules, and a lightweight, fully local experience that stays out of your way.","img":"https://macmenubar.com/wp-content/uploads/2026/03/slowquit.webp","u":"https://github.com/dudukee/SlowQuit"},{"t":"Numsy","d":"Numsy keeps everyday calculations within effortless reach, offering a clean, responsive interface with history, subtle sound feedback, and customizable visuals, so quick math feels less like a task and more like a quiet reflex.","img":"https://macmenubar.com/wp-content/uploads/2026/04/numsy.webp","u":"https://choterifa.site/"},{"t":"Mux","d":"Mux keeps your Mac on the right network without fuss, automatically prioritizing Ethernet over Wi-Fi and switching back when needed, while quietly tracking changes and giving you clear control over every connection.","img":"https://macmenubar.com/wp-content/uploads/2026/03/mux.webp","u":"https://parcse.com/mux"},{"t":"Mini Pong","d":"Some people meditate while code compiles. Others play a quick round of Pong. Mini Pong turns idle moments into small, satisfying breaks, always within reach, quietly waiting for your next distraction.","img":"https://macmenubar.com/wp-content/uploads/2026/04/MiniPong.webp","u":"https://apps.apple.com/us/app/mini-pong-menu-bar-game/id6761107832"},{"t":"ActiveStat","d":"ActiveStat keeps a calm eye on your Mac’s performance, showing real-time CPU load, memory pressure, disk activity, and energy impact in a clean interface that surfaces useful insights without getting in your way.","img":"https://macmenubar.com/wp-content/uploads/2026/03/active_stat-scaled.webp","u":"https://lucidbit.app/ActiveStat/activestat.html"},{"t":"Claude Usage Monitor","d":"This menu bar app tracks your Claude.ai usage with a clean, color-coded icon, live counters, and smart alerts. It estimates remaining time, shows session and weekly limits, and keeps everything updated automatically.","img":"https://macmenubar.com/wp-content/uploads/2026/04/claude-usage-monitor.webp","u":"https://github.com/theDanButuc/Claude-Usage-Monitor"},{"t":"Bartrack","d":"Need to track time on a single task? Bartrack keeps it simple by letting you start and monitor your time instantly, helping you stay focused and quietly aware of how your work unfolds.","img":"https://macmenubar.com/wp-content/uploads/2026/03/bartrack.webp","u":"https://apps.apple.com/gb/app/bartrack/id6760319282"},{"t":"Gist","d":"Gist lives one shortcut away, letting you select anything on your screen and turn it into clear, useful action. No prompts, no tab-hopping, just fast, intelligent results that keep you moving.","img":"https://macmenubar.com/wp-content/uploads/2026/03/gist.webp","u":"https://paretosecurity.com"},{"t":"Papelzinho","d":"Papelzinho treats text like scrap paper, letting you open as many lightweight windows as you need, jot things down, and close them without friction while everything remains quietly recoverable in a simple wastebasket.","img":"https://macmenubar.com/wp-content/uploads/2026/03/papelzinho.webp","u":"https://apps.apple.com/us/app/papelzinho/id6754223651"},{"t":"glyph","d":"This menu bar app helps your words look less like everyone else’s, offering stylish text, symbols, and kaomoji you can drop anywhere, with quick access, smooth flow, and even live typing for effortless expression.","img":"https://macmenubar.com/wp-content/uploads/2026/03/glyph.webp","u":"https://glyphapp.net/"},{"t":"Ephemeral","d":"Ephemeral keeps temporary files from piling up by automatically sending them to Trash after a set time. Drop files in, forget about them, and your folders quietly stay tidy without constant manual cleanup.","img":"https://macmenubar.com/wp-content/uploads/2026/03/ephemeral.webp","u":"https://apps.apple.com/fr/app/ephemeral-utility/id6759861130"},{"t":"Glasscribe","d":"Glasscribe delivers fast, on-device speech-to-text with a floating overlay that works across apps. It transcribes system audio or mic input in real time, adds live translation, and keeps everything private and offline.","img":"https://macmenubar.com/wp-content/uploads/2026/03/glasscribe.webp","u":"https://glasscribe.toolab.dev/"},{"t":"Middle","d":"Middle brings long-missing middle-click support to macOS, letting you open links in new tabs and trigger actions with intuitive trackpad or Magic Mouse gestures, all in a simple, lightweight tool.","img":"https://macmenubar.com/wp-content/uploads/2026/03/middle.webp","u":"https://middleclick.app/"},{"t":"SnapState","d":"SnapState lets you save and instantly restore your macOS setup, from window positions to browser tabs, so switching contexts feels less like chaos and more like control.","img":"https://macmenubar.com/wp-content/uploads/2026/03/snapstate.webp","u":"https://getsnapstate.com/"},{"t":"OwlFocus","d":"OwlFocus sharpens your attention by subtly blurring inactive windows, keeping your workspace clean and calm. It runs fast, respects your privacy, and integrates smoothly with OpenClaw for effortless automation.","img":"https://macmenubar.com/wp-content/uploads/2026/03/owlfocus-scaled.webp","u":"https://www.capyapp.dev/owlfocus"},{"t":"Online Indicator","d":"Online Indicator replaces the easy-to-ignore Wi-Fi icon with a clear status signal, showing whether you’re connected, blocked, or offline. Customize symbols, colors, and labels while automatic pings quietly monitor your connection in the background.","img":"https://macmenubar.com/wp-content/uploads/2026/03/online-indicator.webp","u":"https://github.com/bornexplorer/OnlineIndicator"},{"t":"Pitwall","d":"Pitwall keeps Formula 1 within easy reach, showing live positions, lap times, and championship standings at a glance. A clean, native macOS experience that lets fans follow every session without cluttering their workspace.","img":"https://macmenubar.com/wp-content/uploads/2026/03/pitwall.webp","u":"https://apps.apple.com/app/pitwall-live-stats/id6758950790"},{"t":"Tidyshot","d":"Tidyshot organizes your growing pile of screenshots by detecting their source app, reading text with on-device OCR, and renaming files into something human. Searchable, neatly sorted, and ready when you need it.","img":"https://macmenubar.com/wp-content/uploads/2026/03/tidyshot.webp","u":"https://apps.apple.com/us/app/tidyshot-screenshot-organizer/id6758950886"},{"t":"Crank","d":"Automate everyday Mac tasks with simple “when this happens, do that” rules. Crank listens for system events like Wi-Fi changes or app launches and quietly runs actions, from scripts to notifications, exactly when you need them.","img":"https://macmenubar.com/wp-content/uploads/2026/03/crank.webp","u":"https://lowtechguys.com/crank"},{"t":"Focusmo","d":"Focusmo helps you stay on track by asking simple check-ins throughout the day, keeping your current task visible, and automatically logging your activity so you finally see where your time actually went.","img":"https://macmenubar.com/wp-content/uploads/2026/03/focusmo.webp","u":"https://focusmo.app/"},{"t":"Muffle","d":"Muffle gently fades everything except your active window, helping you focus on what actually matters. A quick cursor shake toggles the effect, while adjustable blur and dim settings keep distractions quietly in the background.","img":"https://macmenubar.com/wp-content/uploads/2026/03/muffle.webp","u":"https://www.getmuffle.com/"},{"t":"Quit All Apps","d":"Closes every open app on your Mac with a single click or shortcut, giving you an instant clean slate. Choose which apps to exclude, quit selected ones in bulk, or simply hide everything.","img":"https://macmenubar.com/wp-content/uploads/2026/03/quit-all-apps.webp","u":"https://apps.apple.com/us/app/quit-all-apps/id6752781428"},{"t":"MountBatten","d":"MountBatten gives you tight control over which disks and DMG files can mount on your Mac, with flexible rules, real-time alerts, local event logging, and a privacy-first approach throughout.","img":"https://macmenubar.com/wp-content/uploads/2026/03/mountbatten.webp","u":"https://widgetworx.com/apps/mountbatten.html"},{"t":"WiFi Status","d":"WiFi Status keeps a close eye on your Wi-Fi connection with detailed stats like signal strength, noise, channels, and security, while live graphs reveal performance in real time and help you spot issues instantly.","img":"https://macmenubar.com/wp-content/uploads/2026/03/wifi-status.webp","u":"https://apps.apple.com/lt/app/wifi-status-analyzer-signal/id6444063787"},{"t":"ScreenFold","d":"ScreenFold turns a subtle screen tilt into instant privacy by dimming your display and muting audio, while offering smart tweaks like selective blur and adjustable sensitivity for a seamless, distraction-free experience.","img":"https://macmenubar.com/wp-content/uploads/2026/03/screenfold_1.webp","u":"https://screenfold.app"},{"t":"Mellem","d":"Tracks the rhythm of your workday and spots small openings between meetings, offering short guided or unguided meditations that help you reset, refocus, and return to your next call a little calmer.","img":"https://macmenubar.com/wp-content/uploads/2026/03/mellem.webp","u":"https://mellem.ai"},{"t":"Haptyk","d":"Haptyk turns your MacBook keyboard into a velocity-sensitive mechanical typing experience. Using the built-in accelerometer, it detects how hard you type and plays matching keyboard sounds that scale naturally with every keystroke.","img":"https://macmenubar.com/wp-content/uploads/2026/03/haptyk.webp","u":"https://www.haptyk.com/"},{"t":"Baritto","d":"Baritto brings essential metrics to your desktop in a clean, focused way, showing revenue, crypto rates, and deadlines at a glance, without clutter, heavy dashboards, or unnecessary distractions slowing you down.","img":"https://macmenubar.com/wp-content/uploads/2026/03/baritto_1.webp","u":"https://baritto.app"},{"t":"FlutterTime","d":"FlutterTime makes global scheduling feel effortless by turning time zones into a smooth, scrollable timeline, letting you compare cities in real time, spot ideal meeting moments, and stay aligned without mental math or clutter.","img":"https://macmenubar.com/wp-content/uploads/2026/03/fluttertime.webp","u":"https://fluttertime.com/"},{"t":"MRR Buddy","d":"MRR Buddy keeps your recurring revenue visible without the usual dashboard clutter, combining Stripe, Polar and Lemon Squeezy data while gently nudging you about every meaningful change.","img":"https://macmenubar.com/wp-content/uploads/2026/03/mrr_buddy.webp","u":"https://apps.apple.com/us/app/mrr-buddy/id6758872512"},{"t":"Topoff","d":"TopOff keeps your Homebrew setup quietly in shape, checking for outdated packages in the background and letting you update everything with a single click, so you can skip the terminal and stay effortlessly up to date.","img":"https://macmenubar.com/wp-content/uploads/2026/03/topoff.webp","u":"https://github.com/ihazgithub/TopOff"},{"t":"Cadran","d":"Cadran places beautifully designed clock faces directly on your wallpaper, sitting quietly behind your icons across every Space and display. Lightweight, customizable, and privacy-friendly, it keeps time visible without cluttering your desktop.","img":"https://macmenubar.com/wp-content/uploads/2026/03/cadran.webp","u":"https://cadranapp.com/en"},{"t":"Simplebanking","d":"Keep your bank balance always visible while connecting multiple accounts through secure, read-only Open Banking. Clean, fast, and privacy-focused, it helps you track spending, subscriptions, and financial health at a glance.","img":"https://macmenubar.com/wp-content/uploads/2026/03/simplebanking.webp","u":"https://www.simplebanking.de/"},{"t":"Steno","d":"Steno turns speech into text almost instantly with a simple hold-to-talk gesture, letting you write across any app at natural speed while smart rewriting, voice commands, and offline support quietly keep everything fast and effortless.","img":"https://macmenubar.com/wp-content/uploads/2026/03/steno.webp","u":"https://stenofast.com"},{"t":"Wave Link","d":"Wave Link brings studio-style audio control to everyday setups, letting you mix, route, and enhance multiple sound sources with ease. It works with almost any microphone and keeps streaming, recording, and calls sounding polished..","img":"https://macmenubar.com/wp-content/uploads/2026/03/elgato.webp","u":"https://www.elgato.com/ww/en/s/wave-link-app"},{"t":"Blink","d":"Blink is a small companion for developers that quietly watches your running dev servers and iOS simulators. It detects frameworks automatically, shows active ports and projects, and lets you open, stop, or manage them instantly.","img":"https://macmenubar.com/wp-content/uploads/2026/03/blink.webp","u":"https://github.com/megootronic/Blink"},{"t":"TuneBar Music Player","d":"Tunebar is a native macOS music player for people who still own their music. Point it to a folder and play instantly, with fast search, editable metadata, and a clean, distraction-free interface.","img":"https://macmenubar.com/wp-content/uploads/2026/03/tunebar-music-player.webp","u":"https://apps.apple.com/us/app/tunebar/id6759842578"},{"t":"Claudoscope","d":"Claudoscope gives developers a clear, real-time view of their Claude Code sessions, tracking usage, costs, and history while scanning for leaked credentials, all locally and privately with zero telemetry.","img":"https://macmenubar.com/wp-content/uploads/2026/03/claudoscope-1.webp","u":"https://claudoscope.com/"},{"t":"Warden","d":"Warden lets you lock your keyboard, mouse, and trackpad while keeping your screen fully visible. Ideal for long-running tasks like builds, renders, or AI sessions where progress matters, but accidental input doesn’t.","img":"https://macmenubar.com/wp-content/uploads/2026/03/warden.webp","u":"https://www.getwarden.org/"},{"t":"Clamper","d":"Clamper gives you precise control over the spacing and padding of your macOS menu bar icons, complete with real-time preview and subtle haptic feedback. A single click restores everything to default.","img":"https://macmenubar.com/wp-content/uploads/2026/03/clamper.webp","u":"https://github.com/validatedev/Clamper"},{"t":"Stasis","d":"Stasis replaces the standard battery indicator with something far more informative, offering real-time power metrics, adjustable charge limits, and direct control over charging behavior so you can extend your MacBook’s battery lifespan without relying on Apple’s mysterious optimization logic.","img":"https://macmenubar.com/wp-content/uploads/2026/02/stasis.webp","u":"https://github.com/srimanachanta/Stasis"},{"t":"JoyScreen","d":"JoyScreen sharpens your Mac experience with distraction-blurring focus, extra brightness for sunny cafés, a subtle screen glow for late-night calls, and a reliable keep-awake toggle. Lightweight, native, and thoughtfully built, it simply makes daily work feel smoother.","img":"https://macmenubar.com/wp-content/uploads/2026/02/joyscreen.webp","u":"https://joyscreen.app/"},{"t":"Slidr","d":"Slidr turns your trackpad into a subtle control surface, letting you adjust volume and brightness with simple edge gestures. It feels natural, stays out of the way, and adds just enough precision to everyday use.","img":"https://macmenubar.com/wp-content/uploads/2026/03/slidr.webp","u":"https://slidr.xyz/"},{"t":"Petal","d":"Petal is a dictation app that runs entirely on-device, supporting Qwen3 ASR and Voxtral alongside Whisper. With a simple push-to-talk workflow and optional Smart Mode that cleans up filler words into polished prose, it keeps everything local, transparent, and subscription-free.","img":"https://macmenubar.com/wp-content/uploads/2026/02/petal.webp","u":"https://github.com/Aayush9029/petal"},{"t":"GentleLimit","d":"GentleLimit helps you stay aware of your screen habits without blocking apps or disrupting your flow. Subtle signals, floating widgets, and calm visual cues keep usage visible so mindful breaks happen naturally.","img":"https://macmenubar.com/wp-content/uploads/2026/03/gentlle_limit.webp","u":"https://lucidbit.app/GentleLimit/gentlelimit.html"},{"t":"Adoro","d":"Adoro is a lightweight focus timer built for zero friction. Start a quick Pomodoro, tag sessions, and gain useful productivity insights without accounts or ads. It even syncs with AuraFi to automatically play and pause music as you work..","img":"https://macmenubar.com/wp-content/uploads/2026/02/adoro.webp","u":"https://ariv.one/tools/"},{"t":"Cue","d":"Cue keeps your day focused with a simple, distraction-free task list that lives one click away. Add tasks, set reminders, and move between days effortlessly, all wrapped in a clean, native macOS design that stays ready whenever you are.","img":"https://macmenubar.com/wp-content/uploads/2026/02/Cue.webp","u":"https://apps.apple.com/us/app/cue-daily-task-reminders/id6759405004"},{"t":"CaptionSnap","d":"CaptionSnap quietly saves meeting captions from Teams, Zoom, and Google Meet, turning them into clean local transcripts with real speaker names and timestamps. Everything stays on your Mac, with minimal CPU usage and zero cloud involvement.","img":"https://macmenubar.com/wp-content/uploads/2026/03/captionsnap.webp","u":"https://captionsnap.app/"},{"t":"Lazy Stats","d":"Lazy Stats keeps CPU, memory, storage, thermals, battery, and network activity in clear view, with smart health summaries and focused diagnostics that help you catch trouble before your fans start screaming.","img":"https://macmenubar.com/wp-content/uploads/2026/02/lazy-stats.webp","u":"https://apps.apple.com/in/app/lazy-stats/id6758316752"},{"t":"Spokenly","d":"Spokenly lets you write at the speed of speech, turning your voice into accurate text across Mac and iPhone. With fast local models, offline suppor
