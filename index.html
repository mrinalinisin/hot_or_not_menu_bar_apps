set times, and a clean, minimal interface.","img":"https://macmenubar.com/wp-content/uploads/2024/11/clockzones.jpeg","u":"https://clockzones.app/"},{"t":"Quick Draft","d":"Quick Draft is a menu bar app that serves as a scratchpad for fast notes, email drafts, and to-do lists, effortlessly synchronizing across your Apple devices via iCloud.","img":"https://macmenubar.com/wp-content/uploads/2024/11/quick_draft.jpg","u":"https://quickdraft.app/"},{"t":"Lickable","d":"Lickable brings back the classic menu bars from previous macOS versions, offering a nostalgic and (for some) visually appealing interface.","img":"https://macmenubar.com/wp-content/uploads/2024/11/lickable.jpg","u":"https://apps.apple.com/us/app/lickable-menu-bar/id6444217677"},{"t":"FreeSpace","d":"This menu bar app shows all mounted volumes along with the available free space on each. If you only want to monitor a particular volume, you can choose to have that volume’s free space displayed right in the menu bar.","img":"https://macmenubar.com/wp-content/uploads/2024/11/freespace.jpg","u":"https://apps.apple.com/us/app/freespace/id457520846"},{"t":"Armed","d":"This menu bar app monitors your MacBook when left unattended, detecting tampering, alerting the user, and capturing images of the perpetrator.","img":"https://macmenubar.com/wp-content/uploads/2024/11/armed.jpeg","u":"https://aayush9029.gumroad.com/l/armed"},{"t":"Who’s Missing?","d":"This menu bar app shows people, who are currently in space. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications.","img":"https://macmenubar.com/wp-content/uploads/2024/11/who-is-missing.jpeg","u":"https://github.com/menubar-apps/who-is-missing/"},{"t":"MenuBarCalendar","d":"A simple yet functional calendar app lives in your menu bar, providing quick date and day reference without ever needing to launch any separate application from your Mac.","img":"https://macmenubar.com/wp-content/uploads/2024/11/MenuBarCalendar.jpeg","u":"https://github.com/tomhartnett/MenuBarCalendar"},{"t":"YouTube Downloader","d":"A simple menu bar app for downloading YouTube movies on your Mac.","img":"https://macmenubar.com/wp-content/uploads/2024/11/youtube_downloader.webp","u":"https://github.com/DenBeke/YouTube-Downloader-for-macOS"},{"t":"TimeGlyd","d":"This menu bar app is designed to help distributed teams handle time zones. It’s a smaller version of Hovrly and supports multiple desktops and monitors.","img":"https://macmenubar.com/wp-content/uploads/2024/11/timeglyd.jpg","u":"https://timeglyd.jaikanthj.com/"},{"t":"CPU Menu bar app","d":"This straightforward and very simple menu bar utility displays your Mac’s current CPU percentage usage at a quick glance for efficient system performance monitoring and management purposes daily.","img":"https://macmenubar.com/wp-content/uploads/2024/11/CPU-Menu-bar-app.jpg","u":"https://github.com/Thinkr1/CPU-Menubar"},{"t":"Dipper","d":"Dipper is a menu bar app, designed for capturing and editing audio directly from your system. It allows users to record sounds from any app, manage audio sources, and export high-quality recordings.","img":"https://macmenubar.com/wp-content/uploads/2024/11/dipper.jpeg","u":"https://dipper.audio/"},{"t":"Guppy","d":"Guppy is a website uptime checker that shows a bouncing dock icon whenever a site goes down.","img":"https://macmenubar.com/wp-content/uploads/2024/11/guppy.jpeg","u":"https://guppy.menu/"},{"t":"iPaste","d":"iPaste is a clipboard manager that accepts text, images, files, and other forms for pasting. You may also bookmark your frequently used history, update your clipboard history, and arrange everything in groups..","img":"https://macmenubar.com/wp-content/uploads/2024/11/ipaste.jpg","u":"https://apps.apple.com/app/ipaste-clipboard-tool/id1056935452"},{"t":"ScreenSnapAI","d":"ScreenSnapAI is a fast, minimalist macOS app that uses AI to automatically organize and intelligently name your screenshots. It also lets you instantly chat about anything you capture, turning static images into useful context.","img":"https://macmenubar.com/wp-content/uploads/2024/11/screensnapai.jpg","u":"https://screensnap.ai/"},{"t":"NetworkLight","d":"This menu bar app is a simple wrapper that regularly performs a speed test and checks your network quality. Designed primarily for problem resolution rather than long-term use.","img":"https://macmenubar.com/wp-content/uploads/2024/11/network_light_speed_test.jpeg","u":"https://apps.apple.com/de/app/networklight/id6443917973"},{"t":"SecondClock","d":"SecondClock shows a second (or third or forth) time zone in your menu bar. You can select from all time zones and customize the name shown to fit your needs.","img":"https://macmenubar.com/wp-content/uploads/2024/11/second-clock.jpeg","u":"https://apps.apple.com/de/app/secondclock-for-the-menu-bar/id1219227160"},{"t":"Easy Ethernet Icon","d":"This menu bar app shows your Ethernet connection status at a glance. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications.","img":"https://macmenubar.com/wp-content/uploads/2024/11/Easy-Ethernet-Icon.jpg","u":"https://github.com/felixblome/easy-ethernet-icon"},{"t":"Cricklet","d":"Cricklet provides you with real-time cricket match updates. Stay up-to-date, with the option to pin and view stats.","img":"https://macmenubar.com/wp-content/uploads/2024/11/cricklet.jpg","u":"https://github.com/hm-arora/Cricklet"},{"t":"CoverSutra","d":"CoverSutra is a complete and standalone Apple Music player that sits comfortably in your menu bar. Quickly search by album, artist, or song instantly.","img":"https://macmenubar.com/wp-content/uploads/2024/10/coversutra.jpg","u":"https://sophiestication.com/CoverSutra/"},{"t":"Dreamless","d":"Reduce unnecessary background activity. Dreamless automatically turns off Bluetooth/Wi-Fi when the Mac goes to sleep, and turns them back on when it wakes up.","img":"https://macmenubar.com/wp-content/uploads/2024/10/dreamless.jpg","u":"https://dreamless.app/go/mmb "},{"t":"ScanTexter","d":"This menu bar app not only pulls text from your screen but also automatically translates it.","img":"https://macmenubar.com/wp-content/uploads/2024/10/scantexter.jpg","u":"https://apps.apple.com/eg/app/scantexter-ocr-ai-translate/id1635954549"},{"t":"Text Capture","d":"This menu bar app helps you capture non-selectable text and use anywhere. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications.","img":"https://macmenubar.com/wp-content/uploads/2024/10/text-capture.jpg","u":"https://textcapture.app"},{"t":"Tiles","d":"Organize your windows by dragging them to one side of the screen, using keyboard shortcuts, or clicking on the Tiles icon in your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2024/10/tiles.jpg","u":"https://www.sempliva.com/tiles/"},{"t":"Mindful Spirit","d":"Schedule frequent wellness reminders that arrive with the serene and peaceful sound of a singing bowl, gently bringing mindfulness and calm awareness into your busy daily Mac routine.","img":"https://macmenubar.com/wp-content/uploads/2024/10/mindful-spirit.jpg","u":"https://clemstation.com/apps/mindful-spirit"},{"t":"Stretch it","d":"Drag and drop to set your timer with an intuitive, elastic interface. From seconds to hours.","img":"https://macmenubar.com/wp-content/uploads/2024/10/stretcher.jpg","u":"https://clemstation.com/apps/stretch-it"},{"t":"Receiver Radio","d":"Access over 40,000 radio stations and 25,000 podcasts directly from your menu bar with seamless cross-platform sync capabilities using iCloud, Dropbox, or other favorite cloud services online today.","img":"https://macmenubar.com/wp-content/uploads/2024/10/reciever-radio.jpg","u":"https://apps.apple.com/app/receiver-radio/id1445434819"},{"t":"FaceScreen","d":"This menu bar app allows you to show a highly customizable live camera feed and text on your screen on top of everything else.","img":"https://macmenubar.com/wp-content/uploads/2024/10/facescreen.jpg","u":"https://facescreenapp.com/"},{"t":"Supercharge","d":"Improve your macOS 15+ experience with a bunch of essential tools: Hide windows instantly, Quick access to Passwords, Toggle Finder/dark mode/low power, Clear clipboard, Add Dock spacers, Keyboard shortcuts, etc.","img":"https://macmenubar.com/wp-content/uploads/2024/10/supercharge.jpg","u":"https://sindresorhus.com/supercharge"},{"t":"Mic Audio Level","d":"Monitor your microphone’s audio levels in real-time right from your menu bar. Including a visual gauge with color-coded indicators for easy tracking.","img":"https://macmenubar.com/wp-content/uploads/2024/10/mic-audio-level.jpeg","u":"https://clemstation.com/apps/mic-audio-level"},{"t":"Quill","d":"Quill is a simple menu bar note-taking app. It’s actually a close clone of Plume, that hasn’t been updated in some time.","img":"https://macmenubar.com/wp-content/uploads/2024/09/quill.jpg","u":"https://widgetworx.com/apps/quill.html"},{"t":"Strikethrough","d":"A simple text box that lives in your menu bar. No formatting, no bullets, no lists — just strikethrough.","img":"https://macmenubar.com/wp-content/uploads/2024/09/strikethrough.jpg","u":"https://apps.apple.com/us/app/strikethrough/id6711361182"},{"t":"WindowKeys","d":"Customize macOS window tiling shortcuts and use them on any keyboard. This menu bar app gives you full control with a handy command panel—simple, flexible, and always within reach.","img":"https://macmenubar.com/wp-content/uploads/2024/09/windowkeys.webp","u":"https://www.apptorium.com/windowkeys"},{"t":"Snaprsc","d":"Snapsrch is a search tool that allows you to quickly search your favorite websites and get results in a floating window, without opening multiple browser windows or switching between apps.","img":"https://macmenubar.com/wp-content/uploads/2024/09/snaprsc.jpeg","u":"https://snapsrch.sparklide.com/"},{"t":"Offline Translate","d":"This menu bar app supports 21 languages and works completely offline, so you don’t need an internet connection and your data never leave your Mac. (you’ll need macOS Sequoia)","img":"https://macmenubar.com/wp-content/uploads/2024/09/offline-translate.jpg","u":"https://apps.apple.com/de/app/offline-translate-translator/id6686403979"},{"t":"CleanClip","d":"CleanClip automatically saves all your copy history. When you click the menu bar icon, it will display all the copy history. Right-clicking the menu bar icon will show some options.","img":"https://macmenubar.com/wp-content/uploads/2024/09/cleanclip.jpeg","u":"https://cleanclip.cc/"},{"t":"Fover","d":"Fover is designed to speed up file moving, taking just three steps: drag and drop files into the app, specify the destination folder, and click the move button.","img":"https://macmenubar.com/wp-content/uploads/2024/09/fover.jpg","u":"https://apps.apple.com/app/id6478125504"},{"t":"Transloader","d":"This menu bar app lets you initiate downloads on your Mac – remotely from your iPhone, iPad, or other Macs.","img":"https://macmenubar.com/wp-content/uploads/2024/09/transloader.jpeg","u":"https://eternalstorms.at/transloader/"},{"t":"Confetti Magic","d":"This menu bar app brings a burst of cheerful confetti right on your screen. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications.","img":"https://macmenubar.com/wp-content/uploads/2024/09/confetti-magic.jpg","u":"https://apps.apple.com/us/app/confetti-magic/id6473710053"},{"t":"Kaomoji Drawer","d":"This menu bar app lets you create and use Japanese-style emoticons right from your menu bar. Including a bunch of preloaded kaomojis.","img":"https://macmenubar.com/wp-content/uploads/2024/09/kaomoji-drawer.jpg","u":"https://www.dakotafelder.com/kaomoji-drawer/index.html"},{"t":"iMarkets","d":"iMarkets (formerly known as TickBar) can display a list of Stock, Crypto, ETF, or indices tickers in your menu bar. It’s fully configurable.","img":"https://macmenubar.com/wp-content/uploads/2024/09/imarkets.jpg","u":"https://www.imarkets.app/en"},{"t":"Redline","d":"Redline is a menu bar app that keeps your todo list always visible, as an action-based reminder. There are no tags, folders, searching, and other non-essentials.","img":"https://macmenubar.com/wp-content/uploads/2024/09/redline-2.jpg","u":"https://vanka.me/redline/"},{"t":"Chirpy","d":"This menu bar app allows you to set custom notification sounds for your Slack. You can choose different sounds for different channels, apps, or even people in your Slack workspace.","img":"https://macmenubar.com/wp-content/uploads/2024/09/chirpy.jpg","u":"https://chirpy.pro"},{"t":"Viz","d":"This menu bar app lets you extract text from images, videos, QR codes and barcodes with a simple snip mechanism.","img":"https://macmenubar.com/wp-content/uploads/2024/09/viz.jpg","u":"https://github.com/alienator88/Viz"},{"t":"Cloud Snippets","d":"This menu bar app is an iCloud-backed snippets and clipboard manager. Quickly paste your frequently-used snippets of text and access them from all your iCloud devices. The MacOS version is free.","img":"https://macmenubar.com/wp-content/uploads/2024/09/cloud-snippets.jpg","u":"https://cloudsnippets.twoint.com/"},{"t":"InaGIF","d":"InaGif lets you search for GIFs right from your menu bar. Click on any GIF to automatically copy it to your clipboard as an animated file.","img":"https://macmenubar.com/wp-content/uploads/2024/09/inagif.jpg","u":"https://github.com/thomasramon/InaGif/releases/tag/inagif"},{"t":"AirBattery","d":"This menu bar app collects the battery usage of all your devices without installing any client app on them. You can also set battery alerts.","img":"https://macmenubar.com/wp-content/uploads/2024/09/airbattery.jpeg","u":"https://lihaoyun6.github.io/airbattery/"},{"t":"Stats Panel","d":"Stats Panel is a customizable system monitor for your menu bar. It has an adaptive UI which changes with the theme of your Mac.","img":"https://macmenubar.com/wp-content/uploads/2024/09/statspanel.jpg","u":"https://statspanel.app/"},{"t":"Scratchpad","d":"Capture your thoughts instantly in a single, always-accessible note that syncs seamlessly across all your Apple devices, keeping your best ideas and inspiration perpetually just one click away.","img":"https://macmenubar.com/wp-content/uploads/2024/09/scratchpad.jpg","u":"https://sindresorhus.com/scratchpad"},{"t":"Swifty Stats","d":"This menu bar app is designed for indie app developers. It provides easy access to your recent installation data from App Store Connect.","img":"https://macmenubar.com/wp-content/uploads/2024/08/swiftystats.jpeg","u":"https://menubar-apps.github.io/#swiftystats"},{"t":"Defer","d":"Defer is a menu bar to-do app. It pairs with a simple inbox app on iOS. No signup needed, syncs automatically via your Apple ID, and supports some quick export options that Reminders doesn’t.","img":"https://macmenubar.com/wp-content/uploads/2024/08/defer.jpg","u":"https://deferapp.com/"},{"t":"MeetingMenu","d":"MeetingMenu is the all-in-one meeting management tool designed specifically for the menu bar. Offering features like a meeting countdown timer, one-click meeting launches, screen recording, live camera preview, privacy tools and more.","img":"https://macmenubar.com/wp-content/uploads/2024/08/meetingmenu.jpeg","u":"https://www.meetingmenu.app/"},{"t":"Menu Bar Tint","d":"Menu Bar Tint lets you set colors and translucency for three sections of the menu bar.","img":"https://macmenubar.com/wp-content/uploads/2024/08/menubartint.jpg","u":"https://manytricks.com/menubartint/"},{"t":"DonkeyCarrot","d":"This menu bar app shows you how much you’ve earned today. Simply enter your daily, monthly, or yearly salary, set your work hours, and choose the amount that will trigger the fun animation.","img":"https://macmenubar.com/wp-content/uploads/2024/08/donkeycarrot.jpeg","u":"https://krayorn.gumroad.com/l/donkeyCarrot"},{"t":"Clop","d":"This menu bar app offers many ways to optimize your images, videos, and PDF files. Choose a folder for automatic optimization, optimize the files when you copy them to your clipboard, or simply drag and drop them onto Clop’s shelf for optimizing.","img":"https://macmenubar.com/wp-content/uploads/2024/08/clop-1.jpg","u":"https://lowtechguys.com/clop/"},{"t":"Logoer","d":"Change the style of the Apple logo in your macOS menu bar. Apparently it’s an overlay, so you can even show a Windows logo.","img":"https://macmenubar.com/wp-content/uploads/2024/08/logoer.jpg","u":"https://github.com/lihaoyun6/Logoer"},{"t":"Notes.AI","d":"Notes.ai turns meetings and audio files into clean, structured transcripts using fully local AI models. It exports everything straight to Notion or Obsidian, lets you chat with your transcripts for insights, and keeps all data securely on your Mac. Fast, private, and genuinely practical.","img":"https://macmenubar.com/wp-content/uploads/2024/08/notes-ai.jpg","u":"https://apps.apple.com/us/app/notes-ai/id6477414161"},{"t":"Lifeline","d":"Lifeline is a visual focus and Pomodoro timer that lives entirely in (and just below) the menu bar. The pro feature lets you track your time as you work without interrupting your flow.","img":"https://macmenubar.com/wp-content/uploads/2024/08/lifeline-new.jpg","u":"https://www.saent.com/"},{"t":"Clotski","d":"This menu bar app lets you browse, search, and copy images without interrupting your current workflow.","img":"https://public-files.gumroad.com/zmcvy8iw10ehu11mu068r3osss3o","u":"https://inchman.gumroad.com/l/Clotski"},{"t":"FloatBrowser","d":"This menu bar app is an always-on-top overlay browser, including tab support. You can adjust the size, screen position, and opacity.","img":"https://macmenubar.com/wp-content/uploads/2024/08/floatbrowser.jpg","u":"https://beauty-of-pixel.tech/floatbrowser/"},{"t":"Minizones","d":"This menu bar app lets you quickly glance at different timezones. Choose from a list of 500+ timezones across the globe.","img":"https://macmenubar.com/wp-content/uploads/2024/08/minizones.jpg","u":"https://minizones.app/"},{"t":"Timer RH (Red Hot Timer)","d":"This menu bar app is a fast and easy way to set up a timer. You can keep the timer window on top of all other windows, or just in your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2024/08/timer-rh.jpg","u":"https://red-hot-timer-for-mac-os-x.3bitlab.com/"},{"t":"Microsoft NTFS for Mac","d":"This menu bar app lets you write, edit, copy, move and delete files on Microsoft NTFS volumes from your Mac. Mount, unmount, verify, format or set any of your Microsoft NTFS volumes as a startup drive.","img":"https://macmenubar.com/wp-content/uploads/2024/08/osoft-NTFS-for-Mac.jpg","u":"https://www.paragon-software.com/home/ntfs-mac/#"},{"t":"Stock Calendar","d":"This menu bar app is a stock dividend calendar that displays upcoming dividend payments and stock splits.","img":"https://macmenubar.com/wp-content/uploads/2024/08/stock-calendar.jpg","u":"https://stocks.menubarapp.com/"},{"t":"Mounty for NTFS","d":"You can use this menu bar app to re-mount write-protected NTFS volumes under macOS in read-write mode.","img":"https://macmenubar.com/wp-content/uploads/2024/08/mounty.jpg","u":"https://mounty.app/"},{"t":"MagicQuit","d":"Tired of having a cluttered desktop and apps using power in the background? This menu bar app lets you automatically closes apps when you don’t use them anymore.","img":"https://macmenubar.com/wp-content/uploads/2024/08/magicquit.jpg","u":"https://magicquit.com/"},{"t":"FileZilla Pro RemoteDrive","d":"This menu bar app connects to cloud storage services from within Finder, allowing you to manage all your cloud storage including Amazon S3, Box, Google Drive, Dropbox, Microsoft OneDrive, and many more.","img":"https://macmenubar.com/wp-content/uploads/2024/07/filezilla-pro-remotedrive.jpg","u":"https://filezillapro.com/remotedrive/"},{"t":"App Cleaner & Uninstaller","d":"App Cleaner & Uninstaller allows you to completely remove programs from your Mac. In the menu bar, you can see information and quickly access a list of your applications, unused programs, startup items, and manage available updates for applications.","img":"https://macmenubar.com/wp-content/uploads/2024/07/AppCleanerUninstaller.jpg","u":"https://nektony.com/mac-app-cleaner"},{"t":"Funter","d":"This menu bar app allows you to show hidden files, switch hidden files visibility in Finder, hide files, copy, move or remove unneeded hidden items.","img":"https://macmenubar.com/wp-content/uploads/2024/07/Funter.jpg","u":"https://nektony.com/funter"},{"t":"Memory Cleaner","d":"This menu bar app helps you free up unused RAM and speed up your Mac. Once you launch the app, it shows the memory usage on your Mac, including the memory used by a single application launched on your system.","img":"https://macmenubar.com/wp-content/uploads/2024/07/MemoryCleaner.jpg","u":"https://nektony.com/memory-cleaner"},{"t":"Cloud","d":"Cloud brings the Pomodoro technique to your Mac with a minimal interface, offering custom preset timers so you can fit your productivity rhythm to your unique workflow needs.","img":"https://macmenubar.com/wp-content/uploads/2024/07/cloud.jpg","u":"https://github.com/YYUUGGOO/Cloud"},{"t":"ClipBook","d":"Quickly access your clipboard history whenever you need it. You can search, edit, delete, and paste clipboard history items as plain text into active apps.","img":"https://macmenubar.com/wp-content/uploads/2024/07/clipbook.jpg","u":"https://clipbook.app/"},{"t":"Alto","d":"Alto helps you work with  Apple Notes and Apple Mail: copy links, show backlinks, publish online. You can also create blogs and websitse from your apple notes.","img":"https://macmenubar.com/wp-content/uploads/2024/07/alto.jpg","u":"https://apps.apple.com/us/app/alto-computer/id6480425094"},{"t":"MacCleaner Pro","d":"This menu bar app is a 6-in-one software bundle that helps optimize and clean up a Mac. It offers a wide range of functions, including cache clearing, duplicate file deletion, application uninstallation, hard disk analysis, RAM cleaning, and more.","img":"https://macmenubar.com/wp-content/uploads/2024/07/MacCleanerPro_menubar.jpg","u":"https://nektony.com/mac-cleaner-pro"},{"t":"Magic Switch","d":"This menu bar app lets you seamlessly switch Apple peripherals (Magic Keyboard, Magic Mouse, and Magic Trackpad) between two Macs.","img":"https://macmenubar.com/wp-content/uploads/2024/07/magic-switch.jpeg","u":"https://www.magic-switch.com/"},{"t":"PromptBar","d":"PromptBar is a lightweight AI chat client for macOS that brings Mistral AI, ChatGPT, Gemini, DeepSeek, Grok, Perplexity, Copilot, AI Studio, NotebookLM, and Meta AI together in one menubar app for quick, seamless access.","img":"https://macmenubar.com/wp-content/uploads/2024/07/promptbar.webp","u":"https://github.com/peterdsp/PromptBar"},{"t":"Usage","d":"A menu bar app to track your system’s activity and performance. You can buil the Menu from 30+ components.","img":"https://macmenubar.com/wp-content/uploads/2019/12/usage-2.jpg","u":"https://usage.pro"},{"t":"Menu Bar Spacing","d":"This menu bar app lets you customize the gap between menu bar icons. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications. The app Gaps does the same and runs on older versions of macOS.","img":"https://macmenubar.com/wp-content/uploads/2024/07/menubar-spacing.jpg","u":"https://sindresorhus.com/menu-bar-spacing"},{"t":"RewriteBar","d":"RewriteBar lets you polish, rewrite, or translate any selected text with a single shortcut, right where you’re working. Fix grammar, adjust tone, and chain custom AI actions, with optional local models for extra privacy.","img":"https://macmenubar.com/wp-content/uploads/2024/07/rewritebar.jpg","u":"https://rewritebar.com/"},{"t":"BananaBin","d":"When your bin takes up a lot of disk space, this menu bar app makes that visible by adding buzzing flies to your bin. You can select whether the flies appear from 10 MB, 1 GB, or 10 GB in your settings.","img":"https://macmenubar.com/wp-content/uploads/2024/07/bananabin.jpg","u":"https://bananabin.app/"},{"t":"Badgeify","d":"Badgeify lets you add menu bar icons for apps like iMessage and Email (message counts). It can also serve as a quick launcher for your applications right from the menu bar.","img":"https://macmenubar.com/wp-content/uploads/2024/07/badgeify.jpg","u":"https://badgeify.app/"},{"t":"In Translator","d":"This menu bar app is a full-featured translation tool designed for various translation needs, including text and pictures. It supports over 100 languages.","img":"https://macmenubar.com/wp-content/uploads/2024/07/in-translator.jpg","u":"https://apps.apple.com/us/app/in-translator/id1485156510"},{"t":"Clamshell","d":"This menu bar app disables the clamshell mode and puts your MacBook to sleep when the lid is closed.","img":"https://macmenubar.com/wp-content/uploads/2024/07/clamshell.jpg","u":"https://apps.apple.com/us/app/clamshell/id6477896729"},{"t":"PasteNow","d":"This clipboard management tool lets you store any kind of temporary data: text, link, image and even code. It supports syncing clipboard records across all iOS and macOS devices via iCloud.","img":"https://macmenubar.com/wp-content/uploads/2024/07/pastenow-2.jpg","u":"https://pastenow.app/"},{"t":"Surf Forecast","d":"Is today a good day to go surf at your local spot? Have your surf forecast right in the menu bar, swell, tides, wind, on a glimpse and a click of a button, stay zen while working and don’t miss any waves.","img":"https://macmenubar.com/wp-content/uploads/2024/07/surf-forcast.jpg","u":"https://surf-forecast-landing.pages.dev/"},{"t":"TextCount","d":"TextCount instantly analyzes your text and displays word, character, and sentence counts directly on your menu bar. Customize display options, check readability, and get reading/speaking times, all without pasting your content anywhere.","img":"https://macmenubar.com/wp-content/uploads/2024/07/textcount.jpg","u":"https://arthursmithdev.gumroad.com/l/TextCount"},{"t":"Guifero","d":"This menu bar app lets you find the perfect GIF at a moment’s notice. Quickly copy or drag them to another app to send, without having to leave what you are doing.","img":"https://macmenubar.com/wp-content/uploads/2024/06/guifero.jpg","u":"https://guifero.app/"},{"t":"Rocola","d":"The calming tones played by this menu bar app create the ideal environment for increased productivity and relaxation.","img":"https://macmenubar.com/wp-content/uploads/2024/06/rocola.jpg","u":"https://wilterrero.gumroad.com/l/rocola"},{"t":"Online Check","d":"Check if you are online directly from the menu bar. The menu bar icon turns red when you are offline.","img":"https://macmenubar.com/wp-content/uploads/2024/06/online-check.jpeg","u":"https://sindresorhus.com/online-check"},{"t":"Teletable","d":"This menu bar app is inspired by teletext aesthetics and brings you real-time data for football (soccer) leagues, tennis rankings, golf leaderboards, chess ratings, and Formula 1 standings.","img":"https://macmenubar.com/wp-content/uploads/2024/06/teletable.jpg","u":"https://teletable.app/"},{"t":"Cat Fact","d":"This menu bar app shows random cat facts about your kitties. This comprehensive tool helps you stay organized and efficient throughout your workday without distractions or complications.","img":"https://macmenubar.com/wp-content/uploads/2024/06/cat-fact.jpg","u":"https://arthursmithdev.gumroad.com/l/CatFact"},{"t":"StyleGuide","d":"This menu bar app makes it easy for iOS & other Apple platform developers to quickly preview HIG typography, colors and sizes.","img":"https://macmenubar.com/wp-content/uploads/2024/06/styleguide.jpg","u":"https://apps.apple.com/app/id6503706164"},{"t":"Blip","d":"Blip is a menu bar app that directly beams files across the internet — directly from your Mac to theirs. It works on macOS, iOS, Windows and Android, kind of like a cross-platform version of Airdrop.","img":"https://macmenubar.com/wp-content/uploads/2024/06/blip.jpg","u":"https://blip.net/"},{"t":"Keep It Shot","d":"This menu bar app uses AI to evaluate and rename your screenshots, either in bulk or as you take them.","img":"https://macmenubar.com/wp-content/uploads/2024/06/keep-it-shot.jpg","u":"https://keepitshot.com/"},{"t":"Easy Move + Resize","d":"This menu bar app adds “modifier key + mouse drag” move and resize to your MacOS.","img":"https://macmenubar.com/wp-content/uploads/2024/06/easy-move-resize.jpg","u":"https://github.com/dmarcotte/easy-move-resize"},{"t":"Easydict","d":"This menu bar app lets you look up words or translate text. It can automatically detect the language of the input text, supports input translate, select translate, and OCR screenshot translate.","img":"https://macmenubar.com/wp-content/uploads/2024/06/easydict.jpg","u":"https://github.com/tisfeng/Easydict"},{"t":"MenuBar Next","d":"This menu bar app displays the first line of a text file in your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2024/06/menubar-next.jpg","u":"https://motionobj.com/menubar-next/"},{"t":"PasteKit","d":"PasteKit lets you record sound (system sound, microphone, etc.), video, and screenshots in one simple, all-in-one solution. And any recordings you make are automatically copied to the clipboard, allowing you to put them wherever you like.","img":"https://macmenubar.com/wp-content/uploads/2024/06/pastekit.jpg","u":"https://www.kloytools.com/pastekit"},{"t":"GlimpseEase","d":"This menu bar app automatically monitors your Stripe transactions, keeping you informed without the constant need to glance at your phone during work hours.","img":"https://macmenubar.com/wp-content/uploads/2024/05/glimpseease.jpg","u":"https://glimpseease.netlify.app/"},{"t":"MenuBar Weather","d":"MenuBar Weather displays all major weather information for your current location at a glance. It updates hourly or every significant location change.","img":"https://macmenubar.com/wp-content/uploads/2024/05/menubar-weather_n.jpg","u":"https://apps.apple.com/gb/app/menubar-weather/id1662381447"},{"t":"Text Workflow","d":"Text Workflow lets you automate text transformations. The program has a menu bar app that allows users to choose a workflow to convert the text from their clipboard.","img":"https://macmenubar.com/wp-content/uploads/2024/05/text-workflow.jpg","u":"https://www.gtrigonakis.com/textworkflow/"},{"t":"Week Number","d":"Display the current ISO 8601 week number in your menu bar at a glance for reference. Essential for project managers, developers, and planners who rely on week-based scheduling systems.","img":"https://macmenubar.com/wp-content/uploads/2024/05/week-number.jpg","u":"https://sindresorhus.com/week-number"},{"t":"Steecky","d":"Steecky is the text editor located in your menu bar. It’s always accessible, whether you’re working on something important or browsing the web. Steecky stores your entries as you type, ensuring that all information is retained.","img":"https://macmenubar.com/wp-content/uploads/2024/05/steecky-n.jpg","u":"https://steecky.app/"},{"t":"Hammer","d":"Hammer is a menu bar Icon app that assist its users in converting their clipboard data from one form to another quickly.","img":"https://macmenubar.com/wp-content/uploads/2024/05/hammer.jpeg","u":"https://hammer.jackmakes.app/"},{"t":"HistoryHound","d":"This menu bar app lets you do a fast keyword search on the entire content of all web pages you’ve visited recently, plus all those that you’ve bookmarked.","img":"https://macmenubar.com/wp-content/uploads/2024/04/historyhound.jpg","u":"https://www.stclairsoft.com/HistoryHound/"},{"t":"Pomodoro Timer","d":"This menu bar app is a minimalistic pomodoro timer and todo tracker. Stored data never leaves your device.","img":"https://macmenubar.com/wp-content/uploads/2024/04/pomodoro-timer.jpg","u":"https://pomodorotimer.co/"},{"t":"QuickFindler","d":"With QuickFindler, you can add your frequently opened folders, files, apps, and websites to the icon, and then open them conveniently using shortcuts.","img":"https://macmenubar.com/wp-content/uploads/2024/04/quickfindler-2.jpg","u":"https://apps.apple.com/cn/app/quickfindler/id6473921930"},{"t":"Finicky","d":"This menu bar app allows you to set up rules that decide which browser is opened for every link or url.","img":"https://macmenubar.com/wp-content/uploads/2024/04/finicky.jpeg","u":"https://github.com/johnste/finicky/"},{"t":"Brew Services","d":"Start, restart, and stop Homebrew services directly from your menu bar without opening Terminal. Ideal for developers managing multiple background services during development and testing workflows efficiently.","img":"https://macmenubar.com/wp-content/uploads/2024/04/brew-services.jpg","u":"https://github.com/andrewn/brew-services-menubar"},{"t":"Icon Preview","d":"Preview how your app icon will look in the menu bar. You can also drag and drop an image onto the menu bar icon to preview it there. Ideal for developers and designers to perfect the look of their app icons.","img":"https://macmenubar.com/wp-content/uploads/2024/04/icon-preview.jpg","u":"https://sindresorhus.com/icon-preview"},{"t":"Glinet Wireguard","d":"Switch between WireGuard peers instantly from your menu bar without opening terminal or complex commands. Streamline VPN management for developers and security-conscious users who need quick connection changes throughout workday.","img":"https://macmenubar.com/wp-content/uploads/2024/03/glinet-wireguard.jpg","u":"https://github.com/jinpark/glinet-menu/"},{"t":"Turnip","d":"Turnip is a time tracker for freelancers and small businesses that integrates with the tools you already use. It also comes with stats and charts to visualize your time by day, week, and month.","img":"https://macmenubar.com/wp-content/uploads/2024/04/turnip.jpg","u":"https://turniptimer.com/"},{"t":"PinFrame","d":"This menu bar app is a stick-on-top file viewer. It lets you place a window on top of anything else, but also adjust the window opacity and interactive mode.","img":"https://macmenubar.com/wp-content/uploads/2024/04/pinframe.jpg","u":"https://unboxing.fun/apps/pinframe"},{"t":"Zonerly","d":"This menu bar app lets you find the correct time across multiple zones for traveling, planning meetings, calling abroad and so on. Offline mode is supported.","img":"https://macmenubar.com/wp-content/uploads/2024/04/zonerly.jpg","u":"https://zonerly.beauty-of-pixel.tech/"},{"t":"NeSleep","d":"This menu bar app prevents any Mac from entering sleep mode, providing hassle-free protection against unexpected sleep cycles.","img":"https://macmenubar.com/wp-content/uploads/2024/04/nesleep.jpg","u":"https://vishalroygeek.gumroad.com/l/nesleep"},{"t":"AudioBuddy","d":"If you are dissatisfied with the default Mac text-to-speech voices, this menu bar app replaces them with OpenAI. There’s a max limit of 4096 characters.","img":"https://macmenubar.com/wp-content/uploads/2024/03/audiobuddy_2.jpg","u":"https://zeitalabs.gumroad.com/l/audiobuddy"},{"t":"Folderizer","d":"This menu bar app allows you to create custom folder icons by selecting your preferred color, icon and even your own photos to accompany it.","img":"https://macmenubar.com/wp-content/uploads/2024/04/folderizer.jpg","u":"https://www.folderizer.com/"},{"t":"iBlurred","d":"This menu bar app allows you to blur out sensitive information. You can resize each blurred part of your screen to meet your preferences.","img":"https://macmenubar.com/wp-content/uploads/2024/03/iblurred.jpg","u":"https://apps.apple.com/us/app/iblurred/id1667815215"},{"t":"Hot Corners Toggler","d":"Toggle macOS hot corners on and off quickly from your menu bar without system preferences. Avoid accidental screen corner triggers while maintaining the option to enable them instantly when needed.","img":"https://macmenubar.com/wp-content/uploads/2024/04/hot-corners-toggler.jpg","u":"https://github.com/niallmurphy-ie/Hot-Corners-Toggler"},{"t":"WeeNu","d":"This menu bar app displays the current week number in your menu bar, following ISO 8601 formatting.","img":"https://macmenubar.com/wp-content/uploads/2024/04/weenu.jpg","u":"https://github.com/mullweisser/mac-weenu"},{"t":"iBar","d":"iBar is an menu bar management tool that supports the hiding of menu bar icons and the aggregation and display of individual windows.","img":"https://macmenubar.com/wp-content/uploads/2024/03/ibar.jpg","u":"https://apps.apple.com/us/app/ibar-menubar-icon-control-tool/id6443843900"},{"t":"Zshistory","d":"This menu bar app lets you to search through your recent terminal commands. It currently supports only zsh, which is the default shell in macOS.","img":"https://macmenubar.com/wp-content/uploads/2024/03/zshistory.jpg","u":"https://liam5.gumroad.com/l/zshistory"},{"t":"Weather Emoji","d":"A simple but elegant method to show the current weather (and temperature) on your Mac’s menu bar.","img":"https://macmenubar.com/wp-content/uploads/2024/03/weather-emoji.jpg","u":"https://apps.apple.com/us/app/weather-emoji-menu-bar/id6474185099"},{"t":"MutePod","d":"With MutePod, you can mute or unmute the microphone directly from your menu bar. Whether you’re in a Zoom meeting or grooving to record, MutePod syncs effortlessly with your AirPods. You can also modify the input volume or the default input device.","img":"https://macmenubar.com/wp-content/uploads/2024/03/mutepod.jpg","u":"https://mutepod.app/"},{"t":"Learn German Every Minute","d":"This menu bar app shows you a new German word every minute, along with an example sentence. You can also track your progress of knowing the most common 4,000 German words or change the refresh frequency.","img":"https://macmenubar.com/wp-content/uploads/2024/03/learn-german-every-minute.jpg","u":"https://apps.apple.com/us/app/learn-german-every-minute/id6479203386?mt=12"},{"t":"1001 Record","d":"This menu bar app simplifies screen recording, screenshots, and on-screen annotations. You can record the entire screen, specific regions, or windows, and even include camera recordings.","img":"https://macmenubar.com/wp-content/uploads/2024/03/1001-record.jpg","u":"https://1001record.com/"},{"t":"ScreenshotMagic","d":"This menu bar app utilizes AI to automatically provide descriptive names for your images. It makes it easy to rename large batches of images in just 1 click.","img":"https://macmenubar.com/wp-content/uploads/2024/03/screenshotmagic.jpg","u":"https://www.screenshotmagic.com/"},{"t":"BLEUnlock","d":"This menu bar app lets you lock and unlock your Mac with your iPhone, Apple Watch, or any other Bluetooth low energy devices.","img":"https://macmenubar.com/wp-content/uploads/2024/03/BLEUnlock.jpg","u":"https://github.com/ts1/BLEUnlock"},{"t":"PowerMode","d":"Easily switch between low and high power mode, directly from your menu bar. When enabled, your MacBook automatically switches to low power mode when the battery drops below 20%.","img":"https://macmenubar.com/wp-content/uploads/2024/03/powermode.jpg","u":"https://sakesalverda.nl/powermode/"},{"t":"Heydi","d":"Heydi streamlines your interactions with web AI chats like ChatGPT, Claude, Copilot, Gemini, and Perplexity by letting you prompt with voice, clipboard, or both. It runs conversations in the background, supports customizable shortcuts, and even handles offline transcription and audio replies.","img":"https://macmenubar.com/wp-content/uploads/2024/03/heydi.jpg","u":"https://dopaminecode.com/apps/heydi/"},{"t":"Lyric Fever","d":"This menu bar app syncs with Spotify & Apple Music, retrieves the lyrics of the currently playing song, and loads them. It also modifies the truncation of the lyrics, to ensure that it fits in your menu bar.","img":"https://macmenubar.com/wp-content/uploads/2024/02/lyric-fever.jpg","u":"https://lyricfever.com/"},{"t":"ScreenTime+","d":"Automatically track time spent across apps to understand your productivity patterns efficiently without extra steps to optimize your time management with ease making your daily organization more effective.","img":"https://macmenubar.com/wp-content/uploads/2024/02/screentime-plus.jpg","u":"https://www.screentimeplus.app/"},{"t":"LaunchPalette","d":"Switch between apps and projects with custom keyboard shortcuts. without interrupting your workflow with ease allowing you to change contexts and projects without disruption to your workflow.","img":"https://macmenubar.com/wp-content/uploads/2024/02/launchpalette-n.jpg","u":"https://apps.apple.com/us/app/launchpalette-app-switcher/id6474854386"},{"t":"SoundPaste","d":"No more saving and opening sound files. This menu bar app lets you record and paste sound directly into your audio/video editing software.","img":"https://macmenubar.com/wp-content/uploads/2024/02/soundpaste.jpg","u":"https://www.kloytools.com/soundpaste"},{"t":"zClock","d":"zClock is a basic desktop clock that works with all other fullscreen apps. It also shows your current network speed. In addition, a simple countdown is given for usage in Keynote and other apps.","img":"https://macmenubar.com/wp-content/uploads/2024/01/zclock.jpg","u":"https://zclock.xyz/en.html"},{"t":"Display Arranger","d":"Tired of having to adjust your settings whenever you move your displays? This menu bar app allows you to quickly configure where your monitors are in only two clicks. Plus, you can save particular arrangements.","img":"https://macmenubar.com/wp-content/uploads/2024/02/display-arranger.jpg","u":"https://apps.apple.com/us/app/display-arranger/id6475056370"},{"t":"Ice","d":"Ice lets you hide and show menu bar items. You can customize the menu bar’s appearance and choose your own icon to show in the menu bar.","img":"https://macmenubar.com/wp-content/uploads/2024/01/ice.jpg","u":"https://icemenubar.app/"},{"t":"Motivational Menu Bar","d":"Daily inspiration right at your fingertips. This app embeds uplifting quotes into your menu bar, offering you the encouragement you need at just a glance.","img":"https://macmenubar.com/wp-content/uploads/2024/01/motivational-menu-bar.jpg","u":"https://apps.apple.com/us/app/motivational-menu-bar/id6466288724"},{"t":"Particulars","d":"This menu bar app displays your Mac’s computer name, model name, serial number, CPU, RAM, graphics card, OS version, Server version, current user, uptime, disk space, and network configuration.","img":"https://macmenubar.com/wp-content/uploads/2024/01/particulars.jpg","u":"https://particulars.app/"},{"t":"Webfolio","d":"Access all your bookmarks with a simple click on the menu bar. You can also categorize and arrange your bookmarks just the way you like with folders.","img":"https://macmenubar.com/wp-content/uploads/2024/01/webfolio.jpg","u":"https://apps.apple.com/us/app/webfolio-menu-bar-bookmarks/id6474243367"},{"t":"Switcher","d":"This menu bar app prevents the accidental closing of applications, for instance pressing cmd q by mistake.","img":"https://macmenubar.com/wp-content/uploads/2024/01/switcher-app-mac.jpg","u":"https://github.com/tkgka/Switcher"},{"t":"ShotSolve","d":"ShotSolve lets you capture any part of your screen and instantly run a pre-configured GPT-4o prompt on it. From generating code out of Figma designs to UI feedback and contextual help, it turns screenshots into practical answers within seconds, all inside a fast, native interface that respects your privacy and keeps your API key securely stored in the Apple Keychain.","img":"https://macmenubar.com/wp-content/uploads/2024/01/shotsolve.jpg","u":"https://shotsolve.com/"},{"t":"Pasteratops","d":"Access a comprehensive history of your clipboard items. You can also choose apps to exclude from clipboard monitoring. Pasteratops saves your data to disk, ensuring it’s always available, even after a system restart.","img":"https://macmenubar.com/wp-content/uploads/2024/01/pasteratops.jpg","u":"https://pasteratops.com/"},{"t":"Pricebar","d":"This menu bar app displays your favorite stocks, crypto, and market indices. 24 hours price percentage movements!","img":"https://macmenubar.com/wp-content/uploads/2024/01/pricebar.jpg","u":"https://apple.co/3ZCgvWt"},{"t":"Notepad Menu Edition","d":"This menu bar app lets you jot down your text fast, without disturbing your window setup.","img":"https://macmenubar.com/wp-content/uploads/2023/12/notepad-menu.jpg","u":"https://apps.apple.com/us/app/notepad-menu-edition/id1454561460"},{"t":"Cursor Teleporter","d":"This menu bar app lets you teleport your cursor across multiple monitors. The cursor appears precisely where you expect it to: in a predefined place or at the last location on the screen.","img":"https://macmenubar.com/wp-content/uploads/2024/01/cursor-teleporter.jpg","u":"https://www.apptorium.com/cursor-teleporter"},{"t":"DevControls","d":"Access your favorite repositories, folders, and URLs with one click from the menu bar for instant access.","img":"https://macmenubar.com/wp-content/uploads/2023/12/devcontrols.jpg","u":"https://devcontrols.gumroad.com/l/purchase"},{"t":"Presentation Helper","d":"Present anything from your desktop. Annotate and draw circles, rectangles and lines anywhere on your screen. You can save a screenshot of the entire screen with all drawn annotations.","img":"https://macmenubar.com/wp-content/uploads/2023/12/presentation-helper.jpg","u":"https://apps.apple.com/us/app/presentation-helper/id1539261720"},{"t":"IsThereNet","d":"See when your internet disconnects and reconnects. A green top status line means connected; Red means disconnected (and Yellow means slow internet). The status line does not display in screenshots and does not interfere with menu bar navigation.","img":"https://macmenubar.com/wp-content/uploads/2024/01/is-there-net.jpg","u":"https://lowtechguys.com/istherenet/"},{"t":"Second Clock","d":"This menu bar app shows a second clock for a different time zone in your menu bar. There’s a workaround to have even more clocks.","img":"https://macmenubar.com/wp-content/uploads/2024/01/second-clock.jpg","u":"https://sindresorhus.com/second-clock"},{"t":"Drag and Drop Manager","d":"This menu bar app makes Dragging & Dropping files and folders and other content easier. A handy ‘Drop Basket’ appears instantly whenever you select and start dragging a file or a folder.","img":"https://macmenubar.com/wp-content/uploads/2023/12/drag-drop-manager.jpg","u":"https://apps.apple.com/us/app/drag-and-drop-manager/id1563350063"},{"t":"My Favorites","d":"This menu bar program allows you to bookmark files, folders, online bookmarks, applications, text notes, and other items for quick access.","img":"https://macmenubar.com/wp-content/uploads/2023/12/my-favorites.jpg","u":"http://wisetechlabs.com/my-favorites/index.html"},{"t":"ZeroTierCortana","d":"Monitor devices on your ZeroTier virtual network for secure remote connectivity efficiently without extra steps for secure connectivity to help you stay informed and make better decisions.","img":"https://macmenubar.com/wp-content/uploads/2023/12/ZeroTierCortana.jpg","u":"https://github.com/aidanchandra/ZeroTierCortana"},{"t":"DownCount","d":"Start a countdown timer directly from your menubar. Option to select a specific time, Select from 3 different time layouts and Launch at Login.","img":"https://macmenubar.com/wp-content/uploads/2023/12/downcount.jpg","u":"https://apps.apple.com/in/app/downcount-menu-bar-countdown/id6474534456"},{"t":"Tailscale","d":"This menu bar app lets you connect computers on different networks quickly and securely via VPN, all without having to modify the network infrastructure at each location.","img":"https://macmenubar.com/wp-content/uploads/2023/12/tailscale.jpg","u":"https://tailscale.com"},{"t":"Coin Ticker","d":"Coin Ticker keeps the current values of your crypto holdings in the corner of your screen, giving you a quick, real-time pulse on your portfolio without needing to open an exchange or switch to a browser tab.","img":"https://macmenubar.com/wp-content/uploads/2023/12/coin-ticker.jpg","u":"https://github.com/2nthony/coin-ticker"},{"t":"Tuneful","d":"Tuneful is a menu bar app that offers a simple method to handle Spotify and Apple Music, including playback, shuffle, and repeat. It also lets you regulate system volume, select an audio output device, and includes a tiny player window.","img":"https://macmenubar.com/wp-content/uploads/2023/12/tuneful.jpg","u":"https://github.com/martinfekete10/Tuneful"},{"t":"Awake","d":"Whether you’re watching a video, listening to a podcast, doing a presentation, or waiting for a file to download, this menu bar app keeps your Mac awake and productive.","img":"https://macmenubar.com/wp-content/uploads/2023/12/awake.jpg","u":"https://www.metromedya.com/apps/awake/"},{"t":"Trash Buddy","d":"This menu bar app puts a large, freely movable Trash icon on your Desktop, and can automatically empty the Trash every 30 minutes to 24 hours.","img":"https://macmenubar.com/wp-content/uploads/2023/12/trash-buddy.jpg","u":"https://www.widgetworx.com/apps/trash_buddy.html"},{"t":"Simple Stat Speed","d":"This menu bar app ​​shows the currently used CPU in percent, the used RAM in percent and the download/upload speed.","img":"https://macmenubar.com/wp-content/uploads/2023/12/simple-statspeed.jpg","u":"https://statspeed.davidkoenig.de/"},{"t":"Status Bar Music Player","d":"This menu bar app is a straightforward music player. You can see Artist, Song name, Artwork at just a glance. And with one click away, you can see the beautiful Artwork, Album and Timestamp of the current playing song.","img":"https://macmenubar.com/wp-content/uploads/2023/12/status-bar-music-player-1.jpg","u":"https://www.mummymammoth.com/status-bar-music-player"},{"t":"Soonie","d":"Soonie is a small menu bar app, that visualizes your free time until the next meeting or calendar event on your list, and more.","img":"https://macmenubar.com/wp-content/uploads/2023/12/soonie_2.jpg","u":"https://apps.apple.com/us/app/soonie/id6468766154?mt=12"},{"t":"AirPods Battery Monitor","d":"In order to get the battery information from your AirPods you need to Select your Bluetooth device and then see the battery levels! Now just move your eyes up to the menu bar and done!","img":"https://macmenubar.com/wp-content/uploads/2023/12/airpods-battery-monitor.jpg","u":"https://github.com/mohamed-arradi/AirpodsBattery-Monitor-For-Mac"},{"t":"Kotor Color Picker","d":"This menu bar app lets you grab colors on the web, collect them, and create your color palette.","img":"https://macmenubar.com/wp-content/uploads/2023/12/kotor.jpg","u":"https://apps.apple.com/tr/app/kotor-color-picker/id1626508161"},{"t":"Find my ports","d":"Manage local development ports and remote Vercel deployments from your menu bar for instant access. This streamlines your workflow significantly.","img":"https://macmenubar.com/wp-content/uploads/2023/11/find-my-ports.jpg","u":"https://www.findmyports.com/"},{"t":"TextGrabber","d":"Capture text from anywhere on your screen with OCR technology for quick copying efficiently without extra steps for seamless integration with ease.","img":"https://macmenubar.com/wp-content/uploads/2023/11/textgrabber.jpg","u":"https://apps.apple.com/us/app/textgrabber/id6451423640"},{"t":"DeleteKey","d":"This menu bar app brings back the missing Delete Forward Key from many Mac keyboards on your keyboard. You can bind Forward Delete on any key or key combination.","img":"https://macmenubar.com/wp-content/uploads/2023/11/deletekey.jpg","u":"https://lucianboiangiu.gumroad.com/l/deletekey"},{"t":"PiPHero","d":"With the menu bar app PiPHero you can picture-in-picture any window, freeing the rest of your screen for other tasks. It works across all apps.","img":"https://macmenubar.com/wp-content/uploads/2023/11/piphero.jpg","u":"https://piphero.app/"},{"t":"Peek","d":"Peek helps developers keep an eye on their OpenAI API usage and costs without living in a browser tab. It checks usage at regular intervals, stays elegantly out of the way, and stores your API key securely in the macOS keychain, so you can focus on building instead of budgeting.","img":"https://macmenubar.com/wp-content/uploads/2023/10/peek.jpg","u":"https://mattspear.gumroad.com/l/peekapp"},{"t":"GPT Tab","d":"Access ChatGPT in a dedicated interface without cluttering tabs or windows for seamless integration whenever you need them quickly so you can capture ideas without losing your focus.","img":"https://macmenubar.com/wp-content/uploads/2023/10/gpt-tab.jpg","u":"https://gpt-tab.com/"},{"t":"iCloud Kicker","d":"iCloud Kicker helps force iCloud to sync your files when it gets stuck by restarting its process.","img":"https://macmenubar.com/wp-content/uploads/2023/11/kick-icloud.jpg","u":"https://www.widgetworx.com/apps/icloudkicker.html"},{"t":"AnySelect","d":"Run ChatGPT prompts on selected text from anywhere without leaving your current app without interrupting your workflow making your workspace more organized and productive.","img":"https://macmenubar.com/wp-content/uploads/2023/10/anyselect.jpeg","u":"https://tadapps.lemonsqueezy.com/"},{"t":"Hotlist","d":"Manage your daily todos straight from your menu bar. It’s kind of like TextEdit but built for quickly managing a short todo list.","img":"https://macmenubar.com/wp-content/uploads/2023/11/hotlist-3.jpg","u":"https://pqina.nl/hotlist"},{"t":"Key Click Pro","d":"Key Click Pro is a menu bar app that is designed to track your keystrokes and mouse clicks, providing insights into your computer usage patterns and helping you gauge your productivity levels.","img":"https://macmenubar.com/wp-content/uploads/2023/10/key-click-pro.jpg","u":"https://ericdavidsmith.com/blog/macos-apps/key-click-pro-for-macos"},{"t":"LookAway","d":"This menu bar app nudges you to take regular breaks by blurring the screen to help reduce eye strain. It works when you work, pauses when you don’t, and handles idle time intelligently.","img":"https://macmenubar.com/wp-content/uploads/2023/10/lookaway.jpeg","u":"https://lookaway.app/"},{"t":"Recording Buddy","d":"Recording Buddy resides in your menubar, primed to capture both screen activity and audio from your Mac, including input from your microphone. Just hit the record button!","img":"https://macmenubar.com/wp-content/uploads/2023/10/recording-buddy.jpeg","u":"https://apps.apple.com/us/app/recording-buddy/id6467504905"},{"t":"Sleepr","d":"This simple menu bar app brings back the option to set a timer at the end of which your Mac goes into sleep mode (removed from macOS Ventura and Sonoma).","img":"https://macmenubar.com/wp-content/uploads/2023/10/sleepr.jpg","u":"https://sleepr.app/"},{"t":"AVR Control","d":"With this menu bar app, you can remotely control Denon network-ready receivers. Power On/Off Zones, set volume (or mute), set source, etc.","img":"https://macmenubar.com/wp-content/uploads/2023/11/AVR-control.jpg","u":"https://www.gtrigonakis.com/avrcontrol"},{"t":"Pingu","d":"Ping servers and monitor network connectivity directly from your menu bar for instant access. This streamlines your workflow significantly.","img":"https://macmenubar.com/wp-content/uploads/2023/10/pingu.jpg","u":"https://github.com/attheodo/Pingu"},{"t":"GoogleTranslate","d":"Translate text instantly using Google Translate from your menu bar for instant access. This streamlines your workflow significantly making your workflow more efficient with ease.","img":"https://macmenubar.com/wp-content/uploads/2023/10/googletranslate.jpg","u":"https://github.com/dbilgili/GoogleTranslate"},{"t":"LosslessSwitcher","d":"This menu bar app reads the sample rate of the incoming Apple Music stream and then automatically sets the corresponding sample rate in the Audio MIDI Setup app.","img":"https://macmenubar.com/wp-content/uploads/2023/10/losslessswitcher.jpg","u":"https://github.com/vincentneo/LosslessSwitcher"},{"t":"GitStatus","d":"This menu bar app shows all your GitHub notifications (macOS 13.0+). So you don’t have to open GitHub every 5 minutes. 😉","img":"https://macmenubar.com/wp-content/uploads/2023/10/gitstatus.jpg","u":"https://github.com/0x2E/GitStatus"},{"t":"MiniSim","d":"MiniSim is a menu bar app for launching iOS and Android emulators: All your emulators right in your menu bar without opening Android Studio or Xcode.","img":"https://macmenubar.com/wp-content/uploads/2023/10/minisim.jpg","u":"https://www.minisim.app/"},{"t":"ToDoBar","d":"This menu bar app is a minimalistic and straightforward to-do list app. It lets you create tasks and reminds you to complete tasks before their set deadline.","img":"https://macmenubar.com/wp-content/uploads/2023/10/todobar-2.jpg","u":"https://todobar.compzets.com/"},{"t":"FunKey","d":"Enjoy satisfying mechanical keyboard and mouse click sounds to enhance your typing experience efficiently without extra steps for seamless integration with ease.","img":"https://macmenubar.com/wp-content/uploads/2023/10/funkey.jpg","u":"https://apps.apple.com/us/app/funkey-mechanical-keyboard-app/id6469420677"},{"t":"SwiftGuard","d":"This menu bar app automatically shuts down your Mac if an unidentified USB device is plugged in. It continuously monitors USB ports for device activity, even in sleep mode","img":"https://macmenubar.com/wp-content/uploads/2023/10/swiftguard.jpg","u":"https://github.com/Lennolium/swiftGuard"},{"t":"Timkee","d":"Timkee allows you to create, edit and delete JIRA time logs (automatically and manually). It gives you an overview of the latest time logs you have created and can be accessed right of your Mac′s menu bar, without opening JIRA.","img":"https://macmenubar.com/wp-content/uploads/2023/10/timkee.jpeg","u":"https://timkee.io/"},{"t":"ZenBreak","d":"Suffering from screen fatigue? ZenBreak is a menu bar app that reminds you to take a break from your Mac.","img":"https://macmenubar.com/wp-content/uploads/2023/10/zenbreak.jpeg","u":"https://zenbreak.app/"},{"t":"Insomniaz","d":"This menu bar app prevents your Mac from falling asleep at all costs. It allows you to use “clam-shell” mode without hooking up a power source.","img":"https://macmenubar.com/wp-content/uploads/2023/10/insomniaz.jpeg","u":"https://apps.apple.com/us/app/insomniaz-never-sleep/id1447041581"},{"t":"Unlock","d":"This menu bar app locks your Mac when walking away with your iPhone or Apple Watch. Unlock doesn’t require pairing with your iOS/watchOS device.","img":"https://macmenubar.com/wp-content/uploads/2023/10/unlock.jpg","u":"https://apps.apple.com/us/app/unlock-modern-proximity-lock/id6467429245"},{"t":"Pomodoro Todo Timer","d":"Pomodoro Todo Timer is a simple menu bar app that allows you to focus on one task at a time using the pomodoro technique. Stored data never leaves your device.","img":"https://macmenubar.com/wp-content/uploads/2023/09/pomodoro-todo-timer.jpg","u":"https://pomodorotimer.co/"},{"t":"Gerry","d":"This menu bar app is a super simple screen recorder. Crop, trim, and scale your video before exporting as .gif or .mp4 at up to 60 fps.","img":"https://macmenubar.com/wp-content/uploads/2023/10/gerry-new.jpg","u":"https://gerry.video/"},{"t":"Finbar","d":"Finbar extends your Mac’s built-in Menu Bar Search with fuzzy filtering and remembers every menu item you’ve selected, gradually accumulating a list of your favorite menu items.","img":"https://macmenubar.com/wp-content/uploads/2023/10/finbar.jpeg","u":"https://www.roeybiran.com/apps/finbar"},{"t":"Dottt App","d":"This menu bar app displays upcoming calendar events, sends notifications, and automatically joins meetings. It neither reads nor saves your events.","img":"https://macmenubar.com/wp-content/uploads/2023/09/dottt-app.jpg","u":"https://dottt.app/"},{"t":"MacBing","d":"MacBing gives you quick access to Bing Chat on macOS, opening the familiar interface in your browser with a single click or shortcut. Lightweight and native, it runs on Ventura or newer and is free to download, with optional support if you feel generous.","img":"https://macmenubar.com/wp-content/uploads/2023/09/macbing-new.jpg","u":"https://goodsnooze.gumroad.com/l/macbing?a=878996947"},{"t":"Little Tagger","d":"This menu bar app assists you in tagging your files and folders. It comes with options to filter files as well as control the execution timing. You can create new tags and save profiles for recurring tagging jobs.","img":"https://macmenubar.com/wp-content/uploads/2023/09/little-tagger.jpg","u":"https://littletagger.com/"},{"t":"MenuBar Timer","d":"MenuBar Time is designed to simplify your time management, whether you’re working, studying, cooking, or simply looking to boost your productivity. Probably the most important feature of this app is the ability to use Siri to ask it to start a timer.","img":"https://macmenubar.com/wp-content/uploads/2023/09/menubar-timer.jpg","u":"https://apps.apple.com/us/app/menubar-timer/id6463832197"},{"t":"Cuber","d":"This menu bar app is an all-in-one mini browser. You can customize its size and position.","img":"https://macmenubar.com/wp-content/uploads/2023/09/cuber.jpg","u":"https://svenko.me/pages/cuber"},{"t":"ClyPaste","d":"This menu bar app extends the core functionality of other clipboard managers by including a HUD (Heads-Up Display) window that displays the most frequently used items.","img":"https://macmenubar.com/wp-content/uploads/2023/09/clypaste.jpg","u":"https://clypaste.beauty-of-pixel.tech/"},{"t":"DockX","d":"DockX allows you to display anything in your menu bar (or in the Dock). Network speed, CPU/Memory usage, Date, Clock, Memo or funky GIFs animations.","img":"https://macmenubar.com/wp-content/uploads/2023/09/dockx.jpg","u":"https://dockx.app/"},{"t":"Menu Bar Calendar","d":"View your monthly calendar at a glance with a clean, simple design in the menu bar for instant access.","img":"https://macmenubar.com/wp-content/uploads/2023/09/menu-bar-calendar.jpg","u":"https://sindresorhus.com/menu-bar-calendar"},{"t":"PowerMeister","d":"PowerMeister is a menu bar app that lets you run apps exclusively in Low Power Mode while also increasing performance by selecting apps that run exclusively in Performance Mode.","img":"https://macmenubar.com/wp-content/uploads/2023/08/powermeister-1.jpeg","u":"https://naden.co/powermeister.html"},{"t":"RerouteMe","d":"Just one click in your menu bar app to switch between Proxy Configurations. You can switch between a Localhost, WAN, or Custom Proxy Configuration.","img":"https://macmenubar.com/wp-content/uploads/2023/08/rerouteme-1.jpeg","u":"https://nadenco.gumroad.com/l/rerouteme"},{"t":"Catch","d":"Catch is a menu bar app which enables you to download digital content made available via RSS. Simply add your feeds, and new episodes will be downloaded using your preferred BitTorrent client.","img":"https://macmenubar.com/wp-content/uploads/2023/08/catch.jpg","u":"https://kaylees.site/catch.html"},{"t":"XcLauncher","d":"XcLauncher is a menu bar app that provides instant access to your favorite projects, workspaces, playgrounds and Swift files. It’s like having browser bookmarks for your Xcode files.","img":"https://macmenubar.com/wp-content/uploads/2023/07/xclauncher.jpg","u":"https://apps.apple.com/us/app/id1234625785"},{"t":"Pulse for Plausible Analytics","d":"This menu bar app shows the latest stats from Plausible Analytics, a privacy-friendly Google Analytics alternative.","img":"https://macmenubar.com/wp-content/uploads/2023/07/pulse.jpg","u":"https://apps.apple.com/us/app/id1566732681"},{"t":"FilevaultReboot","d":"FilevaultReboot is a small open-source utility that adds a FileVault restart option directly to your menu bar, saving you from digging through System Preferences whenever you need to initiate a secure restart.","img":"https://raw.githubusercontent.com/dieskim/FilevaultReboot/main/Distribution/FilevaultReboot.gif","u":"https://github.com/dieskim/FilevaultReboot"},{"t":"Keyboard Switcheroo","d":"Switcheroo is a menu bar app that shows your input sources with colorful flags or custom icons of your choosing. Perfect for polyglots and vexillologists.","img":"https://macmenubar.com/wp-content/uploads/2023/07/keyboard-switcheroo.jpg","u":"https://overdesigned.net/switcheroo/"},{"t":"BatFi","d":"BatFi offers intelligent control over your battery to ensure optimal performance and longevity while preserving your full control. When needed you can select the ‘Charge to 100%’ command.","img":"https://macmenubar.com/wp-content/uploads/2023/06/batfi.jpg","u":"https://www.micropixels.software/batfi"},{"t":"Hyperfocused","d":"This menu bar app combines a window manager, app launcher and website blocker. You can for instance define specific screens/monitors to open your apps in and create a custom layout for their positions/sizes.","img":"https://macmenubar.com/wp-content/uploads/2023/05/hyperfocussed.jpg","u":"https://hyperfocused.app/"},{"t":"FlowNote","d":"Simply type in your notes. No navigation, no button click, no catogory search. All notes are listed in time flow. You can use the tag system and keywords to search your notes.","img":"https://macmenubar.com/wp-content/uploads/2023/07/flownote-new.jpg","u":"https://github.com/Yiiipu/FlowNote"},{"t":"Time2Work","d":"This menu bar app provides you with an count down timer that shows how long you want to work, with break and implemented functionality for popular music services.","img":"https://macmenubar.com/wp-content/uploads/2023/05/time2work.jpg","u":"https://apps.apple.com/gb/app/time2work/id6449409031?mt=12"},{"t":"Peek AI","d":"Peek brings your favorite AI chatbots together in one tidy interface, so you can move between ChatGPT, Gemini, Claude, Perplexity, Copilot and more without juggling tabs. No API keys required, just log in and your synced history follows, while built-in shortcuts, floating mode and quick screenshots keep everything effortlessly within reach.","img":"https://macmenubar.com/wp-content/uploads/2023/06/peek-ai.jpg","u":"https://prateekkeshari.gumroad.com/l/peek"},{"t":"Doll","d":"Doll is a menu bar app that puts the icons and badges of apps like Mail, Slack and Microsoft Teams into the menu bar.","img":"https://macmenubar.com/wp-content/uploads/2023/06/doll.jpg","u":"https://github.com/xiaogdgenuine/Doll"},{"t":"Day Progress","d":"This menu bar app keeps track of the time remaining in your day. Use it as a visual cue to stay motivated and manage time more efficiently.","img":"https://macmenubar.com/wp-content/uploads/2023/06/day-progress.jpg","u":"https://apps.apple.com/app/id6450280202"},{"t":"Time Machine Schedule","d":"Schedule your Time Machine backups right inside your Mac’s menu bar. The app also shows the remaining time until the next backup.","img":"https://macmenubar.com/wp-content/uploads/2023/06/time-machine-schedule.jpg","u":"https://imkapps.com/time-machine-schedule/"},{"t":"PreForget","d":"This simple and clean to-do reminder app lets you manage your tasks in a rather fun and encouraging way, through interactive messages. You can also set reminders for important deadlines.","img":"https://macmenubar.com/wp-content/uploads/2023/06/PreForget.jpg","u":"https://preforget.vercel.app/"},{"t":"Vetero","d":"This menu bar app gives you location based forcasts. You can choosing the details that matter most to you. The app uses the weather data from Apple Weather.","img":"https://macmenubar.com/wp-content/uploads/2023/06/vetero.jpg","u":"https://apps.apple.com/us/app/vetero/id6449091332"},{"t":"NZB Control","d":"With this menu bar app you can monitor and control your SABnzbd (binary newsreader) or NZBGet (usenet downloader) application.","img":"https://macmenubar.com/wp-content/uploads/2023/05/nzb-control.jpg","u":"http://nzbcontrol.info"},{"t":"Galvani","d":"Toggle Low Power Mode on your Mac from the menu bar for efficient battery management efficiently without extra steps.","img":"https://macmenubar.com/wp-content/uploads/2023/05/galvani.jpg","u":"https://theden.mmm.page/galvani"},{"t":"Coolbar","d":"With this menu bar app you can easily store and access all of your frequently used files, folders, and website links right from your menu bar. No more digging through folders or cluttered desktops.","img":"https://macmenubar.com/wp-content/uploads/2023/05/coolbar.jpg","u":"https://indiegoodies.com/coolbar"},{"t":"IntelliBar","d":"Search ChatGPT like Spotlight, making AI assistance instantly available from your menu bar for instant access. This streamlines your workflow significantly.","img":"https://macmenubar.com/wp-content/uploads/2023/05/intellibar.jpg","u":"https://intellibar.app/"},{"t":"Mullvad VPN","d":"Connect securely with Mullvad, an open-source Swedish VPN provider with strong privacy protections efficiently without extra steps for seamless integration with ease with ease and security throughout your workflow.","img":"https://macmenubar.com/wp-content/uploads/2023/05/mullvad-vpn.jpg","u":"https://mullvad.net/"},{"t":"Scrap Paper","d":"Scrap Paper lets you write short temporary notes and keeps them in sync using iCloud. The tool allows you to note down thoughts and ideas as they come to your mind, without interrupting your workflow.","img":"https://macmenubar.com/wp-content/uploads/2023/05/scrap-paper.jpg","u":"https://apps.apple.com/us/app/scrap-paper/id1448441317"},{"t":"Sparrow","d":"Sparrow is a hourly forecast menu bar app. Get quick access to the current weather conditions as well as the high and low for the day. Sunrise and sunset times are displayed accurately between the hours they appear.","img":"https://macmenubar.com/wp-content/uploads/2023/05/sparrow.jpg","u":"https://sparrow.menu/"},{"t":"Camera Preview","d":"This menu bar app gives you instant access to your Mac’s camera feed for quick checks, for instance before video calls. You can also resize and reposition the feed window to your preference.","img":"https://macmenubar.com/wp-content/uploads/2023/05/camera-preview.jpg","u":"https://apps.apple.com/app/id1632827132"},{"t":"Capster","d":"With this menu bar app, you can capture a screenshot or a video and instantly receive a shareable link. You can also annotate screenshots, browse your collection, and receive notifications when someone reacts to or views your capture.","img":"https://macmenubar.com/wp-content/uploads/2023/05/capster-new.jpg","u":"https://www.capster.io/"},{"t":"Carrot Weather","d":"This menu bar app provides you with the current weather conditions, hourly forecasts, radar maps, precipitation notifications to the minute and animated maps. You can even view the weather for any location up to 70 years in the past.","img":"https://macmenubar.com/wp-content/uploads/2023/05/carrot-weather.jpg","u":"https://apps.apple.com/us/app/carrot-weather/id993487541?mt=12"},{"t":"Clyde","d":"This menu bar app lets you alarm your MacBook at a public place when you step away to do something like ordering coffee. When someone tries to close your MacBook’s lid when Clyde is turned on, a loud alarm will sound.","img":"https://macmenubar.com/wp-content/uploads/2023/05/clyde.jpg","u":"https://www.getcly.de/"},{"t":"Noize","d":"This menu bar app lets you mix and match a variety of ambient sounds to create the perfect soundscapes for any mood or activity.","img":"https://macmenubar.com/wp-content/uploads/2023/05/noize.jpg","u":"https://noizeweb.vercel.app/"},{"t":"OpenPorts","d":"Manage open network ports with options to list, terminate, or kill them from your menu bar for instant access.","img":"https://macmenubar.com/wp-content/uploads/2023/05/openports.jpg","u":"https://openports.app/"},{"t":"Zones","d":"Keeping track of different time zones? With this menu bar app you can see the time zone differences for any date and time.","img":"https://macmenubar.com/wp-content/uploads/2023/05/zones.jpg","u":"http://squircleapps.com/zones/"},{"t":"NepTunes","d":"NepTunes is a Last.fm scrobbler, that also fully supports Apple Music and Spotify. This menu bar app will observe currently running apps and start fetching info about currently playing music.","img":"https://macmenubar.com/wp-content/uploads/2023/05/neptunes.jpg","u":"https://micropixels.software/apps/neptunes"},{"t":"Horzono","d":"Horzono lets you check the time at different locations worldwide with a single click. The app has a massive database of cities (over 25k).","img":"https://macmenubar.com/wp-content/uploads/2023/05/horzono.jpg","u":"https://www.micropixels.software/horzono"},{"t":"Witch","d":"With this menu bar app, you can switch everything. Not only apps and windows, but also tabs. You can have as many switchers as you like.","img":"https://macmenubar.com/wp-content/uploads/2023/05/witch.jpg","u":"https://manytricks.com/witch/"},{"t":"BuhoCleaner","d":"BuhoCleaner is a storage cleaning app that can reclaim more free storage space and boost performance. It also enables you to flexibly choose what Mac status will show in the menu bar, like CPU Load/Temp, RAM, Network, etc.","img":"https://macmenubar.com/wp-content/uploads/2023/04/buhocleaner.jpg","u":"https://www.drbuho.com/buhocleaner"},{"t":"OneMenu","d":"OneMenu is a menubar app featuring system monitoring, a window manager and a keyboard cleaning mode.","img":"https://macmenubar.com/wp-content/uploads/2023/04/onemenu.jpg","u":"https://www.withmarko.com/one-menu"},{"t":"Mouse Shaker","d":"Mouse Shaker keeps you “Active” on any chat applications. The menu bar app automatically moves your cursor, clicks or simulates activity without you noticing.","img":"https://macmenubar.com/wp-content/uploads/2023/04/mouse-shaker.jpg","u":"https://mouseshaker.clemstation.com/"},{"t":"Tidewave","d":"Tidewave is a distraction-free internet radio player, allowing you to focus on your work, relax or enjoy your favorite internet radio stations without any distractions.","img":"https://macmenubar.com/wp-content/uploads/2023/04/tidewave.jpg","u":"https://tidewave.app/"},{"t":"QuickGPT","d":"QuickGPT gives you instant access to ChatGPT from your Mac. It stays above other windows, launches at login, and even lets you tweak the interface with custom CSS and JavaScript for a more personal touch.","img":"https://macmenubar.com/wp-content/uploads/2023/04/quickgpt.jpg","u":"https://sindresorhus.gumroad.com/l/quickgpt"},{"t":"Goose","d":"Connect securely with Goose VPN for privacy-focused browsing with unlimited devices and no logging efficiently without extra steps for seamless integration with ease with ease and security throughout your workflow.","img":"https://macmenubar.com/wp-content/uploads/2023/04/goose.jpg","u":"https://goosevpn.com"},{"t":"Desktop Ghost","d":"This menu bar app instantly hides and shows the items on your Desktop, no more no less.","img":"https://macmenubar.com/wp-content/uploads/2023/03/desktop-ghost.jpg","u":"https://apps.apple.com/app/desktop-ghost/id875947985"},{"t":"Squares","d":"Squares is a bunch of very simple AppleScripts for window positioning and resizing. It is not a native app in itself but still acts as a menu bar app.","img":"https://macmenubar.com/wp-content/uploads/2023/03/square.jpg","u":"https://github.com/bishshoy/squares"},{"t":"reKarma","d":"This menu bar app checks the reddit karma score of a given user. No reddit account login required.","img":"https://macmenubar.com/wp-content/uploads/2023/03/rekarma.jpg","u":"https://github.com/nutellaordidnthappen/reKarma"},{"t":"Klack","d":"This menu bar app adds mechanical keyboard sounds to every keystroke. It supports up/down keys separately, the result is way more realistic compared to playing both the sounds simultaneously","img":"https://macmenubar.com/wp-content/uploads/2023/03/klack.jpg","u":"https://tryklack.com/"},{"t":"Trypa","d":"This menu bar app lets you automate your automations and set up triggers using different environmental, hardware and network scenarios.","img":"https://macmenubar.com/wp-content/uploads/2023/03/trypa.jpg","u":"https://apps.apple.com/us/app/trypa/id1666429734"},{"t":"WhichSpace","d":"See which virtual space you’re currently in, displayed directly in your menu bar for instant access.","img":"https://macmenubar.com/wp-content/uploads/2023/03/whichspace.jpg","u":"https://github.com/gechr/WhichSpace"},{"t":"NameSpace","d":"Spaces (the virtual desktop feature) currently just labels each Space as “Desktop 1”, etc. This menu bar app allows you to name each Space and shows the name of your current Space in the menu bar. It also provides an alternate way to switch Spaces.","img":"https://macmenubar.com/wp-content/uploads/2023/03/namespace.jpg","u":"https://github.com/hyperjeff/NameSpace"},{"t":"Stock Menu Bar","d":"This menu bar app displays the stock market information in real time. It supports stock, foreign exchange, futures, funds and other varieties.","img":"https://macmenubar.com/wp-content/uploads/2023/03/stock-menu-bar.jpg","u":"https://apps.apple.com/us/app/stock-menu-bar/id1557874999?mt=12"},{"t":"Annotate","d":"With Annotate, you can annotate and highlight screen, PDFs, images, and documents in real-time. So you don’t have to switch between different tools or applications.","img":"https://macmenubar.com/wp-content/uploads/2023/03/annotate.jpg","u":"https://achuthhadnoor.gumroad.com/l/annotate"},{"t":"Writers Brew AI","d":"This menu bar app is an AI assistant that works across all browsers, native apps & electron apps. With inbuilt OCR that takes care of extracting text from image to transforming the text using AI.","img":"https://macmenubar.com/wp-content/uploads/2023/03/writersbrew.jpg","u":"https://writersbrew.app/"},{"t":"Tiempo","d":"Tiempo is a menu bar app that makes it easy for remote workers to subtract or add time and manage multiple zones with just a few clicks.","img":"https://macmenubar.com/wp-content/uploads/2023/03/tiempo.jpg","u":"https://wilterrero.gumroad.com/l/tiempo-app"},{"t":"JazzUp","d":"Add satisfying mechanical keyboard sounds—or others—to your typing for a more engaging experience efficiently without extra steps for seamless integration with ease.","img":"https://macmenubar.com/wp-content/uploads/2023/03/jazzup.png","u":"https://www.irradiatedsoftware.com/labs/"},{"t":"SitWit","d":"SitWit uses your Mac’s built-in webcam to monitor your sitting position as you work. It keeps a live “score” of your posture and sends notifications if you lean back or forward too much.","img":"https://macmenubar.com/wp-content/uploads/2023/02/hlth.jpg","u":"https://sitwit.app"},{"t":"Hyperfocus 2","d":"Hyperfocus 2 boosts productivity with microtasking, time tracking, and ergonomic breaks, promoting focus and healthy screen habits on macOS.","img":"https://macmenubar.com/wp-content/uploads/2023/02/hyperfocus.jpeg","u":"https://hyperfocusapp.com"},{"t":"Beams","d":"Beams shows you upcoming meetings, which you can join in one click. It also allows you to reserve focus time in between meetings by automatically updating your Google Calendar and Slack status. Other features: prioritizing daily goals, auto-joining video calls, focus mode, journal and calendar insights.","img":"https://macmenubar.com/wp-content/uploads/2023/02/beams.jpg","u":"https://usebeams.com/"},{"t":"MacGPT","d":"Access ChatGPT instantly from your menu bar without switching apps or tabs ever. This streamlines your workflow significantly making your workflow more efficient with ease.","img":"https://macmenubar.com/wp-content/uploads/2023/02/macgpt.jpg","u":"https://goodsnooze.gumroad.com/l/menugpt"},{"t":"ContriBar","d":"View your GitHub contribution calendar directly in the menu bar to track your coding activity efficiently without extra steps.","img":"https://macmenubar.com/wp-content/uploads/2023/02/contribar.jpg","u":"https://contribar.framer.website/"},{"t":"SnapAPI","d":"SnapAPI is the quickest way (just a click) to access APIs from your Mac’s menu bar. No more hassle of using complicated tools to run APIs.","img":"https://macmenubar.com/wp-content/uploads/2023/02/snapapi.jpg","u":"https://getsnapapi.com"},{"t":"Tunnelblick","d":"This menu bar app allows you to connect to almost any VPN service
