/* ============================================================
   Hot-or-Not triage over the inlined DATA array.
   State lives entirely in localStorage so you can resume anytime.
   ============================================================ */

const keyOf = p => p.t + ' ' + p.u;            // same scheme the old gallery used

const DECISIONS_KEY = 'mmb-decisions';         // { key: 'keep'|'pass' }
const SEED_KEY      = 'mmb-seed';              // integer seed for the stable shuffle
const LEGACY_KEY    = 'mmb-removed';           // old gallery's deleted-card list

// ---- load / migrate decisions ----
let decisions = {};
try { decisions = JSON.parse(localStorage.getItem(DECISIONS_KEY) || '{}') || {}; } catch (e) { decisions = {}; }

// One-time migration: previously deleted cards become "pass".
if (!localStorage.getItem(DECISIONS_KEY)) {
  try {
    const removed = JSON.parse(localStorage.getItem(LEGACY_KEY) || '[]');
    removed.forEach(k => { decisions[k] = 'pass'; });
  } catch (e) {}
  saveDecisions();
}
function saveDecisions(){ localStorage.setItem(DECISIONS_KEY, JSON.stringify(decisions)); }

// ---- stable shuffle (seeded Fisher–Yates) ----
function getSeed(){
  let s = parseInt(localStorage.getItem(SEED_KEY) || '', 10);
  if (!Number.isFinite(s)) { s = (Math.floor(Math.random() * 2147483647) || 1); localStorage.setItem(SEED_KEY, String(s)); }
  return s;
}
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const order = DATA.slice();
(function shuffle(){
  const rnd = mulberry32(getSeed());
  for (let i = order.length - 1; i > 0; i--){
    const j = Math.floor(rnd() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
})();

// ---- session history for Undo ----
const history = [];   // [{ key, prev }]  prev = decision before this action (or undefined)

// ---- element refs ----
const $ = id => document.getElementById(id);
const deck = $('deck'), stage = $('stage'), hint = $('hint'), actions = $('actions');
const bPass = $('bPass'), bKeep = $('bKeep');

function escapeHtml(s){
  return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// current = first card in shuffled order that hasn't been decided
function currentCard(){ return order.find(p => !decisions[keyOf(p)]); }

let cardEl = null;       // the live DOM card
let busy = false;        // guard during fly-off animation

function buildCard(p){
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML =
    '<div class="art"><img src="' + escapeHtml(p.img) + '" alt="' + escapeHtml(p.t) + '" draggable="false"></div>' +
    '<div class="body">' +
      '<h2>' + escapeHtml(p.t) + '</h2>' +
      '<p>' + escapeHtml(p.d || 'No description.') + '</p>' +
      '<a class="visit" href="' + escapeHtml(p.u) + '" target="_blank" rel="noopener noreferrer">Visit website &rarr;</a>' +
    '</div>' +
    '<div class="stamp keep">Keep</div>' +
    '<div class="stamp pass">Pass</div>';
  return el;
}

function render(){
  updateStats();
  const p = currentCard();
  deck.innerHTML = '';
  cardEl = null;

  if (!p){                       // queue exhausted
    actions.style.display = 'none';
    hint.style.display = 'none';
    const k = count('keep');
    const done = document.createElement('div');
    done.className = 'done';
    done.innerHTML =
      '<h2>All done! &#127881;</h2>' +
      '<p>You reviewed every app. You kept <b>' + k + '</b>.</p>' +
      '<p><button class="navbtn primary" id="openShortlist" type="button">View your shortlist</button></p>';
    deck.appendChild(done);
    $('openShortlist').addEventListener('click', () => openReview('keep'));
    return;
  }

  actions.style.display = '';
  hint.style.display = '';
  cardEl = buildCard(p);
  deck.appendChild(cardEl);
  attachDrag(cardEl, p);
}

// ---- committing a decision with fly-off animation ----
function decide(verdict){
  if (busy) return;
  const p = currentCard();
  if (!p) return;
  busy = true;
  const k = keyOf(p);
  history.push({ key: k, prev: decisions[k] });
  decisions[k] = verdict;
  saveDecisions();

  if (cardEl){
    cardEl.classList.add('fly-' + verdict);
    cardEl.addEventListener('transitionend', finish, { once: true });
    setTimeout(finish, 400);
  } else { finish(); }

  function finish(){ if (!busy) return; busy = false; render(); }
}

function undo(){
  if (busy || !history.length) return;
  const last = history.pop();
  if (last.prev === undefined) delete decisions[last.key];
  else decisions[last.key] = last.prev;
  saveDecisions();
  render();
  if (cardEl){ cardEl.classList.add('fly-back'); requestAnimationFrame(() => cardEl.classList.remove('fly-back')); }
}

// ---- pointer/touch drag (Tinder-style) ----
function attachDrag(el, p){
  let startX = 0, startY = 0, dx = 0, dy = 0, dragging = false;
  const stampKeep = el.querySelector('.stamp.keep');
  const stampPass = el.querySelector('.stamp.pass');
  const TH = 90;   // px threshold to trigger a decision

  el.addEventListener('pointerdown', e => {
    if (e.target.closest('a')) return;     // let the Visit link work
    dragging = true; startX = e.clientX; startY = e.clientY; dx = dy = 0;
    el.setPointerCapture(e.pointerId);
    el.style.transition = 'none';
  });
  el.addEventListener('pointermove', e => {
    if (!dragging) return;
    dx = e.clientX - startX; dy = e.clientY - startY;
    const rot = dx / 18;
    el.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + rot + 'deg)';
    const horiz = Math.abs(dx) > Math.abs(dy);
    stampKeep.style.opacity  = (horiz && dx > 0)  ? Math.min(1, dx / TH) : 0;
    stampPass.style.opacity  = (horiz && dx < 0)  ? Math.min(1, -dx / TH) : 0;
  });
  el.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    el.style.transition = '';
    const horiz = Math.abs(dx) > Math.abs(dy);
    if (horiz && dx > TH)  return decide('keep');
    if (horiz && dx < -TH) return decide('pass');
    // snap back
    el.style.transform = '';
    stampKeep.style.opacity = stampPass.style.opacity = 0;
  });
}

// ---- stats / progress ----
function count(v){ let n = 0; for (const k in decisions) if (decisions[k] === v) n++; return n; }
function updateStats(){
  const total = order.length;
  const keep = count('keep'), pass = count('pass');
  const done = keep + pass;
  $('cTotal').textContent = total;
  $('cDone').textContent  = done;
  $('cKeep').textContent  = keep;
  $('cPass').textContent  = pass;
  $('keepPill').textContent = keep;
  $('progressFill').style.width = (total ? (done / total * 100) : 0) + '%';
}

// ---- keyboard ----
document.addEventListener('keydown', e => {
  if ($('review').classList.contains('open')) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  switch (e.key) {
    case 'ArrowLeft':  e.preventDefault(); decide('pass'); break;
    case 'ArrowRight': e.preventDefault(); decide('keep'); break;
    case 'u': case 'U': case 'Backspace': e.preventDefault(); undo(); break;
    case 'o': case 'O': { const p = currentCard(); if (p) window.open(p.u, '_blank', 'noopener'); break; }
  }
});
bPass.addEventListener('click', () => decide('pass'));
bKeep.addEventListener('click', () => decide('keep'));

/* ============================================================
   Review / shortlist overlay
   ============================================================ */
const review = $('review');
let activeBucket = 'keep';
let reviewQuery = '';

function openReview(bucket){ activeBucket = bucket || activeBucket; review.classList.add('open'); renderReview(); }
function closeReview(){ review.classList.remove('open'); render(); }

$('reviewBtn').addEventListener('click', () => openReview('keep'));
$('closeReview').addEventListener('click', closeReview);
document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => { activeBucket = t.dataset.bucket; renderReview(); }));
document.querySelectorAll('.counts .ct').forEach(c =>
  c.addEventListener('click', () => openReview(c.dataset.bucket)));
$('reviewSearch').addEventListener('input', e => { reviewQuery = e.target.value; renderReview(); });

function listFor(bucket){
  if (bucket === 'todo') return order.filter(p => !decisions[keyOf(p)]);   // not yet reviewed
  return order.filter(p => decisions[keyOf(p)] === bucket);
}

// items in the active bucket, narrowed by the search box (matches title, blurb, url)
function matchedItems(){
  const items = listFor(activeBucket);
  const q = reviewQuery.trim().toLowerCase();
  if (!q) return items;
  const terms = q.split(/\s+/);
  return items.filter(p => {
    const hay = ((p.t || '') + ' ' + (p.d || '') + ' ' + (p.u || '')).toLowerCase();
    return terms.every(t => hay.includes(t));
  });
}

const REVIEW_PAGE = 24;        // rows rendered per infinite-scroll batch
let reviewScrollHandler = null; // active scroll listener for the current bucket

function refreshReviewCounts(){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.bucket === activeBucket));
  $('tKeep').textContent = count('keep');
  $('tPass').textContent = count('pass');
  $('tTodo').textContent = listFor('todo').length;
  $('reviewTitle').textContent = activeBucket === 'todo' ? 'Still to review' : 'Your shortlist';
}

function buildReviewRow(p){
  const k = keyOf(p);
  const cur = decisions[k];
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML =
    '<a class="card-main" href="' + escapeHtml(p.u) + '" target="_blank" rel="noopener noreferrer">' +
      '<div class="card-image"><img src="' + escapeHtml(p.img) + '" alt="" loading="lazy"></div>' +
      '<div class="meta">' +
        '<h3>' + escapeHtml(p.t) + '</h3>' +
        '<p>' + escapeHtml(p.d || '') + '</p>' +
      '</div>' +
    '</a>' +
    '<div class="rebucket">' +
      '<span class="rebucket-label">Move to:</span>' +
      '<button data-v="keep"  class="bk ' + (cur === 'keep'  ? 'on' : '') + '" title="Move to Keep">&hearts; Keep</button>' +
      '<button data-v="pass"  class="bp ' + (cur === 'pass'  ? 'on' : '') + '" title="Move to Pass">&times; Pass</button>' +
    '</div>';
  row.querySelectorAll('.rebucket button').forEach(btn =>
    btn.addEventListener('click', () => {
      const v = btn.dataset.v;
      if (decisions[k] === v) return;                 // already in this bucket — no-op
      decisions[k] = v; saveDecisions();
      row.remove();                                   // drop from current view, keep scroll
      refreshReviewCounts(); updateStats();
      const listEl = $('reviewList');
      $('reviewEmpty').hidden = listEl.querySelectorAll('.row').length > 0;
    }));
  return row;
}

function renderReview(){
  refreshReviewCounts();

  const items = matchedItems();
  const total = listFor(activeBucket).length;
  const q = reviewQuery.trim();
  const listEl = $('reviewList'), emptyEl = $('reviewEmpty');
  const scroller = document.querySelector('.review-body');
  listEl.innerHTML = '';
  emptyEl.hidden = items.length > 0;
  emptyEl.textContent = q ? ('No matches for “' + q + '”.')
    : (activeBucket === 'todo' ? 'You’ve reviewed everything! 🎉' : 'Nothing here yet.');
  $('searchCount').textContent = q ? (items.length + ' of ' + total + ' match') : '';
  if (reviewScrollHandler) { scroller.removeEventListener('scroll', reviewScrollHandler); reviewScrollHandler = null; }
  scroller.scrollTop = 0;                              // reset scroll for the new bucket

  let rendered = 0, ticking = false;

  function renderMore(){
    const frag = document.createDocumentFragment();
    const end = Math.min(rendered + REVIEW_PAGE, items.length);
    for (let i = rendered; i < end; i++) frag.appendChild(buildReviewRow(items[i]));
    listEl.appendChild(frag);
    rendered = end;
    if (rendered >= items.length && reviewScrollHandler){ // all rendered — stop listening
      scroller.removeEventListener('scroll', reviewScrollHandler);
      reviewScrollHandler = null;
    }
  }

  function fillToBottom(){                              // keep loading until the page actually scrolls
    let guard = 0;
    while (rendered < items.length && scroller.scrollHeight <= scroller.clientHeight + 600 && guard++ < 50) renderMore();
  }

  renderMore();
  if (rendered < items.length){
    reviewScrollHandler = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        ticking = false;
        if (scroller.scrollTop + scroller.clientHeight >= scroller.scrollHeight - 600) renderMore();
      });
    };
    scroller.addEventListener('scroll', reviewScrollHandler, { passive: true });
    fillToBottom();                                    // ensure first viewport is scrollable
  }
}

// copy current bucket as a plain text / markdown list
$('copyBtn').addEventListener('click', async () => {
  const items = matchedItems();
  const text = items.map(p => '- ' + p.t + ' — ' + p.u).join('\n');
  try { await navigator.clipboard.writeText(text); $('copyBtn').textContent = 'Copied ' + items.length + '!'; }
  catch (e) { window.prompt('Copy this list:', text); }
  setTimeout(() => { $('copyBtn').textContent = 'Copy this list'; }, 1600);
});

$('resetBtn').addEventListener('click', () => {
  if (!window.confirm('Reset all decisions and start over? This clears your Keep/Pass choices.')) return;
  decisions = {};
  saveDecisions();
  history.length = 0;
  closeReview();
  render();
});

// ---- go ----
render();
</script>
</body>
</html>
